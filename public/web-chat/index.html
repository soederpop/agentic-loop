<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chief — Web Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --assistant: #c084fc;
    --assistant-dim: #c084fc18;
    --user-bg: #1a1a2e;
    --input-bg: #0e0e16;
    --error: #ff003c;
    --tool-bg: #0d0d14;
    --tool-border: #1a1a2a;
    --tool-accent: #f59e0b;
    --tool-ok: #39ff14;
    --tool-err: #ff003c;
    --mic: #ff3cac;
    --mic-dim: #ff3cac22;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────── */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  header .logo {
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
  }

  header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #39ff14;
    box-shadow: 0 0 6px #39ff1480;
    flex-shrink: 0;
  }

  header .dot.disconnected {
    background: var(--error);
    box-shadow: 0 0 6px #ff003c80;
  }

  header .status {
    color: var(--text-dim);
    font-size: 12px;
  }

  header .spacer {
    flex: 1;
  }

  /* ── Assistant Picker ───────────────────── */
  #assistant-picker {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }

  #assistant-picker:focus {
    border-color: var(--accent);
  }

  /* ── Voice Toggle ───────────────────────── */
  #voice-toggle {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  #voice-toggle:hover {
    border-color: var(--mic);
    color: var(--mic);
  }

  #voice-toggle.voice-active {
    background: var(--mic-dim);
    border-color: var(--mic);
    color: var(--mic);
    box-shadow: 0 0 8px var(--mic-dim);
  }

  #voice-toggle .voice-icon {
    font-size: 13px;
  }

  /* ── Messages ───────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-break: break-word;
    animation: fadeIn 0.15s ease-out;
  }

  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .message.user.voice-message {
    border-color: var(--mic);
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--assistant-dim);
    border: 1px solid var(--assistant-dim);
    color: var(--text);
  }

  .message.assistant.streaming {
    border-color: var(--assistant);
  }

  .message.error {
    align-self: center;
    background: transparent;
    color: var(--error);
    font-size: 12px;
    padding: 4px 8px;
  }

  .message.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 8px;
    font-style: italic;
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--assistant);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.6s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 var(--mic-dim); }
    70% { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* ── Tool Activity ───────────────────────── */
  .tool-activity {
    align-self: flex-start;
    max-width: 80%;
    margin: 2px 0;
    animation: fadeIn 0.15s ease-out;
  }

  .tool-activity-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    color: var(--text-dim);
    transition: border-color 0.15s;
    width: 100%;
    text-align: left;
  }

  .tool-activity-toggle:hover {
    border-color: var(--tool-accent);
  }

  .tool-activity-toggle .arrow {
    transition: transform 0.15s;
    font-size: 9px;
  }

  .tool-activity.expanded .tool-activity-toggle .arrow {
    transform: rotate(90deg);
  }

  .tool-activity-toggle .tool-label {
    color: var(--tool-accent);
    font-weight: 600;
  }

  .tool-activity-toggle .tool-count {
    margin-left: auto;
    color: var(--text-dim);
  }

  .tool-activity-list {
    display: none;
    padding: 4px 0 0 0;
  }

  .tool-activity.expanded .tool-activity-list {
    display: block;
  }

  .tool-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text-dim);
    border-left: 2px solid var(--tool-border);
    margin-left: 8px;
  }

  .tool-item .tool-status-icon {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .tool-item .tool-status-icon.running {
    background: var(--tool-accent);
    box-shadow: 0 0 4px var(--tool-accent);
    animation: blink 0.8s step-end infinite;
  }

  .tool-item .tool-status-icon.ok {
    background: var(--tool-ok);
    box-shadow: 0 0 4px rgba(57, 255, 20, 0.4);
  }

  .tool-item .tool-status-icon.err {
    background: var(--tool-err);
    box-shadow: 0 0 4px rgba(255, 0, 60, 0.4);
  }

  .tool-item .tool-name {
    color: var(--text);
    font-weight: 500;
  }

  .tool-item .tool-duration {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 10px;
  }

  .tool-item .tool-error-msg {
    color: var(--tool-err);
    font-size: 10px;
    margin-left: 14px;
    display: block;
    padding: 2px 0;
  }

  .tool-item .tool-summary {
    color: var(--text-dim);
    font-size: 10px;
    margin-left: 14px;
    display: block;
    padding: 2px 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s;
  }

  .tool-item.show-detail .tool-summary {
    max-height: 60px;
  }

  /* ── Input ──────────────────────────────── */
  #input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--surface);
    align-items: flex-end;
  }

  #input-area textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }

  #input-area textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim);
  }

  #input-area textarea.listening-active {
    border-color: var(--mic);
    box-shadow: 0 0 0 1px var(--mic-dim);
  }

  #input-area textarea::placeholder {
    color: var(--text-dim);
  }

  #input-area button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 0 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    transition: opacity 0.15s;
    height: 42px;
  }

  #input-area button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #input-area button:hover:not(:disabled) {
    opacity: 0.85;
  }

  /* ── Mic Button ─────────────────────────── */
  #mic-btn {
    display: none;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    padding: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  #mic-btn:hover:not(:disabled) {
    border-color: var(--mic);
    color: var(--mic);
    background: var(--mic-dim);
  }

  #mic-btn.active {
    border-color: var(--mic);
    color: var(--mic);
    background: var(--mic-dim);
    animation: pulse-ring 1.2s ease-out infinite;
  }

  #mic-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ── Voice Status Bar ────────────────────── */
  #voice-status {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #voice-status.visible {
    display: flex;
  }

  .voice-state-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--mic);
    min-width: 100px;
    flex-shrink: 0;
  }

  .voice-preview-text {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .vu-track {
    display: flex;
    gap: 2px;
    align-items: center;
    flex-shrink: 0;
  }

  .vu-segment {
    width: 4px;
    height: 14px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.05s, box-shadow 0.05s;
  }

  .vu-segment.lit {
    background: var(--tool-ok);
    box-shadow: 0 0 4px var(--tool-ok);
  }

  .vu-segment.lit.hot {
    background: var(--tool-accent);
    box-shadow: 0 0 4px var(--tool-accent);
  }

  .vu-segment.lit.clip {
    background: var(--error);
    box-shadow: 0 0 4px var(--error);
  }
</style>
</head>
<body>

<header>
  <span class="logo">CHIEF</span>
  <span id="dot" class="dot disconnected"></span>
  <span id="status" class="status">connecting…</span>
  <span class="spacer"></span>
  <button id="voice-toggle" title="Enable voice mode">
    <span class="voice-icon">⬤</span>
    <span class="voice-label">VOICE</span>
  </button>
  <select id="assistant-picker" title="Switch assistant"></select>
</header>

<div id="messages"></div>

<div id="voice-status">
  <span class="voice-state-label"></span>
  <span class="voice-preview-text"></span>
  <div class="vu-track"></div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Say something…" rows="1"></textarea>
  <button id="mic-btn" title="Click to speak">🎤</button>
  <button id="send" disabled>SEND</button>
</div>

<script>
(function() {
  const messagesEl = document.getElementById('messages')
  const inputEl = document.getElementById('input')
  const sendBtn = document.getElementById('send')
  const dotEl = document.getElementById('dot')
  const statusEl = document.getElementById('status')
  const pickerEl = document.getElementById('assistant-picker')
  const logoEl = document.querySelector('header .logo')
  const voiceToggleBtn = document.getElementById('voice-toggle')
  const micBtn = document.getElementById('mic-btn')

  let ws = null
  let connected = false
  let initialized = false
  let streaming = false
  let streamingEl = null

  // ── Tool activity state ────────────────
  let toolActivityEl = null
  let toolItems = {}
  let toolCount = 0

  // ── Session identity ───────────────────
  function getSessionId() {
    let id = localStorage.getItem('web-chat-session-id')
    if (!id) {
      id = crypto.randomUUID()
      localStorage.setItem('web-chat-session-id', id)
    }
    return id
  }

  function getAssistantId() {
    return localStorage.getItem('web-chat-assistant-id') || null
  }

  function setAssistantId(id) {
    localStorage.setItem('web-chat-assistant-id', id)
  }

  const sessionId = getSessionId()

  // ── Assistant picker ───────────────────
  let assistantList = []
  let defaultAssistant = 'chiefOfStaff'

  async function loadAssistants() {
    try {
      const res = await fetch('/api/assistants')
      const data = await res.json()
      assistantList = data.assistants || []
      defaultAssistant = data.default || 'chiefOfStaff'

      pickerEl.innerHTML = ''
      for (const a of assistantList) {
        const opt = document.createElement('option')
        opt.value = a.id
        opt.textContent = a.name
        pickerEl.appendChild(opt)
      }

      const defaultValid = assistantList.some(a => a.id === defaultAssistant)
      const initialAssistant = defaultValid ? defaultAssistant : (assistantList[0]?.id || 'chiefOfStaff')
      pickerEl.value = initialAssistant
      setAssistantId(initialAssistant)
    } catch (e) {
      console.error('Failed to load assistants', e)
    }
  }

  pickerEl.addEventListener('change', () => {
    const newAssistant = pickerEl.value
    setAssistantId(newAssistant)
    updateLogo(newAssistant)
    messagesEl.innerHTML = ''
    if (ws) ws.close()
  })

  function updateLogo(assistantId) {
    logoEl.textContent = assistantId.toUpperCase()
  }

  // ── Voice mode ─────────────────────────
  let voiceModeOn = localStorage.getItem('web-chat-voice-mode') === 'on'

  // Voice states: idle | listening | recording | transcribing
  let voiceState = 'idle'
  let voiceWs = null
  let voiceWsPort = null
  const VU_SEGMENTS = 16

  const voiceStatusEl = document.getElementById('voice-status')
  const voiceStateLabelEl = voiceStatusEl.querySelector('.voice-state-label')
  const voicePreviewEl = voiceStatusEl.querySelector('.voice-preview-text')
  const vuTrackEl = voiceStatusEl.querySelector('.vu-track')

  // Build VU segments
  for (let i = 0; i < VU_SEGMENTS; i++) {
    const seg = document.createElement('div')
    seg.className = 'vu-segment'
    vuTrackEl.appendChild(seg)
  }

  function setVuLevel(level) {
    const segments = vuTrackEl.querySelectorAll('.vu-segment')
    const lit = Math.round(level * VU_SEGMENTS)
    segments.forEach((seg, i) => {
      const active = i < lit
      seg.classList.toggle('lit', active)
      seg.classList.toggle('hot', active && i >= VU_SEGMENTS * 0.7)
      seg.classList.toggle('clip', active && i >= VU_SEGMENTS * 0.9)
    })
  }

  function setVoiceState(state, previewText) {
    voiceState = state
    const labels = { listening: 'LISTENING…', recording: 'RECORDING', transcribing: 'TRANSCRIBING…', idle: '' }
    voiceStateLabelEl.textContent = labels[state] || ''
    voicePreviewEl.textContent = previewText || ''
    voiceStatusEl.classList.toggle('visible', state !== 'idle')
    vuTrackEl.style.display = (state === 'recording') ? 'flex' : 'none'
    if (state === 'idle') setVuLevel(0)
    micBtn.classList.toggle('active', state !== 'idle')
    micBtn.disabled = streaming || state !== 'idle'
    inputEl.classList.toggle('listening-active', state === 'recording')
  }

  function connectVoiceWs() {
    if (voiceWs || !voiceWsPort) return
    const proto = location.protocol === 'https:' ? 'wss' : 'ws'
    voiceWs = new WebSocket(`${proto}://${location.hostname}:${voiceWsPort}`)

    voiceWs.onmessage = (evt) => {
      let msg
      try { msg = JSON.parse(evt.data) } catch { return }

      switch (msg.type) {
        case 'voice_listening':
          setVoiceState('listening')
          break
        case 'voice_recording':
          setVoiceState('recording')
          break
        case 'voice_transcribing':
          setVoiceState('transcribing')
          setVuLevel(0)
          break
        case 'voice_vu':
          setVuLevel(msg.level)
          break
        case 'voice_preview':
          voicePreviewEl.textContent = msg.text
          inputEl.value = msg.text
          autoResize()
          break
        case 'voice_complete':
          setVoiceState('idle')
          if (msg.text && msg.text.trim()) {
            inputEl.value = msg.text.trim()
            autoResize()
            if (voiceModeOn && connected && initialized && !streaming) {
              sendMessage()
            }
          }
          break
        case 'voice_error':
          setVoiceState('idle')
          appendMessage('error', `Voice error: ${msg.message}`)
          break
      }
    }

    voiceWs.onclose = () => {
      voiceWs = null
      if (voiceState !== 'idle') setVoiceState('idle')
    }

    voiceWs.onerror = () => { voiceWs?.close() }
  }

  function disconnectVoiceWs() {
    if (voiceWs) {
      voiceWs.close()
      voiceWs = null
    }
    setVoiceState('idle')
  }

  function toggleVoiceMode() {
    voiceModeOn = !voiceModeOn
    localStorage.setItem('web-chat-voice-mode', voiceModeOn ? 'on' : 'off')
    updateVoiceModeUI()

    if (connected && initialized) {
      ws.send(JSON.stringify({ type: 'set_voice_mode', mode: voiceModeOn ? 'always' : 'off' }))
    }

    if (voiceModeOn) {
      if (voiceWsPort) connectVoiceWs()
      else loadConfig().then(connectVoiceWs)
    } else {
      disconnectVoiceWs()
    }
  }

  function updateVoiceModeUI() {
    voiceToggleBtn.classList.toggle('voice-active', voiceModeOn)
    voiceToggleBtn.title = voiceModeOn ? 'Voice ON — click to disable' : 'Enable voice mode'
    micBtn.style.display = voiceModeOn ? 'flex' : 'none'
    inputEl.placeholder = voiceModeOn ? 'Type or tap mic to speak…' : 'Say something…'
  }

  // Default silence timeout matches voice-chat CLI default (3s)
  const SILENCE_TIMEOUT_S = 3

  function triggerVoiceListen() {
    if (!voiceWs || voiceWs.readyState !== WebSocket.OPEN || voiceState !== 'idle' || streaming) return
    voiceWs.send(JSON.stringify({ type: 'start_voice', silenceTimeout: SILENCE_TIMEOUT_S }))
  }

  voiceToggleBtn.addEventListener('click', toggleVoiceMode)
  micBtn.addEventListener('click', triggerVoiceListen)

  // ── WebSocket ──────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws'
    ws = new WebSocket(`${proto}://${location.host}`)

    ws.onopen = () => {
      connected = true
      initialized = false
      dotEl.classList.remove('disconnected')
      statusEl.textContent = 'connected'

      const assistantId = pickerEl.value || getAssistantId() || defaultAssistant
      ws.send(JSON.stringify({ type: 'init', sessionId, assistantId }))
    }

    ws.onclose = () => {
      connected = false
      initialized = false
      dotEl.classList.add('disconnected')
      statusEl.textContent = 'disconnected — reconnecting…'
      sendBtn.disabled = true
      setTimeout(connect, 2000)
    }

    ws.onerror = () => {
      ws.close()
    }

    ws.onmessage = (evt) => {
      let msg
      try { msg = JSON.parse(evt.data) } catch { return }
      handleServerMessage(msg)
    }
  }

  function handleServerMessage(msg) {
    switch (msg.type) {
      case 'init_ok':
        initialized = true
        sendBtn.disabled = false
        inputEl.focus()
        updateLogo(msg.assistantId)
        setAssistantId(msg.assistantId)
        pickerEl.value = msg.assistantId
        if (msg.historyLength > 1) {
          appendMessage('system', `Session resumed (${msg.historyLength - 1} messages in history)`)
        }
        // Sync voice mode with server
        if (voiceModeOn) {
          ws.send(JSON.stringify({ type: 'set_voice_mode', mode: 'always' }))
        }
        break

      case 'init_error':
        appendMessage('error', msg.message || 'Init failed')
        break

      case 'assistant_message_start':
        streaming = true
        toolActivityEl = null
        toolItems = {}
        toolCount = 0
        streamingEl = appendMessage('assistant', '')
        streamingEl.classList.add('streaming')
        addCursor(streamingEl)
        sendBtn.disabled = true
        micBtn.disabled = true
        micBtn.classList.remove('active')
        break

      case 'chunk':
        if (streamingEl) {
          removeCursor(streamingEl)
          streamingEl.textContent += msg.textDelta
          addCursor(streamingEl)
          scrollToBottom()
        }
        break

      case 'tool_start':
        handleToolStart(msg)
        break

      case 'tool_end':
        handleToolEnd(msg)
        break

      case 'assistant_message_complete':
        if (streamingEl) {
          removeCursor(streamingEl)
          streamingEl.classList.remove('streaming')
          if (msg.text) streamingEl.textContent = msg.text
        }
        streaming = false
        streamingEl = null
        sendBtn.disabled = false
        micBtn.disabled = voiceState !== 'idle'
        inputEl.focus()
        break

      case 'voice_mode_changed':
        // Server acknowledged voice mode change
        break

      case 'error':
        appendMessage('error', msg.message || 'Unknown error')
        streaming = false
        streamingEl = null
        sendBtn.disabled = false
        micBtn.disabled = voiceState !== 'idle'
        break
    }
  }

  // ── Tool activity UI ───────────────────
  function ensureToolActivityContainer() {
    if (toolActivityEl) return toolActivityEl

    const wrapper = document.createElement('div')
    wrapper.className = 'tool-activity expanded'

    const toggle = document.createElement('button')
    toggle.className = 'tool-activity-toggle'
    toggle.innerHTML = '<span class="arrow">&#9654;</span> <span class="tool-label">Tools</span> <span class="tool-count"></span>'
    toggle.addEventListener('click', () => {
      wrapper.classList.toggle('expanded')
    })

    const list = document.createElement('div')
    list.className = 'tool-activity-list'

    wrapper.appendChild(toggle)
    wrapper.appendChild(list)

    if (streamingEl) {
      messagesEl.insertBefore(wrapper, streamingEl)
    } else {
      messagesEl.appendChild(wrapper)
    }

    toolActivityEl = wrapper
    return wrapper
  }

  function updateToolCount() {
    if (!toolActivityEl) return
    const countEl = toolActivityEl.querySelector('.tool-count')
    if (countEl) {
      const running = Object.values(toolItems).filter(el => el.querySelector('.running')).length
      countEl.textContent = running > 0 ? `${running} running` : `${toolCount} completed`
    }
  }

  function handleToolStart(msg) {
    const container = ensureToolActivityContainer()
    const list = container.querySelector('.tool-activity-list')

    const item = document.createElement('div')
    item.className = 'tool-item'
    item.innerHTML = `<span class="tool-status-icon running"></span><span class="tool-name">${escapeHtml(msg.name)}</span><span class="tool-duration">running…</span>`

    list.appendChild(item)
    toolItems[msg.name] = item
    toolCount++
    updateToolCount()
    scrollToBottom()
  }

  function handleToolEnd(msg) {
    const item = toolItems[msg.name]
    if (!item) return

    const icon = item.querySelector('.tool-status-icon')
    const duration = item.querySelector('.tool-duration')

    icon.classList.remove('running')
    icon.classList.add(msg.ok ? 'ok' : 'err')

    const durText = msg.durationMs < 1000
      ? `${msg.durationMs}ms`
      : `${(msg.durationMs / 1000).toFixed(1)}s`
    duration.textContent = durText

    if (!msg.ok && msg.error) {
      const errSpan = document.createElement('span')
      errSpan.className = 'tool-error-msg'
      errSpan.textContent = msg.error
      item.appendChild(errSpan)
    }

    if (msg.ok && msg.summary && msg.summary.length <= 120) {
      const summarySpan = document.createElement('span')
      summarySpan.className = 'tool-summary'
      summarySpan.textContent = msg.summary
      item.addEventListener('click', () => item.classList.toggle('show-detail'))
      item.style.cursor = 'pointer'
      item.appendChild(summarySpan)
    }

    updateToolCount()
    scrollToBottom()
  }

  function escapeHtml(str) {
    const div = document.createElement('div')
    div.textContent = str
    return div.innerHTML
  }

  // ── DOM helpers ────────────────────────
  function appendMessage(role, text) {
    const el = document.createElement('div')
    el.className = `message ${role}`
    el.textContent = text
    messagesEl.appendChild(el)
    scrollToBottom()
    return el
  }

  function addCursor(el) {
    const c = document.createElement('span')
    c.className = 'cursor'
    el.appendChild(c)
  }

  function removeCursor(el) {
    const c = el.querySelector('.cursor')
    if (c) c.remove()
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight
  }

  // ── Input handling ─────────────────────
  function sendMessage() {
    const text = inputEl.value.trim()
    if (!text || !connected || !initialized || streaming) return

    const msgEl = appendMessage('user', text)
    if (voiceModeOn) msgEl.classList.add('voice-message')

    ws.send(JSON.stringify({ type: 'user_message', text, voice: voiceModeOn }))
    inputEl.value = ''
    autoResize()
  }

  sendBtn.addEventListener('click', sendMessage)

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  })

  function autoResize() {
    inputEl.style.height = 'auto'
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'
  }
  inputEl.addEventListener('input', autoResize)

  // ── Start ──────────────────────────────
  updateVoiceModeUI()

  async function loadConfig() {
    try {
      const res = await fetch('/api/config')
      const data = await res.json()
      voiceWsPort = data.voiceWsPort
    } catch (e) {
      console.error('Failed to load config', e)
    }
  }

  loadConfig().then(() => {
    if (voiceModeOn) connectVoiceWs()
  })

  loadAssistants().then(connect)
})()
</script>
</body>
</html>
