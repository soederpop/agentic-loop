<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chief — Web Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --assistant: #c084fc;
    --assistant-dim: #c084fc18;
    --user-bg: #1a1a2e;
    --input-bg: #0e0e16;
    --error: #ff003c;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────── */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  header .logo {
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
  }

  header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #39ff14;
    box-shadow: 0 0 6px #39ff1480;
    flex-shrink: 0;
  }

  header .dot.disconnected {
    background: var(--error);
    box-shadow: 0 0 6px #ff003c80;
  }

  header .status {
    color: var(--text-dim);
    font-size: 12px;
  }

  header .spacer {
    flex: 1;
  }

  /* ── Assistant Picker ───────────────────── */
  #assistant-picker {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }

  #assistant-picker:focus {
    border-color: var(--accent);
  }

  /* ── Messages ───────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-break: break-word;
    animation: fadeIn 0.15s ease-out;
  }

  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--assistant-dim);
    border: 1px solid var(--assistant-dim);
    color: var(--text);
  }

  .message.assistant.streaming {
    border-color: var(--assistant);
  }

  .message.error {
    align-self: center;
    background: transparent;
    color: var(--error);
    font-size: 12px;
    padding: 4px 8px;
  }

  .message.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 8px;
    font-style: italic;
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--assistant);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.6s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Input ──────────────────────────────── */
  #input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--surface);
  }

  #input-area textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
  }

  #input-area textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim);
  }

  #input-area textarea::placeholder {
    color: var(--text-dim);
  }

  #input-area button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 0 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  #input-area button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #input-area button:hover:not(:disabled) {
    opacity: 0.85;
  }
</style>
</head>
<body>

<header>
  <span class="logo">CHIEF</span>
  <span id="dot" class="dot disconnected"></span>
  <span id="status" class="status">connecting…</span>
  <span class="spacer"></span>
  <select id="assistant-picker" title="Switch assistant"></select>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="input" placeholder="Say something…" rows="1"></textarea>
  <button id="send" disabled>SEND</button>
</div>

<script>
(function() {
  const messagesEl = document.getElementById('messages')
  const inputEl = document.getElementById('input')
  const sendBtn = document.getElementById('send')
  const dotEl = document.getElementById('dot')
  const statusEl = document.getElementById('status')
  const pickerEl = document.getElementById('assistant-picker')
  const logoEl = document.querySelector('header .logo')

  let ws = null
  let connected = false
  let initialized = false
  let streaming = false
  let streamingEl = null

  // ── Session identity ───────────────────
  function getSessionId() {
    let id = localStorage.getItem('web-chat-session-id')
    if (!id) {
      id = crypto.randomUUID()
      localStorage.setItem('web-chat-session-id', id)
    }
    return id
  }

  function getAssistantId() {
    return localStorage.getItem('web-chat-assistant-id') || null
  }

  function setAssistantId(id) {
    localStorage.setItem('web-chat-assistant-id', id)
  }

  const sessionId = getSessionId()

  // ── Assistant picker ───────────────────
  let assistantList = []
  let defaultAssistant = 'chiefOfStaff'

  async function loadAssistants() {
    try {
      const res = await fetch('/api/assistants')
      const data = await res.json()
      assistantList = data.assistants || []
      defaultAssistant = data.default || 'chiefOfStaff'

      pickerEl.innerHTML = ''
      for (const a of assistantList) {
        const opt = document.createElement('option')
        opt.value = a.id
        opt.textContent = a.name
        pickerEl.appendChild(opt)
      }

      // Restore saved selection or use default
      const saved = getAssistantId()
      const valid = assistantList.some(a => a.id === saved)
      pickerEl.value = valid ? saved : defaultAssistant
    } catch (e) {
      console.error('Failed to load assistants', e)
    }
  }

  pickerEl.addEventListener('change', () => {
    const newAssistant = pickerEl.value
    setAssistantId(newAssistant)
    updateLogo(newAssistant)
    // Clear messages and reconnect with new assistant
    messagesEl.innerHTML = ''
    if (ws) ws.close()
  })

  function updateLogo(assistantId) {
    logoEl.textContent = assistantId.toUpperCase()
  }

  // ── WebSocket ──────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws'
    ws = new WebSocket(`${proto}://${location.host}`)

    ws.onopen = () => {
      connected = true
      initialized = false
      dotEl.classList.remove('disconnected')
      statusEl.textContent = 'connected'

      // Send init with session and assistant
      const assistantId = pickerEl.value || getAssistantId() || defaultAssistant
      ws.send(JSON.stringify({
        type: 'init',
        sessionId,
        assistantId,
      }))
    }

    ws.onclose = () => {
      connected = false
      initialized = false
      dotEl.classList.add('disconnected')
      statusEl.textContent = 'disconnected — reconnecting…'
      sendBtn.disabled = true
      setTimeout(connect, 2000)
    }

    ws.onerror = () => {
      ws.close()
    }

    ws.onmessage = (evt) => {
      let msg
      try { msg = JSON.parse(evt.data) } catch { return }
      handleServerMessage(msg)
    }
  }

  function handleServerMessage(msg) {
    switch (msg.type) {
      case 'init_ok':
        initialized = true
        sendBtn.disabled = false
        inputEl.focus()
        updateLogo(msg.assistantId)
        setAssistantId(msg.assistantId)
        pickerEl.value = msg.assistantId
        if (msg.historyLength > 1) {
          appendMessage('system', `Session resumed (${msg.historyLength - 1} messages in history)`)
        }
        break

      case 'init_error':
        appendMessage('error', msg.message || 'Init failed')
        break

      case 'assistant_message_start':
        streaming = true
        streamingEl = appendMessage('assistant', '')
        streamingEl.classList.add('streaming')
        addCursor(streamingEl)
        sendBtn.disabled = true
        break

      case 'chunk':
        if (streamingEl) {
          removeCursor(streamingEl)
          streamingEl.textContent += msg.textDelta
          addCursor(streamingEl)
          scrollToBottom()
        }
        break

      case 'assistant_message_complete':
        if (streamingEl) {
          removeCursor(streamingEl)
          streamingEl.classList.remove('streaming')
          if (msg.text) streamingEl.textContent = msg.text
        }
        streaming = false
        streamingEl = null
        sendBtn.disabled = false
        inputEl.focus()
        break

      case 'error':
        appendMessage('error', msg.message || 'Unknown error')
        streaming = false
        streamingEl = null
        sendBtn.disabled = false
        break
    }
  }

  // ── DOM helpers ────────────────────────
  function appendMessage(role, text) {
    const el = document.createElement('div')
    el.className = `message ${role}`
    el.textContent = text
    messagesEl.appendChild(el)
    scrollToBottom()
    return el
  }

  function addCursor(el) {
    const c = document.createElement('span')
    c.className = 'cursor'
    el.appendChild(c)
  }

  function removeCursor(el) {
    const c = el.querySelector('.cursor')
    if (c) c.remove()
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight
  }

  // ── Input handling ─────────────────────
  function sendMessage() {
    const text = inputEl.value.trim()
    if (!text || !connected || !initialized || streaming) return

    appendMessage('user', text)
    ws.send(JSON.stringify({ type: 'user_message', text }))
    inputEl.value = ''
    autoResize()
  }

  sendBtn.addEventListener('click', sendMessage)

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  })

  // Auto-resize textarea
  function autoResize() {
    inputEl.style.height = 'auto'
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px'
  }
  inputEl.addEventListener('input', autoResize)

  // ── Start ──────────────────────────────
  loadAssistants().then(connect)
})()
</script>
</body>
</html>
