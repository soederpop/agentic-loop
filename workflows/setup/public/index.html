<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>System Setup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #151520;
    --surface: #1c1c28;
    --surface-2: #23232f;
    --border: #2e2e42;
    --text: #e0e0e8;
    --text-dim: #8a8aa2;
    --text-faint: #56566e;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --assistant: #c084fc;
    --success: #39ff14;
    --error: #ff003c;
    --warning: #f59e0b;
    --input-bg: #191924;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  body {
    padding: 16px 20px 40px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Header ──────────────────────────── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-meta .count {
    color: var(--accent);
    font-weight: 600;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }

  /* ── Progress Bar ──────────────────── */
  .progress-container {
    margin-bottom: 24px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-fill.all-good { background: var(--success); }

  /* ── Section Groups ────────────────── */
  .section-group {
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── Capability Cards ──────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: #3a3a52; }
  .card.status-ok { border-left: 3px solid var(--success); }
  .card.status-warning { border-left: 3px solid var(--warning); }
  .card.status-missing { border-left: 3px solid var(--error); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: var(--surface-2); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.warning { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
  .status-dot.missing { background: var(--error); box-shadow: 0 0 6px var(--error); }

  .card-title {
    font-weight: 600;
    font-size: 13px;
    flex: 1;
  }

  .card-status-text {
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-chevron {
    color: var(--text-faint);
    font-size: 10px;
    transition: transform 0.2s;
  }

  .card.expanded .card-chevron { transform: rotate(90deg); }

  .card-body {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid var(--border);
  }

  .card.expanded .card-body { display: block; }

  .card-description {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    margin-bottom: 8px;
  }

  .card-details {
    font-size: 12px;
    color: var(--text);
    background: var(--input-bg);
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    word-break: break-word;
  }

  .card-action {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  /* ── Command Copy ──────────────────── */
  .cmd-block {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--accent);
    flex: 1;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  /* ── Env Key Input ─────────────────── */
  .env-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .env-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .env-input:focus { border-color: var(--accent); }
  .env-input.saved { border-color: var(--success); }

  .save-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 14px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .save-btn:hover { background: var(--accent); color: var(--bg); }
  .save-btn:disabled { opacity: 0.4; pointer-events: none; }

  .save-ok {
    color: var(--success);
    font-size: 14px;
    display: none;
  }
  .save-ok.visible { display: inline; }

  /* ── Loading ───────────────────────── */
  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 0;
    font-size: 13px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>System Setup</h1>
  <div class="header-meta">
    <span id="readyCount"></span>
    <button class="refresh-btn" onclick="refresh()" id="refreshBtn">recheck</button>
  </div>
</div>

<div class="progress-container">
  <div class="progress-label">
    <span id="progressText">Scanning...</span>
    <span id="progressPct"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
</div>

<div id="content">
  <div class="loading">Checking system capabilities</div>
</div>

<script type="module">
  const { default: container } = await import('https://esm.sh/@soederpop/luca@0.0.28/src/browser.ts')
  const Feature = Object.getPrototypeOf(container.feature('vm').constructor)

  // ── SetupApi Feature — wraps all backend fetch calls ──
  class SetupApi extends Feature {
    static shortcut = 'features.setupApi'
    static { Feature.register(this, 'setupApi') }

    static stateSchema = {
      loading: { type: 'boolean', default: false },
      lastError: { type: 'string', default: null },
    }

    static eventsSchema = {
      'status:fetched': 'System status data received from server',
      'status:error': 'Error fetching system status',
      'env:saved': 'Environment variable saved successfully',
      'env:error': 'Error saving environment variable',
    }

    /** Fetch all system capabilities from the backend */
    async fetchStatus() {
      this.state.set('loading', true)
      this.state.set('lastError', null)
      try {
        const res = await fetch('/api/system-status')
        if (!res.ok) throw new Error('Failed to fetch system status')
        const data = await res.json()
        this.emit('status:fetched', data)
        return data
      } catch (err) {
        this.state.set('lastError', err.message)
        this.emit('status:error', err)
        throw err
      } finally {
        this.state.set('loading', false)
      }
    }

    /** Save an env key to the backend .env file */
    async saveEnvKey(key, value) {
      try {
        const res = await fetch('/api/env', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, value }),
        })
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Unknown error' }))
          this.emit('env:error', { key, error: err.error })
          return false
        }
        this.emit('env:saved', { key })
        return true
      } catch (err) {
        this.emit('env:error', { key, error: err.message })
        return false
      }
    }
  }

  // ── SetupStore Feature — manages capabilities data, grouping, progress ──
  class SetupStore extends Feature {
    static shortcut = 'features.setupStore'
    static { Feature.register(this, 'setupStore') }

    static GROUP_LABELS = {
      required: 'Required',
      voice: 'Optional — Voice',
      native: 'Optional — Native App',
      authority: 'Authority Process',
    }

    static GROUP_ORDER = ['required', 'voice', 'native', 'authority']

    static stateSchema = {
      capabilities: { type: 'array', default: [] },
      ready: { type: 'number', default: 0 },
      total: { type: 'number', default: 0 },
      pct: { type: 'number', default: 0 },
    }

    static eventsSchema = {
      'data:updated': 'Capabilities data has been refreshed',
    }

    /** Update store with fresh status data from the API */
    load(data) {
      const { ready, total, capabilities } = data
      this.state.set('capabilities', capabilities)
      this.state.set('ready', ready)
      this.state.set('total', total)
      this.state.set('pct', total > 0 ? Math.round((ready / total) * 100) : 0)
      this.emit('data:updated', data)
    }

    /** Get capabilities organized by group in display order */
    getGrouped() {
      const caps = this.state.get('capabilities') || []
      const groups = {}
      for (const cap of caps) {
        const g = cap.group || 'other'
        if (!groups[g]) groups[g] = []
        groups[g].push(cap)
      }
      return SetupStore.GROUP_ORDER
        .filter(g => groups[g]?.length > 0)
        .map(g => ({
          key: g,
          label: SetupStore.GROUP_LABELS[g] || g,
          items: groups[g],
        }))
    }

    /** Find a capability by its key */
    getCapability(capKey) {
      return (this.state.get('capabilities') || []).find(c => c.capability === capKey)
    }

    /** Filter capabilities by status */
    byStatus(status) {
      return (this.state.get('capabilities') || []).filter(c => c.status === status)
    }

    get allGood() {
      return this.state.get('ready') === this.state.get('total') && this.state.get('total') > 0
    }
  }

  // ── SetupApp Feature — central orchestrator ──
  class SetupApp extends Feature {
    static shortcut = 'features.setupApp'
    static { Feature.register(this, 'setupApp') }

    static stateSchema = {
      initialized: { type: 'boolean', default: false },
      refreshing: { type: 'boolean', default: false },
    }

    static eventsSchema = {
      'ready': 'App fully initialized with first data load',
      'refresh:start': 'Refresh cycle started',
      'refresh:end': 'Refresh cycle completed',
      'env:saved': 'Env key saved and recheck triggered',
    }

    get api() { return this.container.feature('setupApi') }
    get store() { return this.container.feature('setupStore') }

    /** Refresh system status from the server and update the store */
    async refresh() {
      this.state.set('refreshing', true)
      this.emit('refresh:start')
      try {
        const data = await this.api.fetchStatus()
        this.store.load(data)
      } catch (err) {
        console.error('[setup] refresh failed:', err)
      } finally {
        this.state.set('refreshing', false)
        this.emit('refresh:end')
      }
    }

    /** Save an environment variable and recheck after a short delay */
    async saveEnv(key, value) {
      const ok = await this.api.saveEnvKey(key, value)
      if (ok) {
        this.emit('env:saved', { key })
        setTimeout(() => this.refresh(), 500)
      }
      return ok
    }

    /** Start the app — performs the initial status check */
    async start() {
      await this.refresh()
      this.state.set('initialized', true)
      this.emit('ready')
    }

    /** Return a snapshot of the entire app state for debugging / automation */
    snapshot() {
      return {
        initialized: this.state.get('initialized'),
        refreshing: this.state.get('refreshing'),
        ready: this.store.state.get('ready'),
        total: this.store.state.get('total'),
        pct: this.store.state.get('pct'),
        allGood: this.store.allGood,
        groups: this.store.getGrouped().map(g => ({
          key: g.key,
          label: g.label,
          count: g.items.length,
        })),
        missing: this.store.byStatus('missing').map(c => c.capability),
        warnings: this.store.byStatus('warning').map(c => c.capability),
      }
    }
  }

  // ── Get feature instances ──
  const app = container.feature('setupApp')
  const store = container.feature('setupStore')

  window.app = app
  window.luca = container

  // ── UI Helpers ──
  function esc(str) {
    if (!str) return ''
    const d = document.createElement('div')
    d.textContent = str
    return d.innerHTML
  }

  function renderCard(cap, expanded) {
    const cls = `card status-${cap.status}${expanded ? ' expanded' : ''}`
    const statusLabel = cap.status === 'ok' ? 'ready' : cap.status === 'warning' ? 'warning' : 'missing'

    let bodyHtml = `<div class="card-description">${esc(cap.description)}</div>`
    bodyHtml += `<div class="card-details">${esc(cap.details)}</div>`

    if (cap.envKey && cap.status !== 'ok') {
      bodyHtml += `
        <div class="env-input-row">
          <input type="password" class="env-input" id="env-${cap.envKey}"
                 placeholder="Paste ${cap.envKey}">
          <button class="save-btn" data-env-key="${cap.envKey}">save</button>
          <span class="save-ok" id="ok-${cap.envKey}">&#10003;</span>
        </div>`
    }

    if (cap.action && !cap.envKey) {
      bodyHtml += `
        <div class="card-action">
          <div class="cmd-block"><code>${esc(cap.action)}</code></div>
          <button class="copy-btn" data-copy="${esc(cap.action)}">copy</button>
        </div>`
    }

    return `
      <div class="${cls}" data-capability="${cap.capability}">
        <div class="card-header">
          <span class="status-dot ${cap.status}"></span>
          <span class="card-title">${esc(cap.title)}</span>
          <span class="card-status-text">${statusLabel}</span>
          <span class="card-chevron">&#9654;</span>
        </div>
        <div class="card-body">${bodyHtml}</div>
      </div>`
  }

  function renderAll() {
    const ready = store.state.get('ready')
    const total = store.state.get('total')
    const pct = store.state.get('pct')

    document.getElementById('readyCount').innerHTML =
      `<span class="count">${ready}</span> of <span class="count">${total}</span> ready`
    document.getElementById('progressText').textContent =
      ready === total ? 'All systems go' : `${ready} of ${total} capabilities ready`
    document.getElementById('progressPct').textContent = `${pct}%`

    const fill = document.getElementById('progressFill')
    fill.style.width = `${pct}%`
    fill.className = 'progress-fill' + (store.allGood ? ' all-good' : '')

    const groups = store.getGrouped()
    let html = ''
    for (const group of groups) {
      html += `<div class="section-group">`
      html += `<div class="section-title">${group.label}</div>`
      for (const cap of group.items) {
        html += renderCard(cap, cap.status !== 'ok')
      }
      html += `</div>`
    }
    document.getElementById('content').innerHTML = html

    if (window.containerLink) {
      containerLink.emit('setupProgress', {
        ready, total,
        capabilities: store.state.get('capabilities'),
      })
    }
  }

  // ── Event bindings ──

  // Re-render when store data changes
  store.on('data:updated', renderAll)

  // Refresh button
  app.on('refresh:start', () => {
    const btn = document.getElementById('refreshBtn')
    btn.classList.add('spinning')
    btn.textContent = 'checking...'
  })

  app.on('refresh:end', () => {
    const btn = document.getElementById('refreshBtn')
    btn.classList.remove('spinning')
    btn.textContent = 'recheck'
  })

  document.getElementById('refreshBtn').addEventListener('click', () => app.refresh())

  // Delegate click events on the content area
  document.getElementById('content').addEventListener('click', async (e) => {
    // Card header toggle
    const header = e.target.closest('.card-header')
    if (header) {
      header.parentElement.classList.toggle('expanded')
      return
    }

    // Copy button
    const copyBtn = e.target.closest('.copy-btn')
    if (copyBtn) {
      const text = copyBtn.dataset.copy
      try {
        await navigator.clipboard.writeText(text)
        copyBtn.classList.add('copied')
        copyBtn.textContent = 'copied!'
        setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.textContent = 'copy' }, 1500)
      } catch { /* clipboard not available */ }
      return
    }

    // Save env button
    const saveBtn = e.target.closest('.save-btn')
    if (saveBtn) {
      const key = saveBtn.dataset.envKey
      const input = document.getElementById(`env-${key}`)
      const ok = document.getElementById(`ok-${key}`)
      const value = input?.value?.trim()
      if (!value) return

      const success = await app.saveEnv(key, value)
      if (success) {
        input.classList.add('saved')
        ok.classList.add('visible')
      }
      return
    }
  })

  // Env input focus/blur for password reveal
  document.getElementById('content').addEventListener('focusin', (e) => {
    if (e.target.matches('.env-input')) e.target.type = 'text'
  })
  document.getElementById('content').addEventListener('focusout', (e) => {
    if (e.target.matches('.env-input')) e.target.type = 'password'
  })

  // Remove inline onclick from refresh button (we use addEventListener above)
  document.getElementById('refreshBtn').removeAttribute('onclick')

  // Boot
  await app.start()
</script>
</body>
</html>
