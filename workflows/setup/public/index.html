<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>System Setup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #16161f;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --text-faint: #3a3a50;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --assistant: #c084fc;
    --success: #39ff14;
    --error: #ff003c;
    --warning: #f59e0b;
    --input-bg: #0e0e16;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  body {
    padding: 16px 20px 40px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── Header ──────────────────────────── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-meta .count {
    color: var(--accent);
    font-weight: 600;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }

  /* ── Progress Bar ──────────────────── */
  .progress-container {
    margin-bottom: 24px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-fill.all-good { background: var(--success); }

  /* ── Section Groups ────────────────── */
  .section-group {
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── Capability Cards ──────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: #2a2a3e; }
  .card.status-ok { border-left: 3px solid var(--success); }
  .card.status-warning { border-left: 3px solid var(--warning); }
  .card.status-missing { border-left: 3px solid var(--error); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: var(--surface-2); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.warning { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
  .status-dot.missing { background: var(--error); box-shadow: 0 0 6px var(--error); }

  .card-title {
    font-weight: 600;
    font-size: 13px;
    flex: 1;
  }

  .card-status-text {
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-chevron {
    color: var(--text-faint);
    font-size: 10px;
    transition: transform 0.2s;
  }

  .card.expanded .card-chevron { transform: rotate(90deg); }

  .card-body {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid var(--border);
  }

  .card.expanded .card-body { display: block; }

  .card-description {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    margin-bottom: 8px;
  }

  .card-details {
    font-size: 12px;
    color: var(--text);
    background: var(--input-bg);
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    word-break: break-word;
  }

  .card-action {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  /* ── Command Copy ──────────────────── */
  .cmd-block {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--accent);
    flex: 1;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  /* ── Env Key Input ─────────────────── */
  .env-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .env-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .env-input:focus { border-color: var(--accent); }
  .env-input.saved { border-color: var(--success); }

  .save-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 14px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .save-btn:hover { background: var(--accent); color: var(--bg); }
  .save-btn:disabled { opacity: 0.4; pointer-events: none; }

  .save-ok {
    color: var(--success);
    font-size: 14px;
    display: none;
  }
  .save-ok.visible { display: inline; }

  /* ── Loading ───────────────────────── */
  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 0;
    font-size: 13px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>System Setup</h1>
  <div class="header-meta">
    <span id="readyCount"></span>
    <button class="refresh-btn" onclick="refresh()" id="refreshBtn">recheck</button>
  </div>
</div>

<div class="progress-container">
  <div class="progress-label">
    <span id="progressText">Scanning...</span>
    <span id="progressPct"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
</div>

<div id="content">
  <div class="loading">Checking system capabilities</div>
</div>

<script>
const GROUP_LABELS = {
  required: 'Required',
  voice: 'Optional — Voice',
  native: 'Optional — Native App',
  authority: 'Authority Process',
}

const GROUP_ORDER = ['required', 'voice', 'native', 'authority']

let capabilities = []

async function fetchStatus() {
  const res = await fetch('/api/system-status')
  if (!res.ok) throw new Error('Failed to fetch system status')
  return res.json()
}

async function refresh() {
  const btn = document.getElementById('refreshBtn')
  btn.classList.add('spinning')
  btn.textContent = 'checking...'
  try {
    const data = await fetchStatus()
    capabilities = data.capabilities
    render(data)
  } catch (err) {
    console.error(err)
  } finally {
    btn.classList.remove('spinning')
    btn.textContent = 'recheck'
  }
}

function render(data) {
  const { ready, total, capabilities } = data
  const pct = Math.round((ready / total) * 100)

  document.getElementById('readyCount').innerHTML =
    `<span class="count">${ready}</span> of <span class="count">${total}</span> ready`
  document.getElementById('progressText').textContent =
    ready === total ? 'All systems go' : `${ready} of ${total} capabilities ready`
  document.getElementById('progressPct').textContent = `${pct}%`

  const fill = document.getElementById('progressFill')
  fill.style.width = `${pct}%`
  fill.className = 'progress-fill' + (ready === total ? ' all-good' : '')

  // Group capabilities
  const groups = {}
  for (const cap of capabilities) {
    const g = cap.group || 'other'
    if (!groups[g]) groups[g] = []
    groups[g].push(cap)
  }

  let html = ''
  for (const group of GROUP_ORDER) {
    const items = groups[group]
    if (!items || items.length === 0) continue
    html += `<div class="section-group">`
    html += `<div class="section-title">${GROUP_LABELS[group] || group}</div>`
    for (const cap of items) {
      const expanded = cap.status !== 'ok'
      html += renderCard(cap, expanded)
    }
    html += `</div>`
  }

  document.getElementById('content').innerHTML = html

  // Emit presenter event
  if (typeof window !== 'undefined' && window.containerLink) {
    containerLink.emit('setupProgress', { ready, total, capabilities })
  }
}

function renderCard(cap, expanded) {
  const cls = `card status-${cap.status}${expanded ? ' expanded' : ''}`
  const statusLabel = cap.status === 'ok' ? 'ready' : cap.status === 'warning' ? 'warning' : 'missing'

  let bodyHtml = `<div class="card-description">${esc(cap.description)}</div>`
  bodyHtml += `<div class="card-details">${esc(cap.details)}</div>`

  // If it has an envKey, show input
  if (cap.envKey && cap.status !== 'ok') {
    bodyHtml += `
      <div class="env-input-row">
        <input type="password" class="env-input" id="env-${cap.envKey}"
               placeholder="Paste ${cap.envKey}" onfocus="this.type='text'" onblur="this.type='password'">
        <button class="save-btn" onclick="saveEnv('${cap.envKey}')">save</button>
        <span class="save-ok" id="ok-${cap.envKey}">✓</span>
      </div>`
  }

  // If it has an action command, show copy block
  if (cap.action && !cap.envKey) {
    bodyHtml += `
      <div class="card-action">
        <div class="cmd-block"><code>${esc(cap.action)}</code></div>
        <button class="copy-btn" onclick="copyCmd(this, '${esc(cap.action)}')">copy</button>
      </div>`
  }

  return `
    <div class="${cls}" data-capability="${cap.capability}">
      <div class="card-header" onclick="toggleCard(this)">
        <span class="status-dot ${cap.status}"></span>
        <span class="card-title">${esc(cap.title)}</span>
        <span class="card-status-text">${statusLabel}</span>
        <span class="card-chevron">▶</span>
      </div>
      <div class="card-body">${bodyHtml}</div>
    </div>`
}

function toggleCard(header) {
  header.parentElement.classList.toggle('expanded')
}

function esc(str) {
  if (!str) return ''
  const d = document.createElement('div')
  d.textContent = str
  return d.innerHTML
}

async function copyCmd(btn, text) {
  try {
    await navigator.clipboard.writeText(text)
    btn.classList.add('copied')
    btn.textContent = 'copied!'
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'copy' }, 1500)
  } catch { /* clipboard not available */ }
}

async function saveEnv(key) {
  const input = document.getElementById(`env-${key}`)
  const ok = document.getElementById(`ok-${key}`)
  const value = input.value.trim()
  if (!value) return

  const res = await fetch('/api/env', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, value }),
  })

  if (res.ok) {
    input.classList.add('saved')
    ok.classList.add('visible')
    // Recheck after saving
    setTimeout(() => refresh(), 500)
  }
}

// Initial load
refresh()
</script>
</body>
</html>
