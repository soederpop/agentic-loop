<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant Memory</title>
<link rel="stylesheet" href="/shared/base.css">
<style>
  html, body { font-family: 'IBM Plex Mono', 'SF Mono', monospace; font-size: 12px; overflow: hidden; }
  body { display: grid; grid-template-rows: 48px 1fr; }
  .header { display:flex; align-items:center; gap:12px; padding:0 16px; border-bottom:1px solid var(--border); background:var(--surface); }
  .header h1 { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); }
  .header .spacer { flex:1; }
  .btn, .input, .select, textarea { font:inherit; }
  .btn { background:none; color:var(--text-dim); border:1px solid var(--border); border-radius:4px; padding:6px 10px; cursor:pointer; transition:opacity 0.15s; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn.danger { border-color:var(--error); color:var(--error); }
  .btn.primary { border-color:var(--accent); color:var(--accent); }
  .btn.loading { opacity:0.4; pointer-events:none; }
  .toast { position:fixed; bottom:16px; right:16px; background:var(--surface-2); color:var(--text); border:1px solid var(--accent); border-radius:6px; padding:8px 14px; font-size:11px; z-index:999; opacity:0; transition:opacity 0.2s; pointer-events:none; }
  .toast.visible { opacity:1; }
  .confirm-bar { position:fixed; top:0; left:0; right:0; background:var(--surface-2); border-bottom:2px solid var(--error); padding:10px 16px; display:none; align-items:center; gap:12px; z-index:1000; font-size:12px; }
  .confirm-bar.visible { display:flex; }
  .confirm-bar .msg { flex:1; color:var(--text); }
  .confirm-bar .btn { min-width:70px; text-align:center; }
  .main { display:grid; grid-template-columns:260px 340px 1fr; min-height:0; }
  .pane { min-width:0; min-height:0; border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .pane:last-child { border-right:none; }
  .pane-head { padding:10px 12px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; gap:8px; align-items:center; }
  .pane-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); flex:1; }
  .list { flex:1; overflow:auto; padding:8px; }
  .assistant-item, .category-item, .memory-item { border:1px solid var(--border); border-radius:4px; padding:8px 10px; margin-bottom:8px; cursor:pointer; background:var(--surface); }
  .assistant-item.active, .category-item.active, .memory-item.active { border-color:var(--accent); background:var(--accent-dim); }
  .assistant-item .name, .category-item .name { color:var(--text); font-weight:600; }
  .meta, .subtle { color:var(--text-faint); font-size:10px; }
  .memory-item .text { color:var(--text); white-space:pre-wrap; line-height:1.5; margin-top:6px; }
  .detail { flex:1; overflow:auto; padding:12px; }
  .card { border:1px solid var(--border); border-radius:6px; background:var(--surface); margin-bottom:12px; overflow:hidden; }
  .card .head { padding:8px 10px; border-bottom:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); font-size:10px; text-transform:uppercase; letter-spacing:1px; }
  .card .body { padding:10px; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .input, .select, textarea { width:100%; background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:8px 10px; outline:none; }
  textarea { min-height:90px; resize:vertical; }
  pre { margin:0; white-space:pre-wrap; word-break:break-word; font-size:11px; line-height:1.5; color:var(--text-dim); }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .empty { color:var(--text-faint); font-style:italic; padding:12px; }
  .pill { display:inline-block; padding:2px 8px; border:1px solid var(--border); border-radius:999px; color:var(--text-dim); font-size:10px; margin-right:6px; }
</style>
</head>
<body>
<div class="header">
  <h1>Assistant Memory</h1>
  <span class="subtle" id="status">Choose an assistant</span>
  <div class="spacer"></div>
  <button class="btn" id="refreshBtn">refresh</button>
</div>
<div class="main">
  <div class="pane">
    <div class="pane-head"><span class="pane-title">Assistants</span></div>
    <div class="list" id="assistantsList"></div>
  </div>
  <div class="pane">
    <div class="pane-head"><span class="pane-title">Categories</span><button class="btn" id="newMemoryBtn">new</button></div>
    <div class="list" id="categoriesList"></div>
  </div>
  <div class="pane">
    <div class="pane-head"><span class="pane-title">Memory Inspector</span></div>
    <div class="detail" id="detail"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="confirm-bar" id="confirmBar"><span class="msg" id="confirmMsg"></span><button class="btn danger" id="confirmYes">confirm</button><button class="btn" id="confirmNo">cancel</button></div>
<script>
const API = '/api/workflows/assistant-memory';
const state = { assistants: [], activeAssistant: null, summary: null, activeCategory: null, memories: [], activeMemory: null, searchResults: null };
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg, duration=2000) { const el=$('#toast'); el.textContent=msg; el.classList.add('visible'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('visible'), duration); }
async function withLoading(btn, fn) {
  if (!btn || btn.classList.contains('loading')) return;
  const orig = btn.textContent; btn.classList.add('loading'); btn.textContent = orig + '…';
  try { await fn(); } finally { btn.classList.remove('loading'); btn.textContent = orig; }
}
function inlineConfirm(msg) {
  return new Promise(resolve => {
    const bar = $('#confirmBar'), msgEl = $('#confirmMsg');
    msgEl.textContent = msg; bar.classList.add('visible');
    const cleanup = () => { bar.classList.remove('visible'); $('#confirmYes').onclick = null; $('#confirmNo').onclick = null; };
    $('#confirmYes').onclick = () => { cleanup(); resolve(true); };
    $('#confirmNo').onclick = () => { cleanup(); resolve(false); };
  });
}
async function api(path, opts={}) {
  const res = await fetch(API + path, { headers:{'Content-Type':'application/json'}, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
  return res.json();
}
function setStatus(text) { $('#status').textContent = text; }
function pretty(v) { try { return JSON.stringify(typeof v === 'string' ? JSON.parse(v) : v, null, 2); } catch { return String(v ?? ''); } }
async function loadAssistants() {
  const data = await api('/assistants');
  state.assistants = data.assistants || [];
  renderAssistants();
}
function renderAssistants() {
  $('#assistantsList').innerHTML = state.assistants.map(a => `<div class="assistant-item${a.id===state.activeAssistant?' active':''}" data-id="${esc(a.id)}"><div class="name">${esc(a.id)}</div><div class="meta">namespace: ${esc(a.id)}</div></div>`).join('') || '<div class="empty">No assistants found</div>';
  $('#assistantsList').querySelectorAll('.assistant-item').forEach(el => el.addEventListener('click', () => selectAssistant(el.dataset.id)));
}
async function selectAssistant(id) {
  state.activeAssistant = id; state.activeCategory = null; state.activeMemory = null; state.searchResults = null;
  setStatus(`Loading ${id}...`);
  renderAssistants();
  state.summary = await api(`/assistants/${id}/summary`);
  state.memories = state.summary?.exported?.memories || [];
  renderCategories();
  renderDetail();
  setStatus(`assistant:${id} · ${state.summary.total} memories · epoch ${state.summary.epoch}`);
}
function renderCategories() {
  const cats = state.summary?.categories || [];
  $('#categoriesList').innerHTML = cats.map(c => `<div class="category-item${c.category===state.activeCategory?' active':''}" data-category="${esc(c.category)}"><div class="name">${esc(c.category)}</div><div class="meta">${c.count} memories</div></div>`).join('') || '<div class="empty">No categories yet</div>';
  $('#categoriesList').querySelectorAll('.category-item').forEach(el => el.addEventListener('click', () => selectCategory(el.dataset.category)));
}
async function selectCategory(category) {
  state.activeCategory = category; state.activeMemory = null; state.searchResults = null;
  const data = await api(`/assistants/${state.activeAssistant}/category/${encodeURIComponent(category)}`);
  state.memories = data.memories || [];
  renderCategories();
  renderDetail();
}
function renderDetail() {
  const summary = state.summary;
  if (!state.activeAssistant || !summary) { $('#detail').innerHTML = '<div class="empty">Select an assistant to inspect memory</div>'; return; }
  const memoryList = (state.searchResults || state.memories || []).map(m => {
    const mem = m.document ? m : m.record || m;
    const active = state.activeMemory && Number(state.activeMemory.id) === Number(mem.id);
    return `<div class="memory-item${active?' active':''}" data-id="${mem.id}"><div class="meta">#${mem.id} · ${esc(mem.category || state.activeCategory || '')}</div><div class="text">${esc((mem.document || '').slice(0, 220))}</div></div>`;
  }).join('') || '<div class="empty">No memories loaded</div>';

  $('#detail').innerHTML = `
    <div class="toolbar">
      <span class="pill">namespace: ${esc(summary.namespace)}</span>
      <span class="pill">epoch: ${esc(summary.epoch)}</span>
      <span class="pill">total: ${esc(summary.total)}</span>
      <button class="btn" id="incEpochBtn">increment epoch</button>
      <button class="btn" id="exportBtn">export</button>
      <button class="btn danger" id="wipeAllBtn">wipe all</button>
    </div>
    <div class="card">
      <div class="head">Search semantic memory</div>
      <div class="body">
        <div class="row"><input class="input" id="searchCategory" placeholder="category" value="${esc(state.activeCategory || '')}"><input class="input" id="searchQuery" placeholder="search query"></div>
        <div class="row" style="margin-top:8px"><input class="input" id="searchN" type="number" value="10" placeholder="results"><button class="btn primary" id="runSearchBtn">search</button></div>
      </div>
    </div>
    <div class="card">
      <div class="head">Create memory / event</div>
      <div class="body">
        <div class="row"><input class="input" id="newCategory" placeholder="category" value="${esc(state.activeCategory || '')}"><input class="input" id="newUniqueThreshold" type="number" step="0.01" placeholder="unique threshold (optional)"></div>
        <textarea id="newText" placeholder="memory text"></textarea>
        <textarea id="newMetadata" placeholder='metadata JSON, e.g. {"source":"chat","confidence":0.9}'></textarea>
        <div class="row"><button class="btn primary" id="createMemoryBtn">create</button><button class="btn" id="createUniqueBtn">create unique</button><button class="btn" id="createEventBtn">create event</button></div>
      </div>
    </div>
    <div class="card">
      <div class="head">Category / import tools</div>
      <div class="body">
        <div class="row"><input class="input" id="wipeCategoryInput" placeholder="category to wipe" value="${esc(state.activeCategory || '')}"><button class="btn danger" id="wipeCategoryBtn">wipe category</button></div>
        <textarea id="importJson" placeholder="paste export JSON here"></textarea>
        <div class="row"><button class="btn" id="importReplaceBtn">import replace</button><button class="btn" id="importMergeBtn">import merge</button></div>
      </div>
    </div>
    <div class="row" style="align-items:stretch">
      <div class="card" style="flex:1; min-width:260px">
        <div class="head">Loaded memories</div>
        <div class="body">${memoryList}</div>
      </div>
      <div class="card" style="flex:1.2">
        <div class="head">Selected memory / recent events</div>
        <div class="body" id="memoryInspector">${renderInspector()}</div>
      </div>
    </div>
  `;

  $('#incEpochBtn').onclick = async function() { await withLoading(this, async () => { await api(`/assistants/${state.activeAssistant}/epoch`, { method:'POST', body:{ increment:true } }); await selectAssistant(state.activeAssistant); toast('Epoch incremented'); }); };
  $('#exportBtn').onclick = async function() { await withLoading(this, async () => { const data = await api(`/assistants/${state.activeAssistant}/export`); navigator.clipboard.writeText(JSON.stringify(data.export, null, 2)); toast('Export copied to clipboard'); }); };
  $('#wipeAllBtn').onclick = async function() { if (!await inlineConfirm('Wipe all memories for this assistant?')) return; await withLoading(this, async () => { await api(`/assistants/${state.activeAssistant}`, { method:'DELETE' }); await selectAssistant(state.activeAssistant); toast('All memories wiped'); }); };
  $('#runSearchBtn').onclick = async function() { await withLoading(this, runSearch); };
  $('#createMemoryBtn').onclick = async function() { await withLoading(this, () => createMemory(false)); };
  $('#createUniqueBtn').onclick = async function() { await withLoading(this, () => createMemory(true)); };
  $('#createEventBtn').onclick = async function() { await withLoading(this, createEvent); };
  $('#wipeCategoryBtn').onclick = async function() { await withLoading(this, wipeCategory); };
  $('#importReplaceBtn').onclick = async function() { await withLoading(this, () => importJson(true)); };
  $('#importMergeBtn').onclick = async function() { await withLoading(this, () => importJson(false)); };
  $('#detail').querySelectorAll('.memory-item').forEach(el => el.onclick = () => { const all = state.searchResults || state.memories || []; const found = all.map(x => x.document ? x : x.record || x).find(m => Number(m.id) === Number(el.dataset.id)); state.activeMemory = found || null; $('#memoryInspector').innerHTML = renderInspector(); $('#detail').querySelectorAll('.memory-item').forEach(x => x.classList.toggle('active', x === el)); });
}
function renderInspector() {
  if (state.activeMemory) {
    const m = state.activeMemory;
    return `<div class="meta">#${m.id} · ${esc(m.category)}</div>
      <textarea id="editText">${esc(m.document || '')}</textarea>
      <textarea id="editMetadata">${esc(JSON.stringify(m.metadata || {}, null, 2))}</textarea>
      <div class="row"><button class="btn primary" onclick="saveMemory()">save</button><button class="btn danger" onclick="deleteMemory()">delete</button></div>
      <div class="card" style="margin-top:10px"><div class="head">Raw</div><div class="body"><pre>${esc(pretty(m))}</pre></div></div>`;
  }
  const events = state.summary?.recentEvents || [];
  return events.length ? `<pre>${esc(pretty(events))}</pre>` : '<div class="empty">Select a memory or create one</div>';
}
async function runSearch() {
  const category = $('#searchCategory').value.trim();
  const query = $('#searchQuery').value.trim();
  const n = $('#searchN').value.trim();
  if (!category || !query) { toast('category + query required'); return; }
  const data = await api(`/assistants/${state.activeAssistant}/search?category=${encodeURIComponent(category)}&query=${encodeURIComponent(query)}&nResults=${encodeURIComponent(n || '10')}`);
  state.searchResults = (data.results || []).map(r => ({ ...r, record: { ...r, document: r.document || r.text || r.record?.document || '' } }));
  state.activeMemory = null;
  renderDetail();
}
async function createMemory(unique) {
  const category = $('#newCategory').value.trim();
  const text = $('#newText').value.trim();
  const rawMeta = $('#newMetadata').value.trim();
  const threshold = $('#newUniqueThreshold').value.trim();
  if (!category || !text) { toast('category + text required'); return; }
  const metadata = rawMeta ? JSON.parse(rawMeta) : {};
  const data = await api(`/assistants/${state.activeAssistant}/memories`, { method:'POST', body:{ category, text, metadata, unique, similarityThreshold: threshold ? Number(threshold) : undefined } });
  if (data.record === null) { toast('Duplicate memory skipped by similarity threshold'); return; }
  await selectAssistant(state.activeAssistant);
  if (category) await selectCategory(category);
  toast('Memory created');
}
async function createEvent() {
  const text = $('#newText').value.trim();
  const rawMeta = $('#newMetadata').value.trim();
  if (!text) { toast('text required'); return; }
  await api(`/assistants/${state.activeAssistant}/events`, { method:'POST', body:{ text, metadata: rawMeta ? JSON.parse(rawMeta) : {} } });
  await selectAssistant(state.activeAssistant);
  toast('Event created');
}
async function wipeCategory() {
  const category = $('#wipeCategoryInput').value.trim();
  if (!category) { toast('category required'); return; }
  if (!await inlineConfirm(`Wipe category "${category}"?`)) return;
  const result = await api(`/assistants/${state.activeAssistant}/category/${encodeURIComponent(category)}`, { method:'DELETE' });
  state.activeCategory = null; state.memories = [];
  await selectAssistant(state.activeAssistant);
  toast(`Wiped "${category}" (${result.deleted ?? 0} deleted)`);
}
async function importJson(replace) {
  const raw = $('#importJson').value.trim();
  if (!raw) { toast('paste JSON first'); return; }
  await api(`/assistants/${state.activeAssistant}/import`, { method:'POST', body:{ data: JSON.parse(raw), replace } });
  await selectAssistant(state.activeAssistant);
}
window.saveMemory = async function() {
  if (!state.activeMemory) return;
  const text = $('#editText').value;
  const metadata = JSON.parse($('#editMetadata').value || '{}');
  const cat = state.activeMemory.category;
  await api(`/assistants/${state.activeAssistant}/category/${encodeURIComponent(cat)}/${state.activeMemory.id}`, { method:'PUT', body:{ text, metadata } });
  await selectCategory(cat);
  toast('Memory saved');
};
window.deleteMemory = async function() {
  if (!state.activeMemory) return;
  if (!await inlineConfirm(`Delete memory #${state.activeMemory.id}?`)) return;
  const cat = state.activeMemory.category;
  const memId = state.activeMemory.id;
  await api(`/assistants/${state.activeAssistant}/category/${encodeURIComponent(cat)}/${memId}`, { method:'DELETE' });
  state.activeMemory = null;
  await selectAssistant(state.activeAssistant);
  await selectCategory(cat);
  toast(`Memory #${memId} deleted`);
};
$('#refreshBtn').onclick = async () => { if (state.activeAssistant) await selectAssistant(state.activeAssistant); else await loadAssistants(); };
$('#newMemoryBtn').onclick = () => document.getElementById('newText')?.focus();
loadAssistants();
const hash = location.hash.slice(1); if (hash) setTimeout(() => selectAssistant(hash), 200);
</script>
</body>
</html>
