<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ideas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #151520;
    --surface: #1c1c28;
    --surface-2: #23232f;
    --surface-3: #2a2a38;
    --border: #2e2e42;
    --border-hover: #3a3a52;
    --text: #e0e0e8;
    --text-dim: #8a8aa2;
    --text-faint: #56566e;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --assistant: #c084fc;
    --assistant-dim: #c084fc18;
    --success: #39ff14;
    --error: #ff003c;
    --warning: #f59e0b;
    --input-bg: #191924;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  body {
    display: flex;
    flex-direction: column;
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 20px;
    height: 100vh;
  }

  /* ── Header ──────────────────────────── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .header-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .header-meta .count {
    color: var(--accent);
    font-weight: 600;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .header-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .header-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .header-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .header-btn.chat-btn.active {
    border-color: var(--assistant);
    color: var(--assistant);
    background: var(--assistant-dim);
  }

  /* ── Filters ─────────────────────────── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
    align-items: center;
  }

  .search-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder {
    color: var(--text-faint);
  }

  .filter-group {
    display: flex;
    gap: 4px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .filter-btn.active.spark { border-color: var(--text-dim); color: var(--text-dim); background: #8a8aa220; }
  .filter-btn.active.exploring { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .filter-btn.active.ready { border-color: var(--success); color: var(--success); background: #39ff1418; }
  .filter-btn.active.parked { border-color: var(--warning); color: var(--warning); background: #f59e0b18; }
  .filter-btn.active.promoted { border-color: var(--assistant); color: var(--assistant); background: #c084fc18; }

  .filter-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 4px;
  }

  .goal-select, .assistant-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    max-width: 200px;
  }

  .goal-select:focus, .assistant-select:focus { border-color: var(--accent); }

  .tag-filter {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .tag-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-faint);
    font-family: inherit;
    font-size: 10px;
    padding: 2px 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag-btn:hover { color: var(--text-dim); border-color: var(--border-hover); }
  .tag-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  .clear-filters {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    padding: 4px 6px;
    text-decoration: underline;
  }

  .clear-filters:hover { color: var(--text-dim); }

  /* ── Summary bar ─────────────────────── */
  .summary-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .summary-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .summary-stat .num {
    font-weight: 700;
  }

  .summary-stat.spark .num { color: var(--text-dim); }
  .summary-stat.exploring .num { color: var(--accent); }
  .summary-stat.ready .num { color: var(--success); }
  .summary-stat.parked .num { color: var(--warning); }
  .summary-stat.promoted .num { color: var(--assistant); }

  /* ── Main layout ─────────────────────── */
  .main {
    display: flex;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  /* ── Ideas list ──────────────────────── */
  .ideas-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 4px;
  }

  .ideas-list::-webkit-scrollbar { width: 4px; }
  .ideas-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .idea-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    animation: fadeIn 0.15s ease-out;
  }

  .idea-row:hover {
    border-color: var(--border-hover);
    background: var(--surface-2);
  }

  .idea-row.selected {
    border-color: var(--accent);
    background: var(--surface-2);
  }

  .idea-row-header {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }

  .idea-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .idea-status-dot.spark { background: var(--text-dim); }
  .idea-status-dot.exploring { background: var(--accent); }
  .idea-status-dot.ready { background: var(--success); }
  .idea-status-dot.parked { background: var(--warning); }
  .idea-status-dot.promoted { background: var(--assistant); }

  .idea-row-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }

  .idea-row-status {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .idea-row-status.spark { background: #8a8aa220; color: var(--text-dim); }
  .idea-row-status.exploring { background: var(--accent-dim); color: var(--accent); }
  .idea-row-status.ready { background: #39ff1418; color: var(--success); }
  .idea-row-status.parked { background: #f59e0b18; color: var(--warning); }
  .idea-row-status.promoted { background: #c084fc18; color: var(--assistant); }

  .idea-row-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding-left: 16px;
  }

  .idea-goal-label {
    font-size: 10px;
    color: var(--assistant);
    background: #c084fc10;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .idea-tag {
    font-size: 10px;
    color: var(--text-faint);
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 2px;
  }

  /* ── Detail panel ────────────────────── */
  .detail-panel {
    width: 420px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .detail-panel.empty {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .detail-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .detail-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .detail-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .detail-body::-webkit-scrollbar { width: 4px; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-body h2 { font-size: 14px; font-weight: 700; color: var(--accent); margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .detail-body h2:first-child { margin-top: 0; }
  .detail-body h3 { font-size: 13px; font-weight: 700; color: var(--text); margin: 16px 0 6px; }
  .detail-body p { margin-bottom: 10px; }
  .detail-body ul, .detail-body ol { margin-bottom: 10px; padding-left: 20px; }
  .detail-body li { margin-bottom: 4px; }
  .detail-body code { background: var(--bg); padding: 1px 4px; border-radius: 3px; font-size: 12px; color: var(--accent); }
  .detail-body pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin-bottom: 10px; font-size: 12px; line-height: 1.5; }
  .detail-body pre code { background: none; padding: 0; color: var(--text); }
  .detail-body strong { color: var(--text); font-weight: 700; }
  .detail-body a { color: var(--accent); text-decoration: none; }
  .detail-body a:hover { text-decoration: underline; }
  .detail-body table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 12px; }
  .detail-body table th, .detail-body table td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
  .detail-body table th { background: var(--surface-2); color: var(--text-dim); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-body blockquote { border-left: 3px solid var(--accent); margin: 0 0 10px; padding: 4px 12px; color: var(--text-dim); }
  .detail-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── Chat panel ──────────────────────── */
  .chat-panel {
    width: 380px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: none;
    flex-direction: column;
  }

  .chat-panel.open {
    display: flex;
  }

  .chat-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-header-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--assistant);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .chat-header-actions {
    display: flex;
    gap: 4px;
  }

  .chat-action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-faint);
    font-family: inherit;
    font-size: 10px;
    padding: 2px 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chat-action-btn:hover { color: var(--text-dim); border-color: var(--border-hover); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-msg {
    max-width: 90%;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    animation: fadeIn 0.15s ease-out;
    word-break: break-word;
  }

  .chat-msg.user {
    align-self: flex-end;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--text);
  }

  .chat-msg.assistant {
    align-self: flex-start;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .chat-msg.assistant .msg-content h2 { font-size: 13px; font-weight: 700; color: var(--assistant); margin: 12px 0 6px; }
  .chat-msg.assistant .msg-content h3 { font-size: 12px; font-weight: 700; color: var(--text); margin: 10px 0 4px; }
  .chat-msg.assistant .msg-content p { margin-bottom: 8px; }
  .chat-msg.assistant .msg-content ul { margin-bottom: 8px; padding-left: 16px; }
  .chat-msg.assistant .msg-content li { margin-bottom: 2px; }
  .chat-msg.assistant .msg-content code { background: var(--bg); padding: 1px 3px; border-radius: 2px; font-size: 11px; color: var(--accent); }
  .chat-msg.assistant .msg-content strong { color: var(--text); font-weight: 700; }
  .chat-msg.assistant .msg-content a { color: var(--accent); }

  .chat-msg.system {
    align-self: center;
    background: none;
    color: var(--text-faint);
    font-size: 10px;
    text-align: center;
    padding: 4px;
  }

  .chat-msg .tool-indicator {
    font-size: 10px;
    color: var(--text-faint);
    padding: 3px 6px;
    background: var(--bg);
    border-radius: 3px;
    margin-top: 4px;
    display: inline-block;
  }

  .chat-typing {
    align-self: flex-start;
    color: var(--text-faint);
    font-size: 11px;
    padding: 4px 12px;
    display: none;
  }

  .chat-typing.visible {
    display: block;
  }

  .chat-typing span {
    animation: blink 1.2s infinite;
  }
  .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .chat-typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 60%, 100% { opacity: 0.2; }
    30% { opacity: 1; }
  }

  .chat-input-area {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    resize: none;
    min-height: 36px;
    max-height: 100px;
  }

  .chat-input:focus { border-color: var(--assistant); }

  .chat-input::placeholder { color: var(--text-faint); }

  .chat-send-btn {
    background: var(--assistant-dim);
    border: 1px solid var(--assistant);
    border-radius: 6px;
    color: var(--assistant);
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: flex-end;
  }

  .chat-send-btn:hover { background: #c084fc30; }
  .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Status panel ────────────────────── */
  .status-panel {
    display: none;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    animation: fadeIn 0.15s ease-out;
  }

  .status-panel.open {
    display: block;
  }

  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .status-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }

  .status-card-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  .status-card-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .status-card-detail {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .status-commits {
    margin-top: 6px;
  }

  .status-commit {
    font-size: 11px;
    color: var(--text-dim);
    padding: 3px 0;
    display: flex;
    gap: 6px;
  }

  .status-commit .hash {
    color: var(--accent);
    font-weight: 600;
  }

  .status-commit .ago {
    color: var(--text-faint);
    margin-left: auto;
    flex-shrink: 0;
  }

  .status-projects {
    margin-top: 4px;
  }

  .status-project {
    font-size: 11px;
    padding: 3px 0;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .status-project-status {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .status-project-status.building { color: var(--accent); background: var(--accent-dim); }
  .status-project-status.in_progress { color: var(--warning); background: #f59e0b18; }
  .status-project-status.completed { color: var(--success); background: #39ff1418; }
  .status-project-status.draft { color: var(--text-dim); background: #8a8aa220; }
  .status-project-status.approved { color: var(--assistant); background: var(--assistant-dim); }

  /* ── Empty / loading states ──────────── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-faint);
    font-size: 12px;
  }

  .empty-state .hint {
    margin-top: 6px;
    color: var(--text-dim);
    font-size: 11px;
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 800px) {
    .main { flex-direction: column; }
    .detail-panel { width: 100%; max-height: 50vh; }
    .chat-panel { width: 100%; max-height: 50vh; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>IDEAS</h1>
  <div class="header-meta">
    <span><span class="count" id="total-count">-</span> ideas</span>
    <span id="filter-info"></span>
  </div>
  <div class="header-actions">
    <button class="header-btn status-btn" id="toggle-status">STATUS</button>
    <button class="header-btn chat-btn" id="toggle-chat">CHAT</button>
  </div>
</div>

<div class="status-panel" id="status-panel"></div>

<div class="filters" id="filters">
  <input type="text" class="search-input" id="search" placeholder="Search ideas...">
  <div class="filter-sep"></div>
  <div class="filter-group" id="status-filters"></div>
  <div class="filter-sep"></div>
  <select class="goal-select" id="goal-filter">
    <option value="">All goals</option>
  </select>
  <div class="filter-sep"></div>
  <div class="tag-filter" id="tag-filters"></div>
  <button class="clear-filters" id="clear-filters" style="display:none">clear filters</button>
</div>

<div class="summary-bar" id="summary-bar"></div>

<div class="main">
  <div class="ideas-list" id="ideas-list">
    <div class="loading-state">Loading ideas...</div>
  </div>
  <div class="detail-panel empty" id="detail-panel">
    <div class="empty-state">Select an idea to view details</div>
  </div>
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-header-title">CHAT</span>
        <select class="assistant-select" id="assistant-select"></select>
      </div>

      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg system">Ask anything about your ideas, goals, or next steps.</div>
    </div>
    <div class="chat-typing" id="chat-typing">
      <span>.</span><span>.</span><span>.</span>
    </div>

      <button class="chat-send-btn" id="chat-send">Send</button>

<script type="module">
  const API = window.location.origin

  // ── Load Luca browser container (default export is the singleton) ──
  const { default: container } = await import('https://esm.sh/@soederpop/luca@0.0.28/src/browser.ts')
  const Feature = Object.getPrototypeOf(container.feature('vm').constructor)

  // ── Utility ─────────────────────────────
  function esc(str) {
    const d = document.createElement('div')
    d.textContent = String(str || '')
    return d.innerHTML
  }

  function renderMarkdown(text) {
    if (!text) return ''
    text = text.replace(/^#\s+[^\n]+\n*/m, '')
    let html = esc(text)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`)
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>')
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>')
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>')
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>')
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    html = html.replace(/^---$/gm, '<hr>')
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>')
    html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`)
    html = html.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, headerRow, bodyRows) => {
      const headers = headerRow.split('|').map(h => h.trim()).filter(Boolean)
      const rows = bodyRows.trim().split('\n').map(r => r.split('|').map(c => c.trim()).filter(Boolean))
      return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`
    })
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    html = html.replace(/\n\n+/g, '</p><p>')
    html = '<p>' + html + '</p>'
    html = html.replace(/<p>\s*<\/p>/g, '')
    html = html.replace(/<p>\s*(<h[23]>)/g, '$1')
    html = html.replace(/(<\/h[23]>)\s*<\/p>/g, '$1')
    html = html.replace(/<p>\s*(<pre>)/g, '$1')
    html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1')
    html = html.replace(/<p>\s*(<ul>)/g, '$1')
    html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1')
    html = html.replace(/<p>\s*(<table>)/g, '$1')
    html = html.replace(/(<\/table>)\s*<\/p>/g, '$1')
    html = html.replace(/<p>\s*(<blockquote>)/g, '$1')
    html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1')
    html = html.replace(/<p>\s*(<hr>)/g, '$1')
    html = html.replace(/(<hr>)\s*<\/p>/g, '$1')
    return html
  }

  // ═══════════════════════════════════════════
  // Feature: IdeasApi — wraps all fetch() calls
  // ═══════════════════════════════════════════
  class IdeasApi extends Feature {
    static shortcut = 'features.ideasApi'
    static { Feature.register(this, 'ideasApi') }

    /** Fetch all ideas and goals from the backend */
    async fetchIdeas() {
      const res = await fetch(`${API}/api/ideas`)
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const data = await res.json()
      this.emit('ideas:fetched', data)
      return data
    }

    /** Fetch available assistants */
    async fetchAssistants() {
      const res = await fetch(`${API}/api/assistants`)
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      return res.json()
    }

    /** Fetch status data */
    async fetchStatus() {
      const res = await fetch(`${API}/api/status`)
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      return res.json()
    }

    /** Send a chat message and return an SSE reader */
    async sendMessage(message, assistantName) {
      const res = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, assistant: assistantName }),
      })
      return res
    }

    /** Clear chat for an assistant */
    async clearChat(assistantName) {
      const res = await fetch(`${API}/api/chat`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assistant: assistantName }),
      })
      return res.json()
    }
  }

  // ═══════════════════════════════════════════
  // Feature: IdeasStore — data, filtering, sorting
  // ═══════════════════════════════════════════
  class IdeasStore extends Feature {
    static shortcut = 'features.ideasStore'
    static { Feature.register(this, 'ideasStore') }

    static STATUS_ORDER = { exploring: 0, spark: 1, ready: 2, parked: 3, promoted: 4 }
    static STATUSES = ['spark', 'exploring', 'ready', 'parked', 'promoted']

    _ideas = []
    _goals = []
    _tags = []
    _selectedId = null
    _filters = { search: '', statuses: new Set(), goal: '', tag: '' }

    get ideas() { return this._ideas }
    get goals() { return this._goals }
    get tags() { return this._tags }
    get selectedId() { return this._selectedId }
    get filters() { return this._filters }

    setData(data) {
      this._ideas = data.ideas || []
      this._goals = data.goals || []
      const tagSet = new Set()
      for (const idea of this._ideas) {
        for (const t of idea.tags) tagSet.add(t)
      }
      this._tags = [...tagSet].sort()
      this.state.set('totalCount', this._ideas.length)
      this.state.set('goalCount', this._goals.length)
      this.state.set('tagCount', this._tags.length)
      this.emit('data:loaded')
    }

    statusCounts() {
      const counts = {}
      for (const idea of this._ideas) {
        counts[idea.status] = (counts[idea.status] || 0) + 1
      }
      return counts
    }

    getFiltered() {
      const f = this._filters
      return this._ideas
        .filter(idea => {
          if (f.search) {
            const haystack = (idea.title + ' ' + idea.body + ' ' + (idea.tags || []).join(' ')).toLowerCase()
            if (!haystack.includes(f.search)) return false
          }
          if (f.statuses.size > 0 && !f.statuses.has(idea.status)) return false
          if (f.goal && idea.goal !== f.goal) return false
          if (f.tag && !(idea.tags || []).includes(f.tag)) return false
          return true
        })
        .sort((a, b) => (IdeasStore.STATUS_ORDER[a.status] ?? 5) - (IdeasStore.STATUS_ORDER[b.status] ?? 5))
    }

    hasActiveFilters() {
      const f = this._filters
      return !!(f.search || f.statuses.size > 0 || f.goal || f.tag)
    }

    setFilter(key, value) {
      this._filters[key] = value
      this.state.set('hasFilters', this.hasActiveFilters())
      this.emit('filters:changed')
    }

    toggleStatus(status) {
      if (this._filters.statuses.has(status)) {
        this._filters.statuses.delete(status)
      } else {
        this._filters.statuses.add(status)
      }
      this.state.set('hasFilters', this.hasActiveFilters())
      this.emit('filters:changed')
      return this._filters.statuses.has(status)
    }

    clearFilters() {
      this._filters = { search: '', statuses: new Set(), goal: '', tag: '' }
      this.state.set('hasFilters', false)
      this.emit('filters:cleared')
      this.emit('filters:changed')
    }

    selectIdea(id) {
      this._selectedId = id
      const idea = this._ideas.find(i => i.id === id)
      this.state.set('selectedId', id)
      this.emit('idea:selected', idea)
      return idea
    }

    findById(id) {
      return this._ideas.find(i => i.id === id)
    }

    navigate(direction) {
      const filtered = this.getFiltered()
      if (filtered.length === 0) return null
      const idx = filtered.findIndex(i => i.id === this._selectedId)
      let next
      if (direction === 'next') {
        next = filtered[idx + 1] || filtered[0]
      } else {
        next = filtered[idx - 1] || filtered[filtered.length - 1]
      }
      return next ? this.selectIdea(next.id) : null
    }
  }

  // ═══════════════════════════════════════════
  // Feature: ChatManager — manages chat state
  // ═══════════════════════════════════════════
  class ChatManager extends Feature {
    static shortcut = 'features.chatManager'
    static { Feature.register(this, 'chatManager') }

    _messages = []
    _assistants = []
    _currentAssistant = 'chiefOfStaff'
    _sending = false

    get messages() { return this._messages }
    get assistants() { return this._assistants }
    get currentAssistant() { return this._currentAssistant }
    get sending() { return this._sending }

    get api() { return this.container.feature('ideasApi') }

    async loadAssistants() {
      try {
        const data = await this.api.fetchAssistants()
        this._assistants = data.assistants || []
        this._currentAssistant = data.default || this._assistants[0]?.name || 'chiefOfStaff'
        this.emit('assistants:loaded')
      } catch (err) {
        console.error('Failed to load assistants:', err)
      }
    }

    setAssistant(name) {
      if (name !== this._currentAssistant) {
        this._currentAssistant = name
        this._messages = []
        this.emit('assistant:changed')
        this.emit('messages:updated')
      }
    }

    async sendMessage(text) {
      if (this._sending || !text.trim()) return

      this._sending = true
      this._messages.push({ role: 'user', content: text })
      this.emit('messages:updated')
      this.emit('sending:start')

      try {
        const res = await this.api.sendMessage(text, this._currentAssistant)

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }))
          this._messages.push({ role: 'assistant', content: err.error || 'Request failed' })
          this.emit('messages:updated')
          return
        }

        // Parse SSE stream
        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let assistantText = ''
        let buffer = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          buffer += decoder.decode(value, { stream: true })
          const lines = buffer.split('\n')
          buffer = lines.pop() || ''

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              const event = line.slice(7)
              continue
            }
            if (line.startsWith('data: ')) {
              const raw = line.slice(6)
              try {
                const parsed = JSON.parse(raw)
                // Determine the event from the previous line context
                if (parsed.text !== undefined) {
                  assistantText += parsed.text
                  this.emit('chunk', assistantText)
                } else if (parsed.response !== undefined) {
                  assistantText = parsed.response
                } else if (parsed.name && parsed.args !== undefined) {
                  this.emit('tool:call', parsed)
                } else if (parsed.name && parsed.result !== undefined) {
                  this.emit('tool:result', parsed)
                } else if (parsed.message) {
                  // error event
                  assistantText = `Error: ${parsed.message}`
                }
              } catch {}
            }
          }
        }

        if (assistantText) {
          this._messages.push({ role: 'assistant', content: assistantText })
        }
        this.emit('messages:updated')
      } catch (err) {
        this._messages.push({ role: 'assistant', content: `Error: ${err.message}` })
        this.emit('messages:updated')
      } finally {
        this._sending = false
        this.emit('sending:done')
      }
    }

    async clearConversation() {
      try {
        await this.api.clearChat(this._currentAssistant)
      } catch {}
      this._messages = []
      this.emit('messages:updated')
    }
  }

  // ═══════════════════════════════════════════
  // Feature: IdeasApp — central orchestrator
  // ═══════════════════════════════════════════
  class IdeasApp extends Feature {
    static shortcut = 'features.ideasApp'
    static { Feature.register(this, 'ideasApp') }

    get api() { return this.container.feature('ideasApi') }
    get store() { return this.container.feature('ideasStore') }
    get chat() { return this.container.feature('chatManager') }

    async afterInitialize() {
      this.state.set('ready', false)
      this.state.set('chatOpen', false)
      this.state.set('statusOpen', false)
    }

    async load() {
      try {
        const data = await this.api.fetchIdeas()
        this.store.setData(data)
        this.emit('loaded')
      } catch (err) {
        console.error('Failed to load ideas:', err)
        this.emit('error', err)
      }
    }

    async refresh() {
      await this.load()
    }

    selectIdea(id) { return this.store.selectIdea(id) }
    navigate(direction) { return this.store.navigate(direction) }
    setFilter(key, value) { this.store.setFilter(key, value) }
    toggleStatus(status) { return this.store.toggleStatus(status) }
    clearFilters() { this.store.clearFilters() }

    toggleChat() {
      const open = !this.state.get('chatOpen')
      this.state.set('chatOpen', open)
      this.emit('chat:toggled', open)
    }

    toggleStatusPanel() {
      const open = !this.state.get('statusOpen')
      this.state.set('statusOpen', open)
      this.emit('status:toggled', open)
      if (open) this.loadStatus()
    }

    async loadStatus() {
      try {
        const data = await this.api.fetchStatus()
        this.emit('status:loaded', data)
      } catch (err) {
        console.error('Failed to load status:', err)
      }
    }

    async start() {
      await Promise.all([
        this.load(),
        this.chat.loadAssistants(),
      ])
      this.state.set('ready', true)
      this.emit('ready')
    }

    snapshot() {
      const store = this.store
      const filtered = store.getFiltered()
      return {
        ready: this.state.get('ready'),
        totalIdeas: store.ideas.length,
        filteredCount: filtered.length,
        selectedId: store.selectedId,
        filters: {
          search: store.filters.search,
          statuses: [...store.filters.statuses],
          goal: store.filters.goal,
          tag: store.filters.tag,
        },
        statusCounts: store.statusCounts(),
        goalCount: store.goals.length,
        tagCount: store.tags.length,
        chatOpen: this.state.get('chatOpen'),
        statusOpen: this.state.get('statusOpen'),
      }
    }
  }

  // ═══════════════════════════════════════════
  // Boot features and bind UI
  // ═══════════════════════════════════════════
  const app = container.feature('ideasApp')
  const store = container.feature('ideasStore')
  const chat = container.feature('chatManager')

  window.app = app
  window.luca = container

  // ── Render helpers ──────────────────────

  function renderSummary() {
    const counts = store.statusCounts()
    const bar = document.getElementById('summary-bar')
    bar.innerHTML = IdeasStore.STATUSES.map(s => `
      <div class="summary-stat ${s}">
        <span class="num">${counts[s] || 0}</span>
        <span>${s}</span>
      </div>
    `).join('')
  }

  function renderList() {
    const ideas = store.getFiltered()
    const selectedId = store.selectedId
    const list = document.getElementById('ideas-list')

    if (ideas.length === 0) {
      list.innerHTML = '<div class="empty-state">No ideas match your filters<div class="hint">Try adjusting your search or filters</div></div>'
      return
    }

    list.innerHTML = ideas.map(idea => `
      <div class="idea-row ${idea.id === selectedId ? 'selected' : ''}" data-id="${esc(idea.id)}">
        <div class="idea-row-header">
          <span class="idea-status-dot ${idea.status}"></span>
          <span class="idea-row-title">${esc(idea.title)}</span>
          <span class="idea-row-status ${idea.status}">${idea.status}</span>
        </div>
        <div class="idea-row-footer">
          ${idea.goalTitle ? `<span class="idea-goal-label">${esc(idea.goalTitle)}</span>` : ''}
          ${(idea.tags || []).slice(0, 4).map(t => `<span class="idea-tag">${esc(t)}</span>`).join('')}
        </div>
      </div>
    `).join('')

    list.querySelectorAll('.idea-row').forEach(row => {
      row.addEventListener('click', () => {
        app.selectIdea(row.dataset.id)
      })
    })
  }

  function renderDetail(idea) {
    const panel = document.getElementById('detail-panel')
    if (!idea) {
      panel.classList.add('empty')
      panel.innerHTML = '<div class="empty-state">Select an idea to view details</div>'
      return
    }
    panel.classList.remove('empty')
    const bodyHtml = renderMarkdown(idea.body)
    panel.innerHTML = `
      <div class="detail-header">
        <div class="detail-title">${esc(idea.title)}</div>
        <div class="detail-meta">
          <span class="idea-row-status ${idea.status}">${idea.status}</span>
          ${idea.goalTitle ? `<span class="idea-goal-label">${esc(idea.goalTitle)}</span>` : ''}
          ${(idea.tags || []).map(t => `<span class="idea-tag">${esc(t)}</span>`).join('')}
        </div>
      </div>
      <div class="detail-body">${bodyHtml || '<div class="empty-state">No content yet</div>'}</div>
    `
  }

  function renderFilterInfo() {
    const hasFilters = store.hasActiveFilters()
    document.getElementById('clear-filters').style.display = hasFilters ? '' : 'none'
    const filtered = store.getFiltered()
    document.getElementById('filter-info').textContent = hasFilters
      ? `showing ${filtered.length} of ${store.ideas.length}`
      : ''
  }

  function buildFilterUI() {
    const statusContainer = document.getElementById('status-filters')
    statusContainer.innerHTML = IdeasStore.STATUSES.map(s => `
      <button class="filter-btn ${s}" data-status="${s}">${s}</button>
    `).join('')

    statusContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-status]')
      if (!btn) return
      const isActive = app.toggleStatus(btn.dataset.status)
      btn.classList.toggle('active', isActive)
    })

    const goalSelect = document.getElementById('goal-filter')
    goalSelect.innerHTML = '<option value="">All goals</option>'
    for (const g of store.goals) {
      const opt = document.createElement('option')
      opt.value = g.id
      opt.textContent = g.title
      goalSelect.appendChild(opt)
    }
    goalSelect.addEventListener('change', () => {
      app.setFilter('goal', goalSelect.value)
    })

    const tagContainer = document.getElementById('tag-filters')
    const displayTags = store.tags.slice(0, 12)
    tagContainer.innerHTML = displayTags.map(t => `
      <button class="tag-btn" data-tag="${esc(t)}">${esc(t)}</button>
    `).join('')

    tagContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-tag]')
      if (!btn) return
      const tag = btn.dataset.tag
      if (store.filters.tag === tag) {
        app.setFilter('tag', '')
        btn.classList.remove('active')
      } else {
        tagContainer.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'))
        app.setFilter('tag', tag)
        btn.classList.add('active')
      }
    })

    document.getElementById('search').addEventListener('input', (e) => {
      app.setFilter('search', e.target.value.toLowerCase())
    })

    document.getElementById('clear-filters').addEventListener('click', () => {
      app.clearFilters()
      document.getElementById('search').value = ''
      document.getElementById('goal-filter').value = ''
      document.querySelectorAll('.filter-btn, .tag-btn').forEach(b => b.classList.remove('active'))
    })
  }

  // ── Chat rendering ─────────────────────

  function renderChatMessages() {
    const el = document.getElementById('chat-messages')
    const msgs = chat.messages

    if (msgs.length === 0) {
      el.innerHTML = '<div class="chat-msg system">Ask anything about your ideas, goals, or next steps.</div>'
      return
    }

    el.innerHTML = msgs.map(m => {
      if (m.role === 'user') {
        return `<div class="chat-msg user">${esc(m.content)}</div>`
      }
      return `<div class="chat-msg assistant"><div class="msg-content">${renderMarkdown(m.content)}</div></div>`
    }).join('')

    el.scrollTop = el.scrollHeight
  }

  function renderAssistantSelect() {
    const select = document.getElementById('assistant-select')
    select.innerHTML = chat.assistants.map(a =>
      `<option value="${esc(a.name)}" ${a.name === chat.currentAssistant ? 'selected' : ''}>${esc(a.name)}</option>`
    ).join('')
  }

  function renderStatusPanel(data) {
    const panel = document.getElementById('status-panel')

    const projectsHtml = (data.projects || []).map(p => `
      <div class="status-project">
        <span class="status-project-status ${p.status}">${p.status}</span>
        <span>${esc(p.title)}</span>
      </div>
    `).join('') || '<span style="color:var(--text-faint)">None yet</span>'

    const commitsHtml = (data.recentCommits || []).map(c => `
      <div class="status-commit">
        <span class="hash">${esc(c.hash)}</span>
        <span>${esc(c.message)}</span>
        <span class="ago">${esc(c.timeAgo)}</span>
      </div>
    `).join('') || '<span style="color:var(--text-faint)">No recent commits</span>'

    const ideasByStatus = data.ideasByStatus || {}

    panel.innerHTML = `
      <div class="status-grid">
        <div class="status-card">
          <div class="status-card-title">Ideas</div>
          <div class="status-card-value">${data.counts?.ideas || 0}</div>
          <div class="status-card-detail">
            ${['exploring', 'spark', 'ready', 'parked', 'promoted'].map(s =>
              `<span style="color:var(--${s === 'exploring' ? 'accent' : s === 'spark' ? 'text-dim' : s === 'ready' ? 'success' : s === 'parked' ? 'warning' : 'assistant'})">${ideasByStatus[s] || 0} ${s}</span>`
            ).join(' &middot; ')}
          </div>
        </div>
        <div class="status-card">
          <div class="status-card-title">Goals</div>
          <div class="status-card-value">${data.counts?.goals || 0}</div>
          <div class="status-card-detail">
            ${(data.goals || []).map(g => esc(g.title)).join(', ') || 'None yet'}
          </div>
        </div>
        <div class="status-card">
          <div class="status-card-title">Projects</div>
          <div class="status-card-value">${data.counts?.projects || 0}</div>
          <div class="status-projects">${projectsHtml}</div>
        </div>
        <div class="status-card">
          <div class="status-card-title">Recent Activity</div>
          <div class="status-commits">${commitsHtml}</div>
        </div>
      </div>
    `
  }

  // ── Bind feature events to UI ───────────

  store.on('data:loaded', () => {
    document.getElementById('total-count').textContent = store.ideas.length
    buildFilterUI()
    renderSummary()
    renderList()
  })

  store.on('filters:changed', () => {
    renderFilterInfo()
    renderList()
  })

  store.on('filters:cleared', () => {
    renderFilterInfo()
    renderList()
  })

  store.on('idea:selected', (idea) => {
    renderDetail(idea)
    const list = document.getElementById('ideas-list')
    list.querySelectorAll('.idea-row').forEach(r => {
      r.classList.toggle('selected', r.dataset.id === store.selectedId)
      if (r.dataset.id === store.selectedId) r.scrollIntoView({ block: 'nearest' })
    })
  })

  app.on('error', () => {
    document.getElementById('ideas-list').innerHTML =
      '<div class="empty-state">Failed to load ideas</div>'
  })

  // ── Chat events ────────────────────────

  chat.on('assistants:loaded', renderAssistantSelect)
  chat.on('messages:updated', renderChatMessages)

  chat.on('chunk', (partialText) => {
    // Live update the last assistant message (or add a streaming one)
    const el = document.getElementById('chat-messages')
    let streamMsg = el.querySelector('.chat-msg.assistant.streaming')
    if (!streamMsg) {
      streamMsg = document.createElement('div')
      streamMsg.className = 'chat-msg assistant streaming'
      el.appendChild(streamMsg)
    }
    streamMsg.innerHTML = `<div class="msg-content">${renderMarkdown(partialText)}</div>`
    el.scrollTop = el.scrollHeight
  })

  chat.on('sending:start', () => {
    document.getElementById('chat-typing').classList.add('visible')
    document.getElementById('chat-send').disabled = true
    // Remove any leftover streaming message
    const el = document.getElementById('chat-messages')
    el.querySelectorAll('.streaming').forEach(s => s.remove())
  })

  chat.on('sending:done', () => {
    document.getElementById('chat-typing').classList.remove('visible')
    document.getElementById('chat-send').disabled = false
    // Remove streaming class from completed message
    const el = document.getElementById('chat-messages')
    el.querySelectorAll('.streaming').forEach(s => s.remove())
  })

  // ── Chat toggle ────────────────────────

  app.on('chat:toggled', (open) => {
    const panel = document.getElementById('chat-panel')
    const btn = document.getElementById('toggle-chat')
    panel.classList.toggle('open', open)
    btn.classList.toggle('active', open)
    if (open) {
      document.getElementById('chat-input').focus()
    }
  })

  // ── Status toggle ──────────────────────

  app.on('status:toggled', (open) => {
    const panel = document.getElementById('status-panel')
    const btn = document.getElementById('toggle-status')
    panel.classList.toggle('open', open)
    btn.classList.toggle('active', open)
  })

  app.on('status:loaded', renderStatusPanel)

  // ── UI bindings ────────────────────────

  document.getElementById('toggle-chat').addEventListener('click', () => app.toggleChat())
  document.getElementById('toggle-status').addEventListener('click', () => app.toggleStatusPanel())

  document.getElementById('assistant-select').addEventListener('change', (e) => {
    chat.setAssistant(e.target.value)
  })

  document.getElementById('chat-clear').addEventListener('click', () => {
    chat.clearConversation()
  })

  const chatInput = document.getElementById('chat-input')
  const chatSend = document.getElementById('chat-send')

  chatSend.addEventListener('click', () => {
    const text = chatInput.value.trim()
    if (text) {
      chatInput.value = ''
      chatInput.style.height = 'auto'
      chat.sendMessage(text)
    }
  })

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      chatSend.click()
    }
  })

  // Auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto'
    chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px'
  })

  // ── Keyboard nav ────────────────────────

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return

    if (e.key === 'ArrowDown' || e.key === 'j') {
      e.preventDefault()
      app.navigate('next')
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault()
      app.navigate('prev')
    } else if (e.key === '/') {
      e.preventDefault()
      document.getElementById('search').focus()
    } else if (e.key === 'Escape') {
      document.getElementById('search').blur()
      app.setFilter('search', '')
      document.getElementById('search').value = ''
    } else if (e.key === 'c' && !e.metaKey && !e.ctrlKey) {
      app.toggleChat()
    } else if (e.key === 's' && !e.metaKey && !e.ctrlKey) {
      app.toggleStatusPanel()
    }
  })

  // ── Auto-refresh on focus ───────────────

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) app.refresh()
  })

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'stateChange') app.refresh()
  })

  // ── Start ───────────────────────────────
  await app.start()
</script>
</body>
</html>
