<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LUCA MAIN</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #16161f;
    --surface-3: #1a1a26;
    --border: #1e1e2e;
    --border-light: #2a2a3e;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --text-faint: #3a3a50;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --accent-glow: #00fff740;
    --success: #39ff14;
    --success-dim: #39ff1420;
    --warning: #f59e0b;
    --warning-dim: #f59e0b20;
    --error: #ff003c;
    --error-dim: #ff003c20;
    --purple: #c084fc;
    --blue: #60a5fa;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────── */
  .header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }

  .paused-tag {
    background: var(--warning);
    color: #000;
    font-weight: 700;
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 3px;
    display: none;
  }

  .paused-tag.visible { display: inline-block; }

  .ws-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
    transition: background 0.3s;
  }

  .ws-indicator.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }

  /* ── Subsystem Indicators ──────────── */
  .indicators {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 11px;
  }

  .ind {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 0;
  }

  .ind + .ind::before {
    content: '';
    display: inline-block;
    width: 1px;
    height: 14px;
    background: var(--border);
    margin-right: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.on { background: var(--success); box-shadow: 0 0 4px var(--success); }
  .dot.warn { background: var(--warning); box-shadow: 0 0 4px var(--warning); }
  .dot.off { background: var(--error); }

  .ind-label { color: var(--text-dim); }
  .ind-detail { color: var(--text-faint); font-size: 10px; }

  /* ── Body Layout ─────────────────────── */
  .body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .col-left {
    width: 38%;
    min-width: 280px;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .col-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Panel (reusable box) ────────────── */
  .panel {
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel.grow { flex: 1; }

  .panel-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-faint);
    padding: 8px 14px 4px;
    flex-shrink: 0;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 14px 8px;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  /* ── Stats Panel ─────────────────────── */
  .stat-row {
    font-size: 12px;
    padding: 1px 0;
  }

  .stat-label { color: var(--text-dim); }
  .stat-value { color: var(--text); }
  .stat-branch { color: var(--accent); }
  .stat-changed { color: var(--warning); }
  .stat-added { color: var(--success); }
  .stat-deleted { color: var(--error); }

  .folder-row {
    padding-left: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .folder-name { color: var(--text); }

  .commit-row {
    font-size: 11px;
    color: var(--text-dim);
    padding: 1px 0 1px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spacer-row { height: 6px; }

  /* ── Tasks Panel ─────────────────────── */
  .task-row {
    font-size: 12px;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .task-marker {
    font-size: 10px;
  }

  .task-marker.sched { color: var(--warning); }
  .task-marker.build { color: var(--blue); }
  .task-none { color: var(--text-faint); font-size: 11px; }

  /* ── Content Models Panel ────────────── */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 12px;
  }

  .content-item {
    font-size: 12px;
    display: flex;
    gap: 6px;
    padding: 1px 0;
  }

  .content-name { font-weight: 600; }
  .content-count { color: var(--text-faint); }

  /* ── Event Log Panel ─────────────────── */
  .evt-row {
    font-size: 11px;
    padding: 1px 0;
    display: flex;
    gap: 8px;
    white-space: nowrap;
  }

  .evt-time { color: var(--text-faint); flex-shrink: 0; width: 60px; }
  .evt-key { flex-shrink: 0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  .evt-detail { color: var(--text-faint); overflow: hidden; text-overflow: ellipsis; }

  .evt-key.ok { color: var(--success); }
  .evt-key.err { color: var(--error); }
  .evt-key.warn { color: var(--warning); }
  .evt-key.neutral { color: var(--text-dim); }

  /* ── Log Stream Panel ────────────────── */
  .log-row {
    font-size: 12px;
    padding: 1px 0;
    display: flex;
    gap: 8px;
    line-height: 1.4;
  }

  .log-time { color: var(--text-faint); flex-shrink: 0; width: 60px; font-size: 11px; }
  .log-source {
    flex-shrink: 0;
    font-weight: 600;
    font-size: 11px;
  }
  .log-text {
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
  }

  /* ── Disconnected Overlay ────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 15, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.visible { opacity: 1; pointer-events: auto; }

  .overlay-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 40px;
    text-align: center;
  }

  .overlay-card h2 {
    color: var(--error);
    font-size: 14px;
    margin-bottom: 8px;
  }

  .overlay-card p {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 4px;
  }

  .overlay-card .retry-info {
    color: var(--text-faint);
    font-size: 11px;
    margin-top: 12px;
  }

  .overlay-card .retry-info .countdown {
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Loading state ───────────────────── */
  .loading-msg {
    color: var(--text-dim);
    font-size: 12px;
    padding: 20px 14px;
  }

  .loading-msg::after {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 8px;
    vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Animations ──────────────────────── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeIn 0.15s ease; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <h1>LUCA MAIN</h1>
    <span class="paused-tag" id="pausedTag">PAUSED</span>
    <div class="header-meta">
      <span id="uptimeLabel"></span>
      <span id="pidLabel"></span>
      <div class="ws-indicator" id="wsIndicator" title="WebSocket connection"></div>
    </div>
  </div>
  <div class="indicators" id="indicators"></div>
</div>

<!-- ── Body ────────────────────────────────────────────────────── -->
<div class="body">
  <div class="col-left">
    <div class="panel" id="statsPanel">
      <div class="panel-title">Stats</div>
      <div class="panel-body" id="statsBody">
        <div class="loading-msg">Connecting</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Tasks In Progress</div>
      <div class="panel-body" id="tasksBody">
        <div class="task-none">none</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Content</div>
      <div class="panel-body" id="contentBody"></div>
    </div>

    <div class="panel grow">
      <div class="panel-title">Event Log</div>
      <div class="panel-body" id="eventsBody"></div>
    </div>
  </div>

  <div class="col-right">
    <div class="panel grow">
      <div class="panel-title">Log Stream</div>
      <div class="panel-body" id="logsBody"></div>
    </div>
  </div>
</div>

<!-- ── Disconnect Overlay ──────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <h2>Disconnected</h2>
    <p>Lost connection to luca main</p>
    <p class="retry-info">Reconnecting in <span class="countdown" id="countdown">3</span>s</p>
  </div>
</div>

<script type="module">
// ── Helpers (used by render code and features) ────────────────────
function esc(str) {
  if (!str) return ''
  const d = document.createElement('div')
  d.textContent = String(str)
  return d.innerHTML
}

function formatUptime(secs) {
  const s = Math.floor(secs)
  if (s < 60) return `${s}s`
  const m = Math.floor(s / 60)
  if (m < 60) return `${m}m ${s % 60}s`
  const h = Math.floor(m / 60)
  return `${h}h ${m % 60}m`
}

// ── Load Luca browser container ───────────────────────────────────
const { default: container } = await import('https://esm.sh/@soederpop/luca@0.0.28/src/browser.ts')
const Feature = Object.getPrototypeOf(container.feature('vm').constructor)

// ═══════════════════════════════════════════════════════════════════
// Feature 1: DashboardConnection
// Manages WebSocket lifecycle, reconnection, and config fetch.
// ═══════════════════════════════════════════════════════════════════
class DashboardConnection extends Feature {
  static shortcut = 'features.dashboardConnection'

  static stateSchema = {
    connected: { type: 'boolean', default: false, describe: 'True when WebSocket is open' },
    wsUrl: { type: 'string', default: '', describe: 'Resolved WebSocket URL from /api/config' },
    reconnecting: { type: 'boolean', default: false, describe: 'True during reconnect countdown' },
    countdown: { type: 'number', default: 0, describe: 'Seconds until next reconnect attempt' },
  }

  static optionsSchema = {
    defaultWsUrl: { type: 'string', default: 'ws://localhost:4410', describe: 'Fallback WS URL if /api/config fails' },
    reconnectDelay: { type: 'number', default: 3000, describe: 'Milliseconds before reconnect attempt' },
    refreshInterval: { type: 'number', default: 5000, describe: 'Milliseconds between query refreshes' },
  }

  static eventsSchema = {
    'connected':     { args: [],          describe: 'WebSocket connection established' },
    'disconnected':  { args: [],          describe: 'WebSocket connection lost' },
    'message':       { args: ['msg'],     describe: 'Raw parsed message from WebSocket' },
    'state':         { args: ['data'],    describe: 'State/response message received' },
    'event':         { args: ['evt'],     describe: 'Event-type message received' },
    'log':           { args: ['entry'],   describe: 'Log-type message received' },
  }

  static { Feature.register(this, 'dashboardConnection') }

  _ws = null
  _reconnectTimer = null
  _countdownTimer = null
  _refreshTimer = null

  /** Fetch config and open WebSocket */
  async connect() {
    const defaultUrl = this.options?.defaultWsUrl || 'ws://localhost:4410'
    let wsUrl = defaultUrl

    try {
      const res = await fetch('/api/config')
      if (res.ok) {
        const cfg = await res.json()
        wsUrl = cfg.wsUrl || defaultUrl
      }
    } catch {}

    this.state.set('wsUrl', wsUrl)

    if (this._ws) {
      try { this._ws.close() } catch {}
    }

    const ws = new WebSocket(wsUrl)
    this._ws = ws

    ws.onopen = () => {
      this.state.set('connected', true)
      this.state.set('reconnecting', false)
      this.emit('connected')
      ws.send(JSON.stringify({ type: 'query', id: 'init' }))
      this._startRefreshLoop()
    }

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data)
        this.emit('message', msg)

        if (msg.type === 'state' || msg.type === 'response') {
          this.emit('state', msg.data)
        } else if (msg.type === 'event') {
          this.emit('event', msg)
        } else if (msg.type === 'log') {
          this.emit('log', msg)
        }
      } catch {}
    }

    ws.onerror = () => {}

    ws.onclose = () => {
      this.state.set('connected', false)
      this._stopRefreshLoop()
      this.emit('disconnected')
      this._scheduleReconnect()
    }
  }

  /** Send a JSON message over the WebSocket */
  send(msg) {
    if (this._ws && this._ws.readyState === WebSocket.OPEN) {
      this._ws.send(JSON.stringify(msg))
    }
  }

  /** Request a state refresh */
  refresh() {
    this.send({ type: 'query', id: 'refresh' })
  }

  _startRefreshLoop() {
    this._stopRefreshLoop()
    const interval = this.options?.refreshInterval || 5000
    this._refreshTimer = setInterval(() => this.refresh(), interval)
  }

  _stopRefreshLoop() {
    if (this._refreshTimer) { clearInterval(this._refreshTimer); this._refreshTimer = null }
  }

  _scheduleReconnect() {
    const delay = this.options?.reconnectDelay || 3000
    let secs = Math.ceil(delay / 1000)

    this.state.set('reconnecting', true)
    this.state.set('countdown', secs)

    if (this._reconnectTimer) clearTimeout(this._reconnectTimer)
    if (this._countdownTimer) clearInterval(this._countdownTimer)

    this._countdownTimer = setInterval(() => {
      secs--
      this.state.set('countdown', Math.max(0, secs))
      if (secs <= 0) clearInterval(this._countdownTimer)
    }, 1000)

    this._reconnectTimer = setTimeout(() => {
      clearInterval(this._countdownTimer)
      this.connect()
    }, delay)
  }
}

// ═══════════════════════════════════════════════════════════════════
// Feature 2: DashboardStore
// Accumulates status snapshots, events, and logs. Provides data
// access, capping, and color assignment for log sources.
// ═══════════════════════════════════════════════════════════════════
class DashboardStore extends Feature {
  static shortcut = 'features.dashboardStore'

  static stateSchema = {
    status: { type: 'object', default: null, describe: 'Latest system status snapshot from WS' },
    eventCount: { type: 'number', default: 0, describe: 'Total events accumulated' },
    logCount: { type: 'number', default: 0, describe: 'Total log entries accumulated' },
    dirty: { type: 'boolean', default: false, describe: 'True when new data arrived since last render' },
  }

  static optionsSchema = {
    maxEvents: { type: 'number', default: 300, describe: 'Max event entries to keep' },
    maxLogs: { type: 'number', default: 500, describe: 'Max log entries to keep' },
  }

  static eventsSchema = {
    'status:updated': { args: ['status'],  describe: 'New status snapshot received' },
    'event:added':    { args: ['evt'],     describe: 'New event entry added' },
    'log:added':      { args: ['entry'],   describe: 'New log entry added' },
    'data:changed':   { args: [],          describe: 'Any data changed (status, event, or log)' },
  }

  static { Feature.register(this, 'dashboardStore') }

  static SOURCE_COLORS = [
    '#4ECDC4', '#FF6B6B', '#FFD166', '#06D6A0', '#118AB2',
    '#EF476F', '#73D2DE', '#FCB69F', '#A8E6CF', '#FDCB6E',
    '#6C5CE7', '#00B894', '#E17055', '#0984E3', '#FDCB6E', '#E84393',
  ]

  static MODEL_COLORS = [
    '#FF6B6B', '#4ECDC4', '#FFD166', '#06D6A0', '#118AB2',
    '#EF476F', '#73D2DE', '#6C5CE7', '#00B894', '#E17055',
    '#FDCB6E', '#E84393',
  ]

  _events = []
  _logs = []
  _sourceColorMap = {}
  _nextColorIdx = 0

  /** Get all accumulated events */
  get events() { return this._events }

  /** Get all accumulated logs */
  get logs() { return this._logs }

  /** Get the latest status snapshot */
  get status() { return this.state.get('status') }

  /** Assign a stable color to a log source name */
  getSourceColor(source) {
    if (!this._sourceColorMap[source]) {
      this._sourceColorMap[source] = DashboardStore.SOURCE_COLORS[this._nextColorIdx % DashboardStore.SOURCE_COLORS.length]
      this._nextColorIdx++
    }
    return this._sourceColorMap[source]
  }

  /** Get a model color by index */
  getModelColor(index) {
    return DashboardStore.MODEL_COLORS[index % DashboardStore.MODEL_COLORS.length]
  }

  /** Classify an event for display styling */
  classifyEvent(evt) {
    const e = evt.event || ''
    if (e.includes('error') || e.includes('FAIL') || e.includes('crash')) return 'err'
    if (e.includes('complete') || e.includes('started')) return 'ok'
    if (e.includes('skipped')) return 'warn'
    return 'neutral'
  }

  /** Handle a status/response message */
  handleStatus(data) {
    const maxEvents = this.options?.maxEvents || 300
    const maxLogs = this.options?.maxLogs || 500

    this.state.set('status', data)

    // Seed from initial snapshot
    if (data?.recentLogs?.length && this._logs.length === 0) {
      this._logs = data.recentLogs.slice(-maxLogs)
      this.state.set('logCount', this._logs.length)
    }
    if (data?.recentEvents?.length && this._events.length === 0) {
      this._events = data.recentEvents.slice(-maxEvents)
      this.state.set('eventCount', this._events.length)
    }

    this.state.set('dirty', true)
    this.emit('status:updated', data)
    this.emit('data:changed')
  }

  /** Add an event entry */
  addEvent(evt) {
    const max = this.options?.maxEvents || 300
    this._events.push(evt)
    if (this._events.length > max) this._events.shift()
    this.state.set('eventCount', this._events.length)
    this.state.set('dirty', true)
    this.emit('event:added', evt)
    this.emit('data:changed')
  }

  /** Add a log entry */
  addLog(entry) {
    const max = this.options?.maxLogs || 500
    this._logs.push(entry)
    if (this._logs.length > max) this._logs.shift()
    this.state.set('logCount', this._logs.length)
    this.state.set('dirty', true)
    this.emit('log:added', entry)
    this.emit('data:changed')
  }

  /** Mark data as rendered */
  clearDirty() {
    this.state.set('dirty', false)
  }
}

// ═══════════════════════════════════════════════════════════════════
// Feature 3: DashboardApp (Orchestrator)
// Composes Connection + Store. Manages render loop. Provides the
// toolable high-level API exposed on window.app.
// ═══════════════════════════════════════════════════════════════════
class DashboardApp extends Feature {
  static shortcut = 'features.dashboardApp'

  static stateSchema = {
    ready: { type: 'boolean', default: false, describe: 'True after connection established and first data received' },
  }

  static optionsSchema = {
    renderInterval: { type: 'number', default: 250, describe: 'Milliseconds between render ticks' },
  }

  static eventsSchema = {
    'ready':          { args: [],         describe: 'First status data received and rendered' },
    'render':         { args: [],         describe: 'A render tick executed' },
  }

  static { Feature.register(this, 'dashboardApp') }

  _renderTimer = null

  /** Access the connection feature */
  get connection() { return this.container.feature('dashboardConnection') }

  /** Access the data store feature */
  get store() { return this.container.feature('dashboardStore') }

  /**
   * Boot the dashboard: wire features together, connect WS, start render loop
   */
  async start() {
    const conn = this.connection
    const store = this.store

    // Wire connection events → store
    conn.on('state', (data) => store.handleStatus(data))
    conn.on('event', (evt) => store.addEvent(evt))
    conn.on('log', (entry) => store.addLog(entry))

    // Mark ready on first status
    store.on('status:updated', () => {
      if (!this.state.get('ready')) {
        this.state.set('ready', true)
        this.emit('ready')
      }
    })

    // Start render loop
    const interval = this.options?.renderInterval || 250
    this._renderTimer = setInterval(() => {
      if (store.state.get('dirty')) {
        store.clearDirty()
        this.emit('render')
      }
    }, interval)

    // Connect
    await conn.connect()
  }

  /**
   * Get the full state snapshot (useful for assistants and debugging)
   * @returns {object} Current state across all features
   */
  snapshot() {
    const store = this.store
    const conn = this.connection
    const status = store.status

    return {
      ready: this.state.get('ready'),
      connected: conn.state.get('connected'),
      wsUrl: conn.state.get('wsUrl'),
      eventCount: store.state.get('eventCount'),
      logCount: store.state.get('logCount'),
      status: status ? {
        uptime: status.uptime,
        pid: status.pid,
        paused: status.paused,
        subsystems: {
          scheduler: status.scheduler?.running || false,
          builder: status.builder?.watching || false,
          voice: status.voice?.running || false,
          windowManager: status.windowManager?.listening || false,
          presenter: status.presenter?.running || false,
          contentServer: status.contentServer?.running || false,
        },
        git: status.git ? {
          branch: status.git.branch,
          dirtyFiles: (status.git.modified?.length || 0) + (status.git.untracked?.length || 0) + (status.git.deleted?.length || 0),
        } : null,
        content: status.content || {},
      } : null,
    }
  }

  /**
   * Request a manual state refresh from the authority
   */
  refresh() {
    this.connection.refresh()
  }
}

// ═══════════════════════════════════════════════════════════════════
// Feature Instances
// ═══════════════════════════════════════════════════════════════════
const conn = container.feature('dashboardConnection')
const store = container.feature('dashboardStore')
const app = container.feature('dashboardApp')

// Expose for debugging and browser-use automation
window.app = app
window.luca = container

// ═══════════════════════════════════════════════════════════════════
// UI Rendering (DOM bindings driven by feature events)
// ═══════════════════════════════════════════════════════════════════
const $indicators = document.getElementById('indicators')
const $uptimeLabel = document.getElementById('uptimeLabel')
const $pidLabel = document.getElementById('pidLabel')
const $pausedTag = document.getElementById('pausedTag')
const $wsIndicator = document.getElementById('wsIndicator')
const $statsBody = document.getElementById('statsBody')
const $tasksBody = document.getElementById('tasksBody')
const $contentBody = document.getElementById('contentBody')
const $eventsBody = document.getElementById('eventsBody')
const $logsBody = document.getElementById('logsBody')
const $overlay = document.getElementById('overlay')
const $countdown = document.getElementById('countdown')

// ── Connection status → UI indicators ─────────────────────────────
conn.on('connected', () => {
  $wsIndicator.classList.add('connected')
  $overlay.classList.remove('visible')
})

conn.on('disconnected', () => {
  $wsIndicator.classList.remove('connected')
  $overlay.classList.add('visible')
})

// Update countdown display reactively
let _countdownInterval = null
conn.on('disconnected', () => {
  if (_countdownInterval) clearInterval(_countdownInterval)
  _countdownInterval = setInterval(() => {
    $countdown.textContent = conn.state.get('countdown')
  }, 200)
})
conn.on('connected', () => {
  if (_countdownInterval) { clearInterval(_countdownInterval); _countdownInterval = null }
})

// ── Render on data changes ────────────────────────────────────────
app.on('render', () => {
  const status = store.status
  if (!status) return

  // Header
  $uptimeLabel.textContent = `up ${formatUptime(status.uptime)}`
  $pidLabel.textContent = `pid ${status.pid}`
  $pausedTag.classList.toggle('visible', !!status.paused)

  renderIndicators(status)
  renderStats(status)
  renderTasks(status)
  renderContent(status)
  renderEvents()
  renderLogs()
})

function renderIndicators(status) {
  const s = status
  const inds = []

  const schedRunning = s.scheduler?.running
  inds.push(ind(schedRunning, 'scheduler', schedRunning ? `${s.scheduler.taskCount}t` : ''))
  inds.push(ind(s.builder?.watching, 'builder'))

  const voice = s.voice || {}
  if (voice.disabled) {
    inds.push(ind(false, 'voice', 'disabled', true))
  } else {
    inds.push(ind(voice.running, 'voice', voice.running ? (voice.clientConnected ? 'connected' : 'waiting') : '', !voice.running))
  }

  const wm = s.windowManager || {}
  if (wm.listening) {
    const wmDetail = wm.clientConnected ? 'connected' + (wm.windowCount ? ` ${wm.windowCount}w` : '') : 'waiting'
    inds.push(ind(wm.clientConnected, 'wm', wmDetail, !wm.clientConnected))
  } else {
    inds.push(ind(false, 'wm'))
  }

  const pres = s.presenter || {}
  if (pres.running) {
    inds.push(ind(true, 'presenter', `http:${pres.expressPort} ws:${pres.linkPort}`))
  } else {
    inds.push(ind(false, 'presenter', '', true))
  }

  const cs = s.contentServer || {}
  inds.push(ind(cs.running, 'content', cs.running ? `:${cs.port}` : ''))

  $indicators.innerHTML = inds.join('')
}

function ind(on, label, detail, isWarn) {
  const dotClass = on ? 'on' : (isWarn ? 'warn' : 'off')
  const detailHtml = detail ? ` <span class="ind-detail">${esc(detail)}</span>` : ''
  return `<span class="ind"><span class="dot ${dotClass}"></span><span class="ind-label">${esc(label)}</span>${detailHtml}</span>`
}

function renderStats(status) {
  const g = status.git
  const sched = status.scheduler
  let html = ''

  if (g) {
    if (g.branch) {
      html += `<div class="stat-row"><span class="stat-label">branch: </span><span class="stat-branch">${esc(g.branch)}</span></div>`
    }

    const totalM = g.modified?.length || 0
    const totalA = g.untracked?.length || 0
    const totalD = g.deleted?.length || 0
    const total = totalM + totalA + totalD

    if (total > 0) {
      const parts = []
      if (totalM) parts.push(`<span class="stat-changed">${totalM} changed</span>`)
      if (totalA) parts.push(`<span class="stat-added">+${totalA} new</span>`)
      if (totalD) parts.push(`<span class="stat-deleted">-${totalD} deleted</span>`)
      html += `<div class="stat-row"><span class="stat-value">${total} files dirty: </span>${parts.join(' <span class="stat-label">&middot;</span> ')}</div>`

      const dirs = Object.entries(g.summary || {}).sort((a, b) =>
        (b[1].added + b[1].modified + b[1].deleted) - (a[1].added + a[1].modified + a[1].deleted)
      )
      for (const [dir, counts] of dirs) {
        const dp = []
        if (counts.modified) dp.push(`<span class="stat-changed">${counts.modified}</span>`)
        if (counts.added) dp.push(`<span class="stat-added">+${counts.added}</span>`)
        if (counts.deleted) dp.push(`<span class="stat-deleted">-${counts.deleted}</span>`)
        html += `<div class="folder-row"><span class="folder-name">${esc(dir)}/</span> ${dp.join('/')}</div>`
      }
    } else {
      html += `<div class="stat-row" style="color:var(--text-faint)">working tree clean</div>`
    }

    if (g.recentCommits?.length) {
      html += `<div class="spacer-row"></div>`
      for (const title of g.recentCommits) {
        html += `<div class="commit-row">${esc(title)}</div>`
      }
    }
  }

  if (sched?.inProgress?.length) {
    html += `<div class="spacer-row"></div>`
    html += `<div class="stat-row"><span class="stat-changed">${sched.inProgress.length} task(s) running</span> <span class="stat-label">${sched.dueOneOff} one-off due, ${sched.dueScheduled} scheduled due</span></div>`
  }

  $statsBody.innerHTML = html || '<div class="loading-msg">Waiting for data</div>'
}

function renderTasks(status) {
  const sched = status.scheduler || {}
  const builder = status.builder || {}
  const rows = []

  for (const taskId of (sched.inProgress || [])) {
    rows.push(`<div class="task-row"><span class="task-marker sched">&#9658;</span>${esc(taskId)}</div>`)
  }
  for (const slug of (builder.buildsInProgress || [])) {
    rows.push(`<div class="task-row"><span class="task-marker build">&#9658;</span>build: ${esc(slug)}</div>`)
  }

  $tasksBody.innerHTML = rows.length ? rows.join('') : '<div class="task-none">none</div>'
}

function renderContent(status) {
  const counts = status.content || {}
  const names = Object.keys(counts)

  if (!names.length) {
    $contentBody.innerHTML = '<span style="color:var(--text-faint);font-size:11px">loading...</span>'
    return
  }

  let html = '<div class="content-grid">'
  names.forEach((name, i) => {
    const color = store.getModelColor(i)
    html += `<div class="content-item"><span class="content-name" style="color:${color}">${esc(name)}</span><span class="content-count">${counts[name]}</span></div>`
  })
  html += '</div>'
  $contentBody.innerHTML = html
}

function renderEvents() {
  const body = $eventsBody
  const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40

  const visible = store.events.slice(-200)
  let html = ''
  for (const evt of visible) {
    const time = new Date(evt.ts).toISOString().slice(11, 19)
    const key = `${evt.source}:${evt.event}`
    const evtClass = store.classifyEvent(evt)

    let detail = ''
    if (evt.data?.taskId) detail = evt.data.taskId
    else if (evt.data?.reason) detail = evt.data.reason
    else if (evt.event === 'tick' && evt.data) {
      const d = evt.data
      detail = d.dueIds?.length ? `${d.dueOneOff}oo ${d.dueScheduled}s ${d.inProgress}ip` : `${d.totalTasks}t ok`
    }

    html += `<div class="evt-row fade-in"><span class="evt-time">${time}</span><span class="evt-key ${evtClass}">${esc(key)}</span><span class="evt-detail">${esc(detail)}</span></div>`
  }
  body.innerHTML = html
  if (atBottom) body.scrollTop = body.scrollHeight
}

function renderLogs() {
  const body = $logsBody
  const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40

  const visible = store.logs.slice(-300)
  let html = ''
  for (const entry of visible) {
    const time = new Date(entry.ts).toISOString().slice(11, 19)
    const color = store.getSourceColor(entry.source)
    html += `<div class="log-row"><span class="log-time">${time}</span><span class="log-source" style="color:${color}">[${esc(entry.source)}]</span><span class="log-text">${esc(entry.text || '')}</span></div>`
  }
  body.innerHTML = html
  if (atBottom) body.scrollTop = body.scrollHeight
}

// ═══════════════════════════════════════════════════════════════════
// Boot — all event bindings in place, now start
// ═══════════════════════════════════════════════════════════════════
await app.start()
</script>
</body>
</html>
