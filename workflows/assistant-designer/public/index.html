<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant Designer</title>
<link rel="stylesheet" href="/shared/base.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<style>
  html, body {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 12px;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  .header {
    height: 42px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .header .sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
  .header .spacer { flex: 1; }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--error);
    flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }

  .status-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .hdr-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 3px;
    font: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hdr-btn.primary { border-color: var(--accent); color: var(--accent); }
  .hdr-btn.danger { border-color: var(--error); color: var(--error); }
  .hdr-btn.danger:hover { background: var(--error-dim); }

  /* ── Main layout ────────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ────────────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    min-width: 180px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width .2s;
  }
  .sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; border-right: none; }

  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-header span {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    flex: 1;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .assistant-item {
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
  }
  .assistant-item:hover { background: var(--surface-2); }
  .assistant-item.active {
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }
  .assistant-item .name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }
  .assistant-item.active .name { color: var(--accent); }
  .assistant-item .about {
    font-size: 10px;
    color: var(--text-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .new-assistant-btn {
    margin: 8px 12px;
    padding: 6px 10px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    border-radius: 3px;
    font: inherit;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }
  .new-assistant-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Center: Editor ─────────────────────────────────────────── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 300px;
    overflow: hidden;
  }

  .tab-bar {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab {
    padding: 6px 14px;
    font: inherit;
    font-size: 11px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    position: relative;
  }
  .tab:hover { color: var(--text); background: var(--surface-2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface-2); }
  .tab.modified::after {
    content: '';
    position: absolute;
    top: 6px;
    right: 4px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--warning);
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .editor-toolbar .file-label {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .editor-toolbar .spacer { flex: 1; }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .toggle-label input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .editor-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .monaco-editor-shell {
    position: absolute;
    inset: 0;
    display: none;
  }

  .monaco-editor,
  .monaco-editor .margin,
  .monaco-editor .monaco-editor-background {
    background: var(--bg) !important;
  }

  .editor-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-faint);
    font-size: 12px;
    padding: 20px;
    text-align: center;
    line-height: 2;
  }


  /* ── Right panel ────────────────────────────────────────────── */
  .right-panel {
    width: 380px;
    min-width: 280px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width .2s;
  }
  .right-panel.collapsed { width: 0; min-width: 0; overflow: hidden; border-left: none; }

  /* ── Chat panel ─────────────────────────────────────────────── */
  .chat-panel {
    flex: 6;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .chat-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .chat-header .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    flex: 1;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    max-width: 95%;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.6;
    animation: slideUp .2s ease-out;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--surface-3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--assistant-dim);
    border: 1px solid #c084fc22;
    color: var(--text);
  }
  .msg.assistant p { margin: 0 0 6px; }
  .msg.assistant p:last-child { margin: 0; }
  .msg.assistant code {
    background: var(--surface-3);
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 11px;
  }
  .msg.assistant pre {
    background: var(--bg);
    padding: 8px 10px;
    border-radius: 3px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 11px;
    line-height: 1.5;
  }
  .msg.assistant pre code { background: none; padding: 0; }
  .msg.system {
    align-self: center;
    color: var(--text-faint);
    font-size: 10px;
    font-style: italic;
    padding: 4px;
    animation: fadeIn .3s;
  }

  .assistant-turn {
    align-self: flex-start;
    max-width: 95%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: slideUp .2s ease-out;
  }

  .tool-event {
    font-size: 10px;
    padding: 6px 8px;
    margin: 2px 0;
    border-radius: 3px;
    background: var(--surface-2);
    border-left: 2px solid var(--blue);
    color: var(--text-dim);
    animation: slideIn .2s ease-out;
  }
  .tool-event.error { border-left-color: var(--error); }
  .tool-event.complete { border-left-color: var(--success); }
  .tool-event .tool-name { color: var(--blue); font-weight: 600; }
  .tool-event .tool-label { opacity: .7; margin-left: 6px; }
  .tool-event details { margin-top: 6px; }
  .tool-event summary { cursor: pointer; color: var(--text); }
  .tool-event pre {
    margin: 6px 0 0;
    padding: 8px;
    background: var(--bg);
    border-radius: 3px;
    overflow-x: auto;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .streaming-cursor {
    display: inline-block;
    width: 6px;
    height: 13px;
    background: var(--accent);
    animation: pulse 1s infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  .chat-input-row {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .chat-input-row textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    padding: 6px 10px;
    font: inherit;
    font-size: 12px;
    resize: none;
    outline: none;
    max-height: 80px;
    line-height: 1.5;
  }
  .chat-input-row textarea:focus { border-color: var(--accent); }

  .chat-send-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 3px;
    font: inherit;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s;
  }
  .chat-send-btn:hover { background: var(--accent); color: var(--bg); }
  .chat-send-btn:disabled { opacity: .4; cursor: default; }

  /* ── Resize handle ──────────────────────────────────────────── */
  .resize-handle-h {
    width: 100%;
    height: 4px;
    cursor: row-resize;
    background: var(--border);
    flex-shrink: 0;
    transition: background .15s;
  }
  .resize-handle-h:hover { background: var(--accent); }

  /* ── REPL panel ─────────────────────────────────────────────── */
  .repl-panel {
    flex: 4;
    display: flex;
    flex-direction: column;
    min-height: 120px;
  }

  .repl-header {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .repl-header .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    flex: 1;
  }

  .repl-input-area {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .repl-input-area textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    padding: 6px 10px;
    font: inherit;
    font-size: 11px;
    resize: none;
    outline: none;
    min-height: 32px;
    max-height: 60px;
    line-height: 1.5;
  }
  .repl-input-area textarea:focus { border-color: var(--accent); }

  .repl-run-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 3px;
    font: inherit;
    font-size: 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s;
  }
  .repl-run-btn:hover { border-color: var(--success); color: var(--success); }

  .repl-output {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-dim);
    background: var(--bg);
  }
  .repl-output .repl-ok { color: var(--text); }
  .repl-output .repl-ok p { margin: 0 0 6px; }
  .repl-output .repl-ok p:last-child { margin: 0; }
  .repl-output .repl-ok code {
    background: var(--surface-3);
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 11px;
  }
  .repl-output .repl-ok pre {
    background: var(--surface-2);
    padding: 8px 10px;
    border-radius: 3px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 11px;
    line-height: 1.5;
  }
  .repl-output .repl-ok pre code { background: none; padding: 0; }
  .repl-output .repl-err { color: var(--error); white-space: pre-wrap; }
  .repl-output .repl-entry { margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .repl-output .repl-entry:last-child { border-bottom: none; }
  .repl-prompt { color: var(--accent); }

  /* ── Toast ──────────────────────────────────────────────────── */
  .toast-container {
    position: fixed;
    top: 50px;
    right: 16px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .toast {
    padding: 8px 14px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--text);
    animation: slideIn .2s ease-out;
    max-width: 300px;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--error); }
  .toast.info { border-left: 3px solid var(--accent); }

  /* ── History modal ──────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: min(1100px, 92vw);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    animation: slideUp .2s ease-out;
  }
  .modal-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-header h3 {
    flex: 1;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .modal-body .empty { color: var(--text-faint); font-style: italic; font-size: 11px; }

  .history-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 12px;
    min-height: 0;
  }
  .history-list {
    border-right: 1px solid var(--border);
    padding-right: 12px;
    overflow-y: auto;
    max-height: 62vh;
  }
  .history-detail {
    overflow-y: auto;
    max-height: 62vh;
    padding-right: 4px;
  }
  .history-meta {
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface-2);
    font-size: 11px;
    line-height: 1.6;
  }
  .history-meta .title {
    color: var(--text);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .history-meta .sub {
    color: var(--text-faint);
  }
  .history-msg {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .history-msg .head {
    padding: 6px 10px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .history-msg.user .head { border-left: 3px solid var(--text-dim); }
  .history-msg.assistant .head { border-left: 3px solid var(--accent); }
  .history-msg.tool .head { border-left: 3px solid var(--blue); }
  .history-msg.system .head { border-left: 3px solid var(--warning); }
  .history-msg .body {
    padding: 10px;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .history-msg .body p { margin: 0 0 6px; }
  .history-msg .body p:last-child { margin: 0; }
  .history-tool-call {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
  }
  .history-tool-call .tool-head {
    padding: 6px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--blue);
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .history-tool-call pre,
  .history-msg pre {
    margin: 0;
    padding: 10px;
    overflow-x: auto;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  .history-item {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item:hover { border-color: var(--accent); background: var(--accent-dim); }
  .history-item.active { border-color: var(--accent); background: var(--accent-dim); }
  .history-item .thread-id { font-size: 11px; color: var(--text); }
  .history-item .meta { font-size: 10px; color: var(--text-faint); }

  /* ── Create assistant dialog ────────────────────────────────── */
  .create-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    padding: 8px 12px;
    font: inherit;
    font-size: 12px;
    width: 100%;
    outline: none;
    margin-bottom: 12px;
  }
  .create-input:focus { border-color: var(--accent); }

  .create-btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 16px;
    border-radius: 3px;
    font: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
  }
  .create-btn:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Assistant Designer</h1>
  <div class="sep"></div>
  <div class="status-dot" id="statusDot"></div>
  <span class="status-label" id="statusLabel">No assistant selected</span>
  <div class="spacer"></div>
  <button class="hdr-btn" id="toggleSidebar" title="Toggle sidebar">sidebar</button>
  <button class="hdr-btn" id="toggleRight" title="Toggle chat panel">chat</button>
  <div class="sep"></div>
  <button class="hdr-btn" id="historyBtn">history</button>
  <button class="hdr-btn primary" id="reloadBtn">reload</button>
</div>

<!-- Main layout -->
<div class="main">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>Assistants</span>
    </div>
    <div class="sidebar-list" id="assistantList"></div>
    <button class="new-assistant-btn" id="newAssistantBtn">+ New Assistant</button>
  </div>

  <!-- Editor -->
  <div class="editor-panel" id="editorPanel">
    <div class="tab-bar" id="tabBar"></div>
    <div class="editor-toolbar" id="editorToolbar">
      <span class="file-label" id="fileLabel">No file open</span>
      <div class="spacer"></div>
      <label class="toggle-label">
        <input type="checkbox" id="hotReloadToggle"> Hot Reload
      </label>
      <button class="hdr-btn primary" id="saveBtn" style="display:none">Save</button>
    </div>
    <div class="editor-area" id="editorArea">
      <div class="editor-empty" id="editorEmpty">
        Select an assistant from the sidebar to begin editing.
      </div>
      <div class="monaco-editor-shell" id="monacoEditor"></div>
    </div>

  <!-- Right panel -->

    <!-- Chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <span class="label">Chat</span>
        <button class="hdr-btn danger" id="clearChatBtn" style="font-size:10px;padding:2px 8px">clear</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="1" placeholder="Send a message..."></textarea>
        <button class="chat-send-btn" id="chatSendBtn">Send</button>
      </div>
    </div>

    <div class="resize-handle-h" id="resizeHandleH"></div>

    <!-- REPL -->
    <div class="repl-panel">
      <div class="repl-header">
        <span class="label">REPL</span>
        <button class="hdr-btn" id="clearReplBtn" style="font-size:10px;padding:2px 8px">clear</button>
      </div>
      <div class="repl-input-area">
        <textarea id="replInput" rows="1" placeholder="container.utils.uuid()"></textarea>
        <button class="repl-run-btn" id="replRunBtn">Run</button>

    <div class="modal-header">
      <h3>Conversation History</h3>
      <button class="modal-close" id="historyClose">&times;</button>
    </div>
    <div class="modal-body" id="historyBody">
      <div class="empty">Loading...</div>
    </div>
  </div>
</div>

<!-- Create assistant modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Assistant</h3>
      <button class="modal-close" id="createClose">&times;</button>
    </div>
    <div class="modal-body">
      <input class="create-input" id="createNameInput" placeholder="assistant-name" autofocus>
      <button class="create-btn" id="createSubmitBtn">Create</button>
    </div>

<script>
// ── API Base ──────────────────────────────────────────────────────────────────
const API = '/api/workflows/assistant-designer';

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  assistants: [],
  activeId: null,
  files: {},           // filename -> content (from disk)
  activeFile: null,
  modified: new Set(),  // filenames with unsaved changes
  editBuffers: {},     // filename -> current editor content
  isStreaming: false,
  hotReload: false,
  monacoReady: false,
  historySessions: [],
  selectedHistoryId: null,
};

let monacoEditor = null;
let monacoModels = {};
let suppressEditorChange = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const dom = {
  statusDot: $('#statusDot'),
  statusLabel: $('#statusLabel'),
  assistantList: $('#assistantList'),
  tabBar: $('#tabBar'),
  fileLabel: $('#fileLabel'),
  monacoEditor: $('#monacoEditor'),
  editorEmpty: $('#editorEmpty'),
  editorArea: $('#editorArea'),
  saveBtn: $('#saveBtn'),
  chatMessages: $('#chatMessages'),
  chatInput: $('#chatInput'),
  chatSendBtn: $('#chatSendBtn'),
  replInput: $('#replInput'),
  replOutput: $('#replOutput'),
  toastContainer: $('#toastContainer'),
  hotReloadToggle: $('#hotReloadToggle'),
  historyBody: $('#historyBody'),
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  dom.toastContainer.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 3000);
}

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return res.json();
}

// ── Load assistants list ──────────────────────────────────────────────────────
async function loadAssistants() {
  const data = await api('/assistants');
  state.assistants = data.assistants || [];
  renderSidebar();
  if (data.active && !state.activeId) {
    selectAssistant(data.active);
  }
}

function renderSidebar() {
  dom.assistantList.innerHTML = state.assistants.map(a => {
    const aboutLine = (a.about || '').split('\n').find(l => l.trim() && !l.startsWith('#')) || '';
    const active = a.id === state.activeId ? ' active' : '';
    return `<div class="assistant-item${active}" data-id="${a.id}">
      <div class="name">${a.id}</div>
      <div class="about">${aboutLine.trim().slice(0, 60)}</div>
    </div>`;
  }).join('');

  dom.assistantList.querySelectorAll('.assistant-item').forEach(el => {
    el.addEventListener('click', () => selectAssistant(el.dataset.id));
  });
}

// ── Select assistant ──────────────────────────────────────────────────────────
async function selectAssistant(id) {
  if (state.activeId === id) return;
  state.activeId = id;
  state.files = {};
  state.editBuffers = {};
  state.modified.clear();
  state.activeFile = null;

  renderSidebar();
  updateStatus('Loading...');

  // Get full assistant info
  const info = await api(`/assistants/${id}`);
  const files = (info.files || []).filter(f => !f.startsWith('.'));

  // Load all file contents in parallel
  const results = await Promise.all(
    files.map(async (filename) => {
      try {
        const data = await api(`/assistants/${id}/files/${filename}`);
        return { filename, content: data.content || '' };
      } catch {
        return { filename, content: '' };
      }
    })
  );

  for (const { filename, content } of results) {
    state.files[filename] = content;
    state.editBuffers[filename] = content;
  }

  // Render tabs and open first file
  renderTabs();
  const firstFile = files.includes('CORE.md') ? 'CORE.md' : files[0];
  if (firstFile) openFile(firstFile);

  // Load assistant runtime
  try {
    await api(`/assistants/${id}/reload`, { method: 'POST' });
    updateStatus(id, true);
    toast(`Loaded ${id}`, 'success');
  } catch (err) {
    updateStatus(id, false);
    toast(`Failed to load ${id}`, 'error');
  }

  // Start file watching if hot reload is on
  if (state.hotReload) {
    api(`/watch/${id}`, { method: 'POST' });
  }

  // Add system message to chat
  addChatMessage('system', `Connected to ${id}`);
}

function updateStatus(label, active) {
  dom.statusLabel.textContent = label;
  dom.statusDot.classList.toggle('active', !!active);
}

// ── File tabs ─────────────────────────────────────────────────────────────────
function renderTabs() {
  const files = Object.keys(state.files);
  dom.tabBar.innerHTML = files.map(f => {
    const active = f === state.activeFile ? ' active' : '';
    const modified = state.modified.has(f) ? ' modified' : '';
    return `<button class="tab${active}${modified}" data-file="${f}">${f}</button>`;
  }).join('');

  dom.tabBar.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => openFile(el.dataset.file));
  });
}

function detectEditorLanguage(filename) {
  if (!filename) return 'plaintext';
  const lower = filename.toLowerCase();
  if (lower.endsWith('.ts') || lower.endsWith('.tsx')) return 'typescript';
  if (lower.endsWith('.js') || lower.endsWith('.jsx')) return 'javascript';
  if (lower.endsWith('.md')) return 'markdown';
  if (lower.endsWith('.yaml') || lower.endsWith('.yml')) return 'yaml';
  if (lower.endsWith('.json')) return 'json';
  return 'plaintext';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function safeJson(value) {
  try {
    if (typeof value === 'string') {
      try { return JSON.stringify(JSON.parse(value), null, 2); } catch { return value; }
    }
    return JSON.stringify(value, null, 2);
  } catch {
    return String(value);
  }
}

function renderMessageContent(content) {
  if (content == null) return '<span style="color:var(--text-faint)">[no text content]</span>';
  if (typeof content === 'string') {
    try { return marked.parse(content); } catch { return `<pre>${escapeHtml(content)}</pre>`; }
  }
  return `<pre>${escapeHtml(safeJson(content))}</pre>`;
}

function renderHistoryConversation(record) {
  const messages = record.messages || [];
  const meta = `
    <div class="history-meta">
      <div class="title">${escapeHtml(record.title || 'Untitled')}</div>
      <div class="sub">id: ${escapeHtml(record.id || '')}</div>
      <div class="sub">thread: ${escapeHtml(record.thread || '')}</div>
      <div class="sub">model: ${escapeHtml(record.model || '')}</div>
      <div class="sub">messages: ${messages.length}</div>
      <div class="sub">updated: ${record.updatedAt ? escapeHtml(new Date(record.updatedAt).toLocaleString()) : '—'}</div>
    </div>
  `;

  const rendered = messages.map((msg, index) => {
    const role = msg.role || 'unknown';
    const toolCalls = Array.isArray(msg.tool_calls) ? msg.tool_calls : [];
    const toolCallBlocks = toolCalls.map((call) => `
      <div class="history-tool-call">
        <div class="tool-head">tool call · ${escapeHtml(call.function?.name || call.name || 'unknown')}</div>
        <pre>${escapeHtml(safeJson(call.function?.arguments || call.arguments || {}))}</pre>
      </div>
    `).join('');

    let toolResultBlock = '';
    if (role === 'tool') {
      let parsed = null;
      try { parsed = typeof msg.content === 'string' ? JSON.parse(msg.content) : msg.content; } catch {}
      const isFailure = parsed && (parsed.success === false || parsed.error);
      toolResultBlock = `
        <div class="history-tool-call">
          <div class="tool-head" style="color:${isFailure ? 'var(--error)' : 'var(--success)'}">tool result${msg.tool_call_id ? ' · ' + escapeHtml(msg.tool_call_id) : ''}</div>
          <pre>${escapeHtml(safeJson(parsed ?? msg.content))}</pre>
        </div>
      `;
    }

    return `
      <div class="history-msg ${escapeHtml(role)}">
        <div class="head">
          <span>${escapeHtml(role)}</span>
          <span>#${index + 1}</span>
        </div>
        <div class="body">
          ${renderMessageContent(msg.content)}
          ${toolCallBlocks}
          ${toolResultBlock}
        </div>
      </div>
    `;
  }).join('');

  return `${meta}${rendered || '<div class="empty">No messages</div>'}`;
}

function monacoUriForFile(filename) {
  const safeAssistant = encodeURIComponent(state.activeId || 'assistant');
  const safeFile = encodeURIComponent(filename || 'file.txt');
  return window.monaco.Uri.parse(`file:///assistants/${safeAssistant}/${safeFile}`);
}

function ensureMonacoModel(filename) {
  const existing = monacoModels[filename];
  const language = detectEditorLanguage(filename);
  const value = state.editBuffers[filename] ?? state.files[filename] ?? '';

  if (existing) {
    window.monaco.editor.setModelLanguage(existing, language);
    if (existing.getValue() !== value) {
      suppressEditorChange = true;
      existing.setValue(value);
      suppressEditorChange = false;
    }
    return existing;
  }

  const model = window.monaco.editor.createModel(value, language, monacoUriForFile(filename));
  model.onDidChangeContent(() => {
    if (suppressEditorChange || state.activeFile !== filename) return;
    const nextValue = model.getValue();
    state.editBuffers[filename] = nextValue;
    const isModified = nextValue !== state.files[filename];
    if (isModified) state.modified.add(filename);
    else state.modified.delete(filename);
    renderTabs();
  });
  monacoModels[filename] = model;
  return model;
}

async function ensureMonaco() {
  if (state.monacoReady) return;

  await new Promise((resolve, reject) => {
    if (!window.require) {
      reject(new Error('Monaco loader failed to initialize'));
      return;
    }

    window.require.config({
      paths: {
        vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
      }
    });

    window.MonacoEnvironment = {
      getWorkerUrl: function (_moduleId, label) {
        const source = `
          self.MonacoEnvironment = { baseUrl: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/' };
          importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/base/worker/workerMain.js');
        `;
        return `data:text/javascript;charset=utf-8,${encodeURIComponent(source)}`;
      }
    };

    window.require(['vs/editor/editor.main'], resolve, reject);
  });

  window.monaco.editor.defineTheme('agentic-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [],
    colors: {
      'editor.background': '#0a0e17',
      'editorLineNumber.foreground': '#64748b',
      'editorLineNumber.activeForeground': '#38bdf8',
      'editorCursor.foreground': '#e2e8f0',
      'editor.selectionBackground': '#1d4ed833',
      'editor.inactiveSelectionBackground': '#1e293b88',
      'editorGutter.background': '#111827',
    }
  });

  monacoEditor = window.monaco.editor.create(dom.monacoEditor, {
    value: '',
    language: 'markdown',
    theme: 'agentic-dark',
    automaticLayout: true,
    minimap: { enabled: false },
    fontFamily: 'IBM Plex Mono, SF Mono, monospace',
    fontSize: 12,
    lineHeight: 20,
    tabSize: 2,
    insertSpaces: true,
    wordWrap: 'on',
    scrollBeyondLastLine: false,
    renderLineHighlight: 'line',
    padding: { top: 12, bottom: 12 },
  });

  state.monacoReady = true;
}

async function openFile(filename) {
  state.activeFile = filename;
  dom.editorEmpty.style.display = 'none';
  dom.monacoEditor.style.display = 'block';
  dom.saveBtn.style.display = 'inline-block';
  dom.fileLabel.textContent = filename;

  await ensureMonaco();
  const model = ensureMonacoModel(filename);
  monacoEditor.setModel(model);
  monacoEditor.focus();
  monacoEditor.layout();

  renderTabs();
}

// ── Editor events ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (monacoEditor) monacoEditor.layout();
});

// Cmd+S to save
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentFile();
  }
});

async function saveCurrentFile() {
  if (!state.activeId || !state.activeFile) return;
  const content = monacoEditor?.getModel()?.getValue() ?? state.editBuffers[state.activeFile] ?? '';
  try {
    await api(`/assistants/${state.activeId}/files/${state.activeFile}`, {
      method: 'PUT',
      body: { content },
    });
    state.files[state.activeFile] = content;
    state.editBuffers[state.activeFile] = content;
    state.modified.delete(state.activeFile);
    renderTabs();
    toast(`Saved ${state.activeFile}`, 'success');

    // Auto-reload
    await api(`/assistants/${state.activeId}/reload`, { method: 'POST' });
    toast('Assistant reloaded', 'info');
  } catch (err) {
    toast(`Save failed: ${err.message}`, 'error');
  }
}

$('#saveBtn').addEventListener('click', saveCurrentFile);

// ── Chat ──────────────────────────────────────────────────────────────────────
function addChatMessage(role, content) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  if (role === 'assistant') {
    try { el.innerHTML = marked.parse(content); } catch { el.textContent = content; }
  } else {
    el.textContent = content;
  }
  dom.chatMessages.appendChild(el);
  dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
  return el;
}

function formatToolDetail(detail) {
  if (detail == null) return '';
  try {
    return JSON.stringify(detail, null, 2);
  } catch {
    return String(detail);
  }
}

function createAssistantTurn() {
  const el = document.createElement('div');
  el.className = 'assistant-turn';
  dom.chatMessages.appendChild(el);
  dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
  return el;
}

function finalizeAssistantMessage(msgEl, cursor) {
  if (!msgEl) return null;
  if (cursor?.parentNode === msgEl) cursor.remove();
  const text = msgEl.textContent || '';
  if (text.trim()) {
    try { msgEl.innerHTML = marked.parse(text); } catch { msgEl.textContent = text; }
    msgEl.classList.remove('streaming');
    return msgEl;
  }
  msgEl.remove();
  return null;
}

function addToolEvent(parentEl, type, name, detail) {
  const el = document.createElement('div');
  el.className = `tool-event ${type === 'tool_error' ? 'error' : type === 'tool_result' ? 'complete' : ''}`;
  const label = type === 'tool_start' ? 'calling' : type === 'tool_result' ? 'result' : 'error';
  const detailText = formatToolDetail(detail);
  el.innerHTML = `<span class="tool-name">${escapeHtml(name)}</span><span class="tool-label">${label}</span>${detailText ? `<details open><summary>${type === 'tool_start' ? 'args' : type === 'tool_result' ? 'result' : 'error'}</summary><pre>${escapeHtml(detailText)}</pre></details>` : ''}`;
  parentEl.appendChild(el);
  dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
}

async function sendChatMessage() {
  const text = dom.chatInput.value.trim();
  if (!text || state.isStreaming || !state.activeId) return;

  addChatMessage('user', text);
  dom.chatInput.value = '';
  state.isStreaming = true;
  dom.chatSendBtn.disabled = true;

  // Create streaming assistant turn
  const turnEl = createAssistantTurn();
  let msgEl = document.createElement('div');
  msgEl.className = 'msg assistant streaming';
  turnEl.appendChild(msgEl);
  const cursor = document.createElement('span');
  cursor.className = 'streaming-cursor';
  msgEl.appendChild(cursor);

  function startNewAssistantSegment() {
    msgEl = document.createElement('div');
    msgEl.className = 'msg assistant streaming';
    turnEl.appendChild(msgEl);
    msgEl.appendChild(cursor);
  }

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, assistantId: state.activeId }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          var eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (eventType === 'chunk') {
              if (cursor.parentNode !== msgEl) msgEl.appendChild(cursor);
              cursor.remove();
              msgEl.textContent += data.text || '';
              msgEl.appendChild(cursor);
              dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
            } else if (eventType === 'segment_end') {
              finalizeAssistantMessage(msgEl, cursor);
            } else if (eventType === 'tool_start') {
              addToolEvent(turnEl, 'tool_start', data.name, data.args);
            } else if (eventType === 'tool_result') {
              addToolEvent(turnEl, 'tool_result', data.name, data.result);
              startNewAssistantSegment();
            } else if (eventType === 'tool_error') {
              addToolEvent(turnEl, 'tool_error', data.name, data.error);
              startNewAssistantSegment();
            } else if (eventType === 'done') {
              finalizeAssistantMessage(msgEl, cursor);
              if ((!msgEl.textContent || !msgEl.textContent.trim()) && data.response) {
                msgEl.textContent = data.response;
                finalizeAssistantMessage(msgEl, cursor);
              }
            } else if (eventType === 'error') {
              cursor.remove();
              msgEl.innerHTML = `<span style="color:var(--error)">${data.message || 'Error'}</span>`;
            }
          } catch {}
        }
      }
    }
  } catch (err) {
    cursor.remove();
    msgEl.innerHTML = `<span style="color:var(--error)">Connection error: ${err.message}</span>`;
  }

  cursor.remove();
  state.isStreaming = false;
  dom.chatSendBtn.disabled = false;
}

dom.chatSendBtn.addEventListener('click', sendChatMessage);
dom.chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
});

// Auto-resize chat input
dom.chatInput.addEventListener('input', () => {
  dom.chatInput.style.height = 'auto';
  dom.chatInput.style.height = Math.min(dom.chatInput.scrollHeight, 80) + 'px';
});

// Clear chat
$('#clearChatBtn').addEventListener('click', async () => {
  dom.chatMessages.innerHTML = '';
  if (state.activeId) {
    await api('/chat', { method: 'DELETE' });
    addChatMessage('system', 'Chat cleared');
  }
});

// ── REPL ──────────────────────────────────────────────────────────────────────
async function runRepl() {
  const code = dom.replInput.value.trim();
  if (!code) return;

  const entry = document.createElement('div');
  entry.className = 'repl-entry';
  entry.innerHTML = `<div><span class="repl-prompt">&gt; </span>${escapeHtml(code)}</div>`;
  dom.replOutput.appendChild(entry);

  try {
    const data = await api('/eval', { method: 'POST', body: { code, assistantId: state.activeId } });
    const outEl = document.createElement('div');
    if (data.ok) {
      outEl.className = 'repl-ok';
      try { outEl.innerHTML = marked.parse(data.output || 'undefined'); } catch { outEl.textContent = data.output || 'undefined'; }
    } else {
      outEl.className = 'repl-err';
      outEl.textContent = data.error;
    }
    entry.appendChild(outEl);
  } catch (err) {
    const outEl = document.createElement('div');
    outEl.className = 'repl-err';
    outEl.textContent = err.message;
    entry.appendChild(outEl);
  }

  dom.replOutput.scrollTop = dom.replOutput.scrollHeight;
  dom.replInput.value = '';
}

$('#replRunBtn').addEventListener('click', runRepl);
dom.replInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    runRepl();
  }
});
$('#clearReplBtn').addEventListener('click', () => { dom.replOutput.innerHTML = ''; });

// ── Hot reload toggle ─────────────────────────────────────────────────────────
dom.hotReloadToggle.addEventListener('change', async () => {
  state.hotReload = dom.hotReloadToggle.checked;
  if (state.hotReload && state.activeId) {
    await api(`/watch/${state.activeId}`, { method: 'POST' });
    toast('File watching enabled', 'info');
    startPolling();
  } else {
    stopPolling();
  }
});

// Simple polling for file changes (fallback since we don't have a persistent WS to this workflow)
let pollInterval = null;
function startPolling() {
  stopPolling();
  pollInterval = setInterval(async () => {
    if (!state.activeId || !state.activeFile) return;
    try {
      const data = await api(`/assistants/${state.activeId}/files/${state.activeFile}`);
      if (data.content !== state.files[state.activeFile]) {
        state.files[state.activeFile] = data.content;
        // Only update if not modified locally
        if (!state.modified.has(state.activeFile)) {
          state.editBuffers[state.activeFile] = data.content;
          const model = monacoModels[state.activeFile];
          if (model) {
            suppressEditorChange = true;
            model.setValue(data.content);
            suppressEditorChange = false;
          }
          toast(`${state.activeFile} changed externally`, 'info');
        }
      }
    } catch {}
  }, 2000);
}
function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// ── History modal ─────────────────────────────────────────────────────────────
async function loadHistoryConversation(conversationId) {
  if (!state.activeId || !conversationId) return;
  state.selectedHistoryId = conversationId;

  const listHtml = (state.historySessions || []).map(s => {
    const active = s.id === state.selectedHistoryId ? ' active' : '';
    return `
      <div class="history-item${active}" data-conversation-id="${s.id}">
        <div>
          <div class="thread-id">${escapeHtml(s.title || s.threadId || s.id)}</div>
          <div class="meta">${escapeHtml(s.threadId || '')}</div>
        </div>
        <span class="meta">${s.messageCount} msgs${s.updatedAt ? ' &middot; ' + new Date(s.updatedAt).toLocaleDateString() : ''}</span>
      </div>
    `;
  }).join('');

  dom.historyBody.innerHTML = `
    <div class="history-layout">
      <div class="history-list">${listHtml}</div>
      <div class="history-detail"><div class="empty">Loading conversation...</div></div>
    </div>
  `;

  dom.historyBody.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => loadHistoryConversation(el.dataset.conversationId));
  });

  try {
    const data = await api(`/assistants/${state.activeId}/history/${conversationId}`);
    const detail = dom.historyBody.querySelector('.history-detail');
    detail.innerHTML = renderHistoryConversation(data.conversation || {});
  } catch (err) {
    const detail = dom.historyBody.querySelector('.history-detail');
    detail.innerHTML = `<div class="empty">Error: ${escapeHtml(err.message)}</div>`;
  }
}

$('#historyBtn').addEventListener('click', async () => {
  $('#historyModal').classList.add('open');
  if (!state.activeId) {
    dom.historyBody.innerHTML = '<div class="empty">Select an assistant first</div>';
    return;
  }
  dom.historyBody.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const data = await api(`/assistants/${state.activeId}/history`);
    const sessions = data.sessions || [];
    state.historySessions = sessions;
    if (!sessions.length) {
      dom.historyBody.innerHTML = '<div class="empty">No conversation history</div>';
      return;
    }
    await loadHistoryConversation(sessions[0].id);
  } catch (err) {
    dom.historyBody.innerHTML = `<div class="empty">Error: ${escapeHtml(err.message)}</div>`;
  }
});
$('#historyClose').addEventListener('click', () => $('#historyModal').classList.remove('open'));
$('#historyModal').addEventListener('click', (e) => {
  if (e.target === $('#historyModal')) $('#historyModal').classList.remove('open');
});

// ── Create assistant modal ────────────────────────────────────────────────────
$('#newAssistantBtn').addEventListener('click', () => {
  $('#createModal').classList.add('open');
  $('#createNameInput').value = '';
  setTimeout(() => $('#createNameInput').focus(), 50);
});
$('#createClose').addEventListener('click', () => $('#createModal').classList.remove('open'));
$('#createModal').addEventListener('click', (e) => {
  if (e.target === $('#createModal')) $('#createModal').classList.remove('open');
});

$('#createSubmitBtn').addEventListener('click', async () => {
  const name = $('#createNameInput').value.trim();
  if (!name) return;
  try {
    const data = await api('/create', { method: 'POST', body: { name } });
    if (data.ok) {
      toast(`Created ${name}`, 'success');
      $('#createModal').classList.remove('open');
      await loadAssistants();
      selectAssistant(name);
    } else {
      toast(data.error || 'Failed to create', 'error');
    }
  } catch (err) {
    toast(err.message, 'error');
  }
});
$('#createNameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('#createSubmitBtn').click();
});

// ── Panel toggles ─────────────────────────────────────────────────────────────
$('#toggleSidebar').addEventListener('click', () => {
  $('#sidebar').classList.toggle('collapsed');
  requestAnimationFrame(() => monacoEditor?.layout());
});
$('#toggleRight').addEventListener('click', () => {
  $('#rightPanel').classList.toggle('collapsed');
  requestAnimationFrame(() => monacoEditor?.layout());
});

// ── Reload button ─────────────────────────────────────────────────────────────
$('#reloadBtn').addEventListener('click', async () => {
  if (!state.activeId) return;
  try {
    await api(`/assistants/${state.activeId}/reload`, { method: 'POST' });
    toast('Assistant reloaded', 'success');
    updateStatus(state.activeId, true);
  } catch (err) {
    toast(`Reload failed: ${err.message}`, 'error');
  }
});

// ── Vertical resize handle ────────────────────────────────────────────────────
const resizeHandle = $('#resizeHandleH');
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  e.preventDefault();
  const chatPanel = document.querySelector('.chat-panel');
  const replPanel = document.querySelector('.repl-panel');
  const startY = e.clientY;
  const startChatFlex = chatPanel.style.flex ? parseFloat(chatPanel.style.flex) : 6;
  const startReplFlex = replPanel.style.flex ? parseFloat(replPanel.style.flex) : 4;
  const totalFlex = startChatFlex + startReplFlex;
  const rightPanelRect = document.querySelector('.right-panel').getBoundingClientRect();

  const onMove = (e) => {
    if (!isResizing) return;
    const dy = e.clientY - startY;
    const ratio = dy / rightPanelRect.height;
    const newChat = Math.max(2, Math.min(totalFlex - 2, startChatFlex + ratio * totalFlex));
    chatPanel.style.flex = newChat;
    replPanel.style.flex = totalFlex - newChat;
    monacoEditor?.layout();
  };

  const onUp = () => {
    isResizing = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadAssistants();

// Auto-select from URL hash
if (location.hash) {
  const id = location.hash.slice(1);
  setTimeout(() => selectAssistant(id), 300);
}
</script>
</body>
