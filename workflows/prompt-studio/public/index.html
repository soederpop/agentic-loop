<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prompt Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/editor/editor.main.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #16161f;
    --surface-3: #1a1a26;
    --border: #1e1e2e;
    --border-light: #2a2a3e;
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --text-faint: #3a3a50;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --accent-glow: #00fff740;
    --purple: #c084fc;
    --purple-dim: #c084fc20;
    --success: #39ff14;
    --success-dim: #39ff1420;
    --warning: #f59e0b;
    --warning-dim: #f59e0b20;
    --error: #ff003c;
    --error-dim: #ff003c20;
    --blue: #60a5fa;
    --blue-dim: #60a5fa20;
    --orange: #fb923c;
    --orange-dim: #fb923c20;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  body { display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ─────────────────────────── */
  .header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: var(--surface);
    z-index: 10;
  }

  .header h1 { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }
  .divider { width: 1px; height: 18px; background: var(--border); }
  .spacer { flex: 1; }

  .header-actions { display: flex; align-items: center; gap: 8px; }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--border-light); background: var(--surface-3); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-accent { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); font-weight: 600; }
  .btn-accent:hover { background: var(--accent-glow); }
  .btn-purple { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); font-weight: 600; }
  .btn-purple:hover { background: #c084fc30; }
  .btn-success { border-color: var(--success); color: var(--success); background: var(--success-dim); font-weight: 600; }
  .btn-success:hover { background: #39ff1430; }
  .btn-warning { border-color: var(--warning); color: var(--warning); background: var(--warning-dim); font-weight: 600; }
  .btn-warning:hover { background: #f59e0b30; }

  .save-indicator { font-size: 10px; color: var(--text-faint); transition: all 0.3s; }
  .save-indicator.saving { color: var(--warning); }
  .save-indicator.saved { color: var(--success); }

  .meta-select {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }

  .meta-select:focus { border-color: var(--accent); }

  /* ── Layout ─────────────────────────── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ────────────────────────── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-header h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 4px; list-style: none; }

  .prompt-item {
    padding: 7px 9px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 1px;
  }

  .prompt-item:hover { background: var(--surface-2); }
  .prompt-item.active { background: var(--surface-3); border: 1px solid var(--border-light); }

  .prompt-item-title { font-size: 11px; color: var(--text); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prompt-item-meta { font-size: 9px; color: var(--text-dim); margin-top: 1px; display: flex; gap: 6px; }

  .tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface-3); color: var(--text-dim); }

  /* ── Main Area ──────────────────────── */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── Tab Bar ────────────────────────── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    padding: 0 16px;
  }

  .tab {
    padding: 7px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab .badge-count {
    position: absolute;
    top: 2px;
    right: 2px;
    min-width: 14px;
    height: 14px;
    border-radius: 7px;
    background: var(--purple);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
  }

  /* ── Panels ─────────────────────────── */
  .panel { display: none; flex: 1; overflow: hidden; }
  .panel.active { display: flex; flex-direction: column; }

  /* ── Inputs Bar ─────────────────────── */
  .inputs-bar {
    display: none;
    padding: 8px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .inputs-bar.has-inputs { display: flex; }

  .inputs-bar-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--orange);
    font-weight: 600;
  }

  .input-field { display: flex; align-items: center; gap: 5px; }

  .input-field label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-field input {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    min-width: 140px;
  }

  .input-field input:focus { border-color: var(--orange); }
  .input-field input::placeholder { color: var(--text-faint); }

  /* ── Notebook Panel ─────────────────── */
  .notebook-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }

  .nb-block { margin-bottom: 16px; animation: slideUp 0.15s ease-out; }

  .nb-prose { font-size: 13px; line-height: 1.8; color: var(--text); max-width: 720px; padding: 4px 0; }
  .nb-prose h1 { font-size: 20px; color: var(--accent); margin: 16px 0 8px; font-weight: 700; }
  .nb-prose h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); margin: 20px 0 8px; font-weight: 700; }
  .nb-prose h3 { font-size: 13px; color: var(--purple); margin: 14px 0 6px; font-weight: 700; }
  .nb-prose p { margin-bottom: 8px; }
  .nb-prose ul, .nb-prose ol { padding-left: 20px; margin: 8px 0; }
  .nb-prose li { margin-bottom: 4px; }
  .nb-prose code { background: var(--surface-3); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--purple); }
  .nb-prose strong { color: var(--text); }
  .nb-prose em { color: var(--text-dim); font-style: italic; }
  .nb-prose blockquote { border-left: 3px solid var(--border-light); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
  .nb-prose a { color: var(--accent); text-decoration: none; }

  .nb-code-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .nb-code-header {
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .nb-code-lang { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--orange); font-weight: 600; }
  .nb-code-spacer { flex: 1; }

  .nb-run-btn {
    background: var(--success-dim);
    border: 1px solid var(--success);
    border-radius: 4px;
    color: var(--success);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .nb-run-btn:hover { background: #39ff1430; }
  .nb-run-btn.running { animation: pulse 1s ease-in-out infinite; }

  .nb-code-body { padding: 12px 16px; font-size: 12px; line-height: 1.6; color: var(--text); overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .nb-code-body .kw { color: var(--purple); }
  .nb-code-body .str { color: var(--success); }
  .nb-code-body .cmt { color: var(--text-faint); font-style: italic; }
  .nb-code-body .num { color: var(--orange); }

  .nb-output { border-top: 1px solid var(--border); background: var(--bg); padding: 10px 16px; font-size: 12px; line-height: 1.5; max-height: 200px; overflow-y: auto; }
  .nb-output:empty { display: none; }
  .nb-output-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-faint); margin-bottom: 4px; }
  .nb-output-text { color: var(--text-dim); white-space: pre-wrap; word-break: break-word; }
  .nb-output-error { color: var(--error); white-space: pre-wrap; word-break: break-word; }
  .nb-output-result { color: var(--accent); margin-top: 4px; }

  /* ── REPL ───────────────────────────── */
  .repl-container { border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }

  .repl-toggle {
    padding: 5px 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .repl-toggle:hover { color: var(--text); }
  .repl-toggle .chevron { font-size: 8px; transition: transform 0.15s; }
  .repl-toggle.open .chevron { transform: rotate(180deg); }

  .repl-body { display: none; }
  .repl-body.open { display: flex; flex-direction: column; }

  .repl-history { max-height: 180px; overflow-y: auto; padding: 6px 16px; font-size: 12px; }
  .repl-entry { margin-bottom: 6px; }
  .repl-entry-input { color: var(--accent); }
  .repl-entry-input::before { content: '> '; color: var(--text-faint); }
  .repl-entry-output { color: var(--text-dim); white-space: pre-wrap; padding-left: 16px; }
  .repl-entry-error { color: var(--error); white-space: pre-wrap; padding-left: 16px; }

  .repl-input-row { display: flex; gap: 8px; padding: 6px 16px 10px; border-top: 1px solid var(--border); }

  .repl-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
  }

  .repl-input:focus { border-color: var(--accent); }
  .repl-input::placeholder { color: var(--text-faint); }

  .repl-send {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
  }

  .repl-send:hover { background: var(--accent-glow); }

  /* ── Editor Panel ───────────────────── */
  .editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #monaco-container { flex: 1; }

  /* ── Queue / Run Output Panel ───────── */
  .queue-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .queue-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .queue-header h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }

  .queue-scroll { flex: 1; overflow-y: auto; padding: 12px 16px; }

  .queue-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
    animation: slideUp 0.15s ease-out;
  }

  .queue-item.running { border-color: var(--success); }
  .queue-item.complete { border-color: var(--border-light); }
  .queue-item.error { border-color: var(--error); }

  .queue-item-header {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    cursor: pointer;
    user-select: none;
  }

  .queue-item-header:hover { background: var(--surface-3); }

  .queue-item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .queue-item-dot.queued { background: var(--warning); }
  .queue-item-dot.running { background: var(--success); animation: pulse 1s ease-in-out infinite; }
  .queue-item-dot.complete { background: var(--success); }
  .queue-item-dot.error { background: var(--error); }

  .queue-item-title { font-size: 12px; color: var(--text); flex: 1; }
  .queue-item-agent { font-size: 10px; color: var(--text-dim); }
  .queue-item-status { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .queue-item-chevron { color: var(--text-faint); font-size: 12px; transition: transform 0.2s; }
  .queue-item.expanded .queue-item-chevron { transform: rotate(90deg); }

  .queue-item-body { display: none; border-top: 1px solid var(--border); max-height: 400px; overflow-y: auto; }
  .queue-item.expanded .queue-item-body { display: block; }

  .queue-item-output {
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .queue-item-output h1 { font-size: 18px; color: var(--accent); margin: 12px 0 6px; }
  .queue-item-output h2 { font-size: 15px; color: var(--accent); margin: 16px 0 6px; }
  .queue-item-output h3 { font-size: 13px; color: var(--purple); margin: 12px 0 4px; }
  .queue-item-output p { margin-bottom: 6px; }
  .queue-item-output ul, .queue-item-output ol { padding-left: 20px; margin: 6px 0; }
  .queue-item-output li { margin-bottom: 3px; }
  .queue-item-output strong { color: var(--text); }
  .queue-item-output em { color: var(--text-dim); }
  .queue-item-output a { color: var(--accent); }
  .queue-item-output blockquote { border-left: 3px solid var(--border-light); padding-left: 12px; color: var(--text-dim); margin: 6px 0; }
  .queue-item-output pre { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin: 6px 0; overflow-x: auto; font-size: 12px; line-height: 1.5; }
  .queue-item-output code { background: var(--surface-3); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--purple); }
  .queue-item-output pre code { background: none; padding: 0; color: var(--text); }

  .queue-item-remove {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .queue-item-remove:hover { color: var(--error); }

  /* ── Modal ──────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 380px;
    max-width: 90vw;
  }

  .modal h2 { font-size: 14px; color: var(--accent); margin-bottom: 16px; font-weight: 700; }

  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 4px; }
  .modal-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; outline: none; }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ── Empty state ────────────────────── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); text-align: center; padding: 40px; }
  .empty-state p { font-size: 13px; max-width: 360px; line-height: 1.6; }

  /* ── Animations ─────────────────────── */
  @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>
<body>

<div class="header">
  <h1>Prompt Studio</h1>
  <div class="divider"></div>
  <span id="prompt-title" style="font-size:12px;color:var(--text-dim)">Select a prompt</span>
  <span class="save-indicator" id="save-indicator"></span>
  <div class="spacer"></div>
  <div class="header-actions">
    <select class="meta-select" id="agent-select" title="Agent">
      <option value="claude">claude</option>
    </select>
    <button class="btn btn-purple" id="queue-btn" disabled>+ Queue</button>
    <button class="btn btn-success" id="run-queue-btn" disabled>Run Queue</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>Prompts</h3>
      <button class="btn" id="new-prompt-btn" style="font-size:10px;padding:3px 7px;">+ New</button>
    </div>
    <ul class="sidebar-list" id="prompt-list"></ul>
  </aside>

  <!-- Main Area -->
  <div class="main-area">
    <!-- Inputs Bar -->
    <div class="inputs-bar" id="inputs-bar">
      <span class="inputs-bar-label">Inputs</span>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab active" data-tab="notebook">Notebook</div>
      <div class="tab" data-tab="editor">Source</div>
      <div class="tab" data-tab="queue">Queue <span class="badge-count" id="queue-badge" style="display:none">0</span></div>
    </div>

    <!-- Notebook Panel -->
    <div class="panel active" id="panel-notebook">
      <div class="notebook-scroll" id="notebook-scroll">
        <div class="empty-state"><p>Select a prompt from the sidebar or create a new one.</p></div>
      </div>
      <div class="repl-container">
        <div class="repl-toggle" id="repl-toggle"><span class="chevron">&#9660;</span> REPL</div>
        <div class="repl-body" id="repl-body">
          <div class="repl-history" id="repl-history"></div>
          <div class="repl-input-row">
            <input class="repl-input" id="repl-input" placeholder="container.docs, container.utils, ..." />
            <button class="repl-send" id="repl-send">Eval</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Editor Panel (Monaco) -->
    <div class="panel" id="panel-editor">
      <div class="editor-container">
        <div id="monaco-container"></div>
      </div>
    </div>

    <!-- Queue Panel -->
    <div class="panel" id="panel-queue">
      <div class="queue-panel">
        <div class="queue-header">
          <h3>Run Queue</h3>
          <div class="spacer"></div>
          <button class="btn" id="clear-queue-btn" style="font-size:10px;padding:3px 7px;">Clear Done</button>
        </div>
        <div class="queue-scroll" id="queue-scroll">
          <div class="queue-empty" id="queue-empty">Queue is empty. Select a prompt and click "+ Queue" to add it.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Prompt Modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <h2>New Prompt</h2>
    <div class="modal-field">
      <label>Title</label>
      <input type="text" id="new-title" placeholder="My New Prompt" />
    </div>
    <div class="modal-field">
      <label>Slug (filename)</label>
      <input type="text" id="new-slug" placeholder="my-new-prompt" />
    </div>
    <div class="modal-actions">
      <button class="btn" id="new-cancel">Cancel</button>
      <button class="btn btn-accent" id="new-create">Create</button>
    </div>
  </div>
</div>

<!-- Monaco Editor Loader -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script type="module">
  const API = window.location.origin

  // ── State ──────────────────────────────
  let prompts = []
  let currentPrompt = null
  let currentRawContent = ''
  let monacoEditor = null
  let monacoReady = false
  let saveTimeout = null
  let queue = [] // { id, slug, title, agent, inputs, status, output, eventSource }

  // ── Elements ───────────────────────────
  const promptList = document.getElementById('prompt-list')
  const promptTitle = document.getElementById('prompt-title')
  const saveIndicator = document.getElementById('save-indicator')
  const agentSelect = document.getElementById('agent-select')
  const queueBtn = document.getElementById('queue-btn')
  const runQueueBtn = document.getElementById('run-queue-btn')
  const notebookScroll = document.getElementById('notebook-scroll')
  const queueScroll = document.getElementById('queue-scroll')
  const queueEmpty = document.getElementById('queue-empty')
  const queueBadge = document.getElementById('queue-badge')
  const inputsBar = document.getElementById('inputs-bar')
  const replToggle = document.getElementById('repl-toggle')
  const replBody = document.getElementById('repl-body')
  const replInput = document.getElementById('repl-input')
  const replSend = document.getElementById('repl-send')
  const replHistory = document.getElementById('repl-history')

  // ── Monaco Init ────────────────────────
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } })

  require(['vs/editor/editor.main'], () => {
    monaco.editor.defineTheme('prompt-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [
        { token: 'comment', foreground: '3a3a50', fontStyle: 'italic' },
        { token: 'keyword', foreground: 'c084fc' },
        { token: 'string', foreground: '39ff14' },
        { token: 'number', foreground: 'fb923c' },
        { token: 'type', foreground: '00fff7' },
      ],
      colors: {
        'editor.background': '#0a0a0f',
        'editor.foreground': '#e0e0e8',
        'editor.lineHighlightBackground': '#12121a',
        'editor.selectionBackground': '#2a2a3e',
        'editorCursor.foreground': '#00fff7',
        'editorLineNumber.foreground': '#3a3a50',
        'editorLineNumber.activeForeground': '#6a6a80',
        'editor.inactiveSelectionBackground': '#1e1e2e',
      },
    })

    monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
      value: '',
      language: 'markdown',
      theme: 'prompt-dark',
      fontFamily: "'SF Mono', 'Fira Code', 'JetBrains Mono', monospace",
      fontSize: 13,
      lineHeight: 22,
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      wordWrap: 'on',
      tabSize: 2,
      automaticLayout: true,
      padding: { top: 12 },
    })

    monacoEditor.onDidChangeModelContent(() => {
      if (!currentPrompt) return
      clearTimeout(saveTimeout)
      saveIndicator.textContent = 'unsaved'
      saveIndicator.className = 'save-indicator'

      saveTimeout = setTimeout(async () => {
        const content = monacoEditor.getValue()
        saveIndicator.textContent = 'saving...'
        saveIndicator.className = 'save-indicator saving'

        try {
          await fetch(`${API}/api/prompt/${currentPrompt.slug}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content }),
          })

          saveIndicator.textContent = 'saved'
          saveIndicator.className = 'save-indicator saved'
          currentRawContent = content
          renderNotebook(content)

          // Re-fetch prompt to get updated meta (e.g. inputs changes)
          const res = await fetch(`${API}/api/prompt/${currentPrompt.slug}`)
          const data = await res.json()
          if (!data.error) {
            currentPrompt = data
            renderInputsBar(data.inputs || {})
          }

          setTimeout(() => { saveIndicator.textContent = ''; saveIndicator.className = 'save-indicator'; }, 2000)
        } catch (_err) {
          saveIndicator.textContent = 'save failed'
          saveIndicator.className = 'save-indicator'
          saveIndicator.style.color = 'var(--error)'
        }
      }, 800)
    })

    monacoReady = true
    if (currentPrompt) monacoEditor.setValue(currentRawContent)
  })

  // ── Tabs ───────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
      tab.classList.add('active')
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active')
      if (tab.dataset.tab === 'editor' && monacoEditor) monacoEditor.layout()
    })
  })

  // ── Load prompts ───────────────────────
  async function loadPrompts(selectSlug) {
    try {
      const res = await fetch(`${API}/api/prompts`)
      const data = await res.json()
      prompts = data.prompts || []
      renderPromptList()

      if (selectSlug) {
        selectPrompt(selectSlug)
      } else {
        const hash = window.location.hash.slice(1)
        const target = prompts.find(p => p.slug === hash) || prompts[0]
        if (target) selectPrompt(target.slug)
      }
    } catch (err) {
      console.error('Failed to load prompts:', err)
      promptList.innerHTML = '<li style="padding:16px;color:var(--error);font-size:12px;">Failed to load</li>'
    }
  }

  function renderPromptList() {
    promptList.innerHTML = ''
    if (prompts.length === 0) {
      promptList.innerHTML = '<li style="padding:16px;color:var(--text-dim);font-size:12px;text-align:center;">No prompts yet</li>'
      return
    }

    for (const p of prompts) {
      const li = document.createElement('li')
      li.className = `prompt-item${currentPrompt?.slug === p.slug ? ' active' : ''}`
      li.dataset.slug = p.slug
      const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ')
      const inputs = p.inputs ? Object.keys(p.inputs) : []
      const inputBadge = inputs.length > 0 ? `<span style="color:var(--orange)">${inputs.length} input${inputs.length > 1 ? 's' : ''}</span>` : ''
      li.innerHTML = `<div class="prompt-item-title">${esc(p.title)}</div><div class="prompt-item-meta">${tags} ${inputBadge}</div>`
      li.addEventListener('click', () => selectPrompt(p.slug))
      promptList.appendChild(li)
    }
  }

  // ── Select prompt ──────────────────────
  async function selectPrompt(slug) {
    try {
      const res = await fetch(`${API}/api/prompt/${slug}`)
      const data = await res.json()
      if (data.error) { console.error(data.error); return }

      currentPrompt = data
      currentRawContent = data.rawContent
      window.location.hash = slug
      promptTitle.textContent = data.title
      queueBtn.disabled = false

      document.querySelectorAll('.prompt-item').forEach(el => el.classList.toggle('active', el.dataset.slug === slug))

      if (monacoEditor) monacoEditor.setValue(data.rawContent)
      renderNotebook(data.rawContent)
      renderInputsBar(data.inputs || {})
    } catch (err) { console.error('Failed to load prompt:', err) }
  }

  // ── Inputs Bar ─────────────────────────
  function renderInputsBar(inputs) {
    const keys = Object.keys(inputs || {})
    inputsBar.innerHTML = '<span class="inputs-bar-label">Inputs</span>'

    if (keys.length === 0) {
      inputsBar.classList.remove('has-inputs')
      return
    }

    inputsBar.classList.add('has-inputs')

    for (const key of keys) {
      const spec = inputs[key]
      const field = document.createElement('div')
      field.className = 'input-field'
      field.innerHTML = `
        <label>${esc(key)}</label>
        <input type="text" data-input-key="${esc(key)}" placeholder="${esc(spec.question || spec.description || key)}" />
      `
      inputsBar.appendChild(field)
    }
  }

  function getInputValues() {
    const values = {}
    inputsBar.querySelectorAll('input[data-input-key]').forEach(el => {
      const key = el.dataset.inputKey
      if (el.value.trim()) values[key] = el.value.trim()
    })
    return values
  }

  // ── Parse markdown into blocks ─────────
  function parseMarkdownBlocks(text) {
    let content = text
    if (content.startsWith('---')) {
      const end = content.indexOf('---', 3)
      if (end !== -1) content = content.slice(end + 3).trim()
    }

    const blocks = []
    const lines = content.split('\n')
    let i = 0

    while (i < lines.length) {
      const fenceMatch = lines[i].match(/^```(\w*)(.*)$/)
      if (fenceMatch) {
        const lang = fenceMatch[1] || '', meta = fenceMatch[2]?.trim() || ''
        const codeLines = []
        i++
        while (i < lines.length && !lines[i].match(/^```\s*$/)) { codeLines.push(lines[i]); i++ }
        i++
        blocks.push({ type: 'code', lang, meta, code: codeLines.join('\n') })
      } else {
        const proseLines = [lines[i]]
        i++
        while (i < lines.length && !lines[i].match(/^```/)) { proseLines.push(lines[i]); i++ }
        const prose = proseLines.join('\n').trim()
        if (prose) blocks.push({ type: 'prose', text: prose })
      }
    }
    return blocks
  }

  // ── Render notebook ────────────────────
  function renderNotebook(rawContent) {
    const blocks = parseMarkdownBlocks(rawContent)
    notebookScroll.innerHTML = ''

    if (blocks.length === 0) {
      notebookScroll.innerHTML = '<div class="empty-state"><p>Empty prompt. Switch to Source to start writing.</p></div>'
      return
    }

    blocks.forEach((block, idx) => {
      const el = document.createElement('div')
      el.className = 'nb-block'

      if (block.type === 'prose') {
        el.innerHTML = `<div class="nb-prose">${renderMarkdown(block.text)}</div>`
      } else {
        const isRunnable = ['ts', 'typescript', 'js', 'javascript'].includes(block.lang)
        el.innerHTML = `
          <div class="nb-code-block">
            <div class="nb-code-header">
              <span class="nb-code-lang">${esc(block.lang || 'text')}</span>
              ${block.meta ? `<span style="font-size:10px;color:var(--text-faint)">${esc(block.meta)}</span>` : ''}
              <div class="nb-code-spacer"></div>
              ${isRunnable ? `<button class="nb-run-btn" data-idx="${idx}">Run</button>` : ''}
            </div>
            <div class="nb-code-body">${highlightCode(block.code)}</div>
            <div class="nb-output" id="nb-output-${idx}"></div>
          </div>
        `
      }
      notebookScroll.appendChild(el)
    })

    // Bind run buttons
    notebookScroll.querySelectorAll('.nb-run-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.dataset.idx)
        const block = blocks[idx]
        if (!block) return
        btn.classList.add('running'); btn.textContent = '...'
        const out = document.getElementById(`nb-output-${idx}`)
        out.innerHTML = '<div class="nb-output-label">Running...</div>'
        try {
          const res = await fetch(`${API}/api/eval`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: block.code }) })
          const data = await res.json()
          let h = ''
          if (data.output) h += `<div class="nb-output-label">Output</div><div class="nb-output-text">${esc(data.output)}</div>`
          if (data.error) h += `<div class="nb-output-label">Error</div><div class="nb-output-error">${esc(data.error)}</div>`
          if (data.result !== undefined && data.result !== 'undefined') h += `<div class="nb-output-result">${esc(data.result)}</div>`
          out.innerHTML = h || '<div class="nb-output-label" style="color:var(--success)">OK</div>'
        } catch (e) { out.innerHTML = `<div class="nb-output-error">${esc(e.message)}</div>` }
        btn.classList.remove('running'); btn.textContent = 'Run'
      })
    })

    // Re-attach REPL
    document.getElementById('panel-notebook').appendChild(document.querySelector('.repl-container'))
  }

  // ── REPL ───────────────────────────────
  let replOpen = false
  replToggle.addEventListener('click', () => { replOpen = !replOpen; replToggle.classList.toggle('open', replOpen); replBody.classList.toggle('open', replOpen); if (replOpen) replInput.focus() })

  async function evalRepl() {
    const code = replInput.value.trim()
    if (!code) return
    replInput.value = ''
    const entry = document.createElement('div')
    entry.className = 'repl-entry'
    entry.innerHTML = `<div class="repl-entry-input">${esc(code)}</div>`
    replHistory.appendChild(entry)
    try {
      const res = await fetch(`${API}/api/eval`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) })
      const data = await res.json()
      let h = ''
      if (data.output) h += `<div class="repl-entry-output">${esc(data.output)}</div>`
      if (data.error) h += `<div class="repl-entry-error">${esc(data.error)}</div>`
      if (data.result !== undefined && data.result !== 'undefined') h += `<div class="repl-entry-output" style="color:var(--accent)">${esc(data.result)}</div>`
      if (h) entry.innerHTML += h
    } catch (e) { entry.innerHTML += `<div class="repl-entry-error">${esc(e.message)}</div>` }
    replHistory.scrollTop = replHistory.scrollHeight
  }

  replSend.addEventListener('click', evalRepl)
  replInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); evalRepl() } })

  // ── Queue System ───────────────────────
  let queueIdCounter = 0

  queueBtn.addEventListener('click', () => {
    if (!currentPrompt) return
    const id = ++queueIdCounter
    const inputs = getInputValues()

    queue.push({
      id,
      slug: currentPrompt.slug,
      title: currentPrompt.title,
      agent: agentSelect.value,
      inputs,
      status: 'queued',
      output: '',
      controller: null,
    })

    updateQueueUI()
    runQueueBtn.disabled = false
  })

  runQueueBtn.addEventListener('click', () => {
    // Start all queued items in parallel
    const toRun = queue.filter(q => q.status === 'queued')
    if (toRun.length === 0) return

    // Switch to queue tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
    document.querySelector('[data-tab="queue"]').classList.add('active')
    document.getElementById('panel-queue').classList.add('active')

    toRun.forEach(item => startQueueItem(item))
    updateQueueUI()
  })

  document.getElementById('clear-queue-btn').addEventListener('click', () => {
    queue = queue.filter(q => q.status === 'running' || q.status === 'queued')
    updateQueueUI()
  })

  async function startQueueItem(item) {
    item.status = 'running'
    item.output = ''
    updateQueueUI()

    const controller = new AbortController()
    item.controller = controller

    console.log(`[queue] starting item #${item.id}: slug=${item.slug} agent=${item.agent} inputs=`, item.inputs)

    try {
      const url = `${API}/api/run-prompt/${item.slug}`
      const body = JSON.stringify({ agent: item.agent, inputs: item.inputs })
      console.log(`[queue] POST ${url}`, body)

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
        signal: controller.signal,
      })

      console.log(`[queue] response status=${res.status} ok=${res.ok} type=${res.headers.get('content-type')}`)

      if (!res.ok) {
        const text = await res.text()
        console.error(`[queue] HTTP error ${res.status}:`, text)
        item.status = 'error'
        item.output = `HTTP ${res.status}: ${text}`
        updateQueueUI()
        return
      }

      if (!res.body) {
        console.error(`[queue] no response body (ReadableStream not available)`)
        item.status = 'error'
        item.output = 'Error: No response body stream'
        updateQueueUI()
        return
      }

      const reader = res.body.getReader()
      const decoder = new TextDecoder()
      let buffer = ''

      while (true) {
        const { done, value } = await reader.read()
        if (done) {
          console.log(`[queue] stream done for item #${item.id}`)
          break
        }

        const chunk = decoder.decode(value, { stream: true })
        buffer += chunk

        const lines = buffer.split('\n')
        buffer = lines.pop() || ''

        let currentEvent = ''
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            currentEvent = line.slice(7)
          } else if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6))
              console.log(`[queue] SSE event=${currentEvent}`, currentEvent === 'chunk' ? `(${data.text?.length} chars)` : data)
              handleQueueEvent(item, currentEvent, data)
            } catch (parseErr) {
              console.error(`[queue] JSON parse error on line:`, line, parseErr)
            }
          }
        }
      }

      // Process remaining buffer
      if (buffer.trim()) {
        console.log(`[queue] processing remaining buffer (${buffer.length} chars)`)
        const lines = buffer.split('\n')
        let currentEvent = ''
        for (const line of lines) {
          if (line.startsWith('event: ')) currentEvent = line.slice(7)
          else if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6))
              handleQueueEvent(item, currentEvent, data)
            } catch (parseErr) {
              console.error(`[queue] JSON parse error on remaining:`, line, parseErr)
            }
          }
        }
      }

      if (item.status === 'running') {
        item.status = 'complete'
        console.log(`[queue] item #${item.id} completed (stream ended)`)
        updateQueueUI()
      }
    } catch (err) {
      console.error(`[queue] fetch/stream error for item #${item.id}:`, err)
      if (err.name !== 'AbortError') {
        item.status = 'error'
        item.output += `\n\nError: ${err.message}`
        updateQueueUI()
      }
    }
  }

  function handleQueueEvent(item, event, data) {
    switch (event) {
      case 'chunk':
        item.output += data.text
        updateQueueItemOutput(item)
        break
      case 'stderr':
        item.output += data.text
        updateQueueItemOutput(item)
        break
      case 'complete':
        item.status = 'complete'
        updateQueueUI()
        break
      case 'error':
        item.status = 'error'
        item.output += `\n\n--- Error: ${data.message} ---`
        updateQueueUI()
        break
      case 'status':
        // Just UI feedback — no change needed
        break
    }
  }

  function updateQueueItemOutput(item) {
    const outputEl = document.getElementById(`queue-output-${item.id}`)
    if (outputEl) {
      outputEl.innerHTML = renderMarkdownRich(item.output)
      // Auto-scroll if expanded
      const body = outputEl.closest('.queue-item-body')
      if (body) body.scrollTop = body.scrollHeight
    }

    // Update status dot
    const dot = document.querySelector(`[data-queue-id="${item.id}"] .queue-item-dot`)
    if (dot) dot.className = `queue-item-dot ${item.status}`
  }

  function updateQueueUI() {
    const queuedCount = queue.filter(q => q.status === 'queued').length
    const runningCount = queue.filter(q => q.status === 'running').length
    const total = queue.length

    // Badge
    const activeCount = queuedCount + runningCount
    if (activeCount > 0) {
      queueBadge.style.display = ''
      queueBadge.textContent = activeCount
    } else {
      queueBadge.style.display = 'none'
    }

    runQueueBtn.disabled = queuedCount === 0

    // Render list
    if (total === 0) {
      queueScroll.innerHTML = '<div class="queue-empty">Queue is empty. Select a prompt and click "+ Queue" to add it.</div>'
      return
    }

    queueScroll.innerHTML = ''
    for (const item of queue) {
      const el = document.createElement('div')
      el.className = `queue-item ${item.status}`
      el.dataset.queueId = item.id

      // Auto-expand running items
      if (item.status === 'running') el.classList.add('expanded')

      const inputSummary = Object.entries(item.inputs || {}).map(([k,v]) => `${k}=${v}`).join(', ')
      const inputLabel = inputSummary ? ` (${inputSummary})` : ''

      el.innerHTML = `
        <div class="queue-item-header">
          <span class="queue-item-dot ${item.status}"></span>
          <span class="queue-item-title">${esc(item.title)}${esc(inputLabel)}</span>
          <span class="queue-item-agent">${esc(item.agent)}</span>
          <span class="queue-item-status">${item.status}</span>
          <span class="queue-item-chevron">&#9654;</span>
          ${item.status !== 'running' ? `<button class="queue-item-remove" data-remove-id="${item.id}">&times;</button>` : ''}
        </div>
        <div class="queue-item-body">
          <div class="queue-item-output" id="queue-output-${item.id}">${item.output ? renderMarkdownRich(item.output) : '<span style="color:var(--text-faint);font-size:12px;">Waiting for output...</span>'}</div>
        </div>
      `

      queueScroll.appendChild(el)
    }

    // Bind toggle
    queueScroll.querySelectorAll('.queue-item-header').forEach(header => {
      header.addEventListener('click', (e) => {
        if (e.target.classList.contains('queue-item-remove')) return
        header.closest('.queue-item').classList.toggle('expanded')
      })
    })

    // Bind remove
    queueScroll.querySelectorAll('.queue-item-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.removeId)
        const item = queue.find(q => q.id === id)
        if (item?.controller) item.controller.abort()
        queue = queue.filter(q => q.id !== id)
        updateQueueUI()
      })
    })
  }

  // ── New Prompt Modal ──────────────────
  const newModal = document.getElementById('new-modal')
  const newTitle = document.getElementById('new-title')
  const newSlug = document.getElementById('new-slug')

  document.getElementById('new-prompt-btn').addEventListener('click', () => { newTitle.value = ''; newSlug.value = ''; newModal.classList.add('open'); newTitle.focus() })
  newTitle.addEventListener('input', () => { newSlug.value = newTitle.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') })
  document.getElementById('new-cancel').addEventListener('click', () => newModal.classList.remove('open'))
  newModal.addEventListener('click', (e) => { if (e.target === newModal) newModal.classList.remove('open') })

  document.getElementById('new-create').addEventListener('click', async () => {
    const title = newTitle.value.trim()
    const slug = newSlug.value.trim()
    if (!title || !slug) return

    try {
      const res = await fetch(`${API}/api/prompts/create`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, slug }),
      })
      const data = await res.json()
      if (data.error) { alert(data.error); return }

      newModal.classList.remove('open')
      await loadPrompts(data.slug)
    } catch (err) { alert('Failed to create prompt: ' + err.message) }
  })

  // ── Load assistants ───────────────────
  async function loadAssistants() {
    try {
      const res = await fetch(`${API}/api/assistants`)
      const data = await res.json()
      agentSelect.innerHTML = '<option value="claude">claude</option>'
      for (const a of (data.assistants || [])) {
        if (a.name === 'claude') continue
        const opt = document.createElement('option')
        opt.value = a.name; opt.textContent = a.name
        agentSelect.appendChild(opt)
      }
    } catch (_e) {}
  }

  // ── Markdown rendering ────────────────
  function renderMarkdown(text) {
    if (!text) return ''
    let h = esc(text)
    h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>')
    h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>')
    h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>')
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>')
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>')
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    h = h.replace(/^- (.+)$/gm, '<li>$1</li>')
    h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    h = h.replace(/\n\n/g, '</p><p>')
    h = '<p>' + h + '</p>'
    h = h.replace(/<p><\/p>/g, '')
    h = h.replace(/<p>(<(?:h[123]|[uo]l|blockquote)>)/g, '$1')
    h = h.replace(/(<\/(?:h[123]|[uo]l|blockquote)>)<\/p>/g, '$1')
    return h
  }

  function renderMarkdownRich(text) {
    if (!text) return ''
    let h = esc(text)
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.trim()}</code></pre>`)
    h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>')
    h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>')
    h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>')
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>')
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>')
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    h = h.replace(/^- (.+)$/gm, '<li>$1</li>')
    h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    h = h.replace(/^\d+\.\s+(.+)$/gm, '<oli>$1</oli>')
    h = h.replace(/((?:<oli>.*<\/oli>\n?)+)/g, m => '<ol>' + m.replace(/<\/?oli>/g, t => t.replace('oli', 'li')) + '</ol>')
    h = h.replace(/\n\n/g, '</p><p>')
    h = '<p>' + h + '</p>'
    h = h.replace(/<p><\/p>/g, '')
    h = h.replace(/<p>(<(?:h[123]|pre|[uo]l|blockquote)>)/g, '$1')
    h = h.replace(/(<\/(?:h[123]|pre|[uo]l|blockquote)>)<\/p>/g, '$1')
    return h
  }

  function highlightCode(code) {
    let h = esc(code)
    h = h.replace(/\b(const|let|var|function|async|await|return|import|export|from|if|else|for|while|new|class|this|try|catch|throw|typeof|instanceof|in|of)\b/g, '<span class="kw">$1</span>')
    h = h.replace(/(&#39;[^&#]*?&#39;|&quot;[^&]*?&quot;|`[^`]*?`)/g, '<span class="str">$1</span>')
    h = h.replace(/(\/\/.*$)/gm, '<span class="cmt">$1</span>')
    h = h.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>')
    return h
  }

  function esc(str) { const d = document.createElement('div'); d.textContent = String(str || ''); return d.innerHTML }

  // ── Boot ───────────────────────────────
  loadPrompts()
  loadAssistants()
</script>
