<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prompt Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/editor/editor.main.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #151520;
    --surface: #1c1c28;
    --surface-2: #23232f;
    --surface-3: #2a2a38;
    --border: #2e2e42;
    --border-light: #3a3a52;
    --text: #e0e0e8;
    --text-dim: #8a8aa2;
    --text-faint: #56566e;
    --accent: #00fff7;
    --accent-dim: #00fff720;
    --accent-glow: #00fff740;
    --purple: #c084fc;
    --purple-dim: #c084fc20;
    --success: #39ff14;
    --success-dim: #39ff1420;
    --warning: #f59e0b;
    --warning-dim: #f59e0b20;
    --error: #ff003c;
    --error-dim: #ff003c20;
    --blue: #60a5fa;
    --blue-dim: #60a5fa20;
    --orange: #fb923c;
    --orange-dim: #fb923c20;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  body { display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ─────────────────────────── */
  .header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: var(--surface);
    z-index: 10;
  }

  .header h1 { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }
  .divider { width: 1px; height: 18px; background: var(--border); }
  .spacer { flex: 1; }

  .header-actions { display: flex; align-items: center; gap: 8px; }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--border-light); background: var(--surface-3); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-accent { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); font-weight: 600; }
  .btn-accent:hover { background: var(--accent-glow); }
  .btn-purple { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); font-weight: 600; }
  .btn-purple:hover { background: #c084fc30; }
  .btn-success { border-color: var(--success); color: var(--success); background: var(--success-dim); font-weight: 600; }
  .btn-success:hover { background: #39ff1430; }
  .btn-warning { border-color: var(--warning); color: var(--warning); background: var(--warning-dim); font-weight: 600; }
  .btn-warning:hover { background: #f59e0b30; }

  .save-indicator { font-size: 10px; color: var(--text-faint); transition: all 0.3s; }
  .save-indicator.saving { color: var(--warning); }
  .save-indicator.saved { color: var(--success); }

  .meta-select {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }

  .meta-select:focus { border-color: var(--accent); }

  /* ── Layout ─────────────────────────── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ────────────────────────── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-header h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 4px; list-style: none; }

  .prompt-item {
    padding: 7px 9px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 1px;
  }

  .prompt-item:hover { background: var(--surface-2); }
  .prompt-item.active { background: var(--surface-3); border: 1px solid var(--border-light); }

  .prompt-item-row { display: flex; align-items: center; gap: 4px; }
  .prompt-item-title { font-size: 11px; color: var(--text); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .prompt-item-queue-btn {
    display: none;
    background: var(--purple-dim);
    border: 1px solid var(--purple);
    border-radius: 4px;
    color: var(--purple);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1.2;
  }
  .prompt-item:hover .prompt-item-queue-btn { display: block; }
  .prompt-item-queue-btn:hover { background: #c084fc30; }
  .prompt-item-meta { font-size: 9px; color: var(--text-dim); margin-top: 1px; display: flex; gap: 6px; }

  .tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface-3); color: var(--text-dim); }

  /* ── Main Area ──────────────────────── */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ── Tab Bar ────────────────────────── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    padding: 0 16px;
  }

  .tab {
    padding: 7px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab .badge-count {
    position: absolute;
    top: 2px;
    right: 2px;
    min-width: 14px;
    height: 14px;
    border-radius: 7px;
    background: var(--purple);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
  }

  /* ── Panels ─────────────────────────── */
  .panel { display: none; flex: 1; overflow: hidden; }
  .panel.active { display: flex; flex-direction: column; }

  /* ── Inputs Bar ─────────────────────── */
  .inputs-bar {
    display: none;
    padding: 8px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .inputs-bar.has-inputs { display: flex; }

  .inputs-bar-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--orange);
    font-weight: 600;
  }

  .input-field { display: flex; align-items: center; gap: 5px; }

  .input-field label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-field input {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    min-width: 140px;
  }

  .input-field input:focus { border-color: var(--orange); }
  .input-field input::placeholder { color: var(--text-faint); }

  /* ── Notebook Panel ─────────────────── */
  .notebook-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 100px; }

  .nb-block { margin-bottom: 16px; animation: slideUp 0.15s ease-out; }

  .nb-prose { font-size: 13px; line-height: 1.8; color: var(--text); max-width: 720px; padding: 4px 0; }
  .nb-prose h1 { font-size: 20px; color: var(--accent); margin: 16px 0 8px; font-weight: 700; }
  .nb-prose h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); margin: 20px 0 8px; font-weight: 700; }
  .nb-prose h3 { font-size: 13px; color: var(--purple); margin: 14px 0 6px; font-weight: 700; }
  .nb-prose p { margin-bottom: 8px; }
  .nb-prose ul, .nb-prose ol { padding-left: 20px; margin: 8px 0; }
  .nb-prose li { margin-bottom: 4px; }
  .nb-prose code { background: var(--surface-3); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--purple); }
  .nb-prose strong { color: var(--text); }
  .nb-prose em { color: var(--text-dim); font-style: italic; }
  .nb-prose blockquote { border-left: 3px solid var(--border-light); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
  .nb-prose a { color: var(--accent); text-decoration: none; }

  .nb-code-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

  .nb-code-header {
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .nb-code-lang { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--orange); font-weight: 600; }
  .nb-code-spacer { flex: 1; }

  .nb-run-btn {
    background: var(--success-dim);
    border: 1px solid var(--success);
    border-radius: 4px;
    color: var(--success);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .nb-run-btn:hover { background: #39ff1430; }
  .nb-run-btn.running { animation: pulse 1s ease-in-out infinite; }

  .nb-code-body { padding: 12px 16px; font-size: 12px; line-height: 1.6; color: var(--text); overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .nb-code-body .kw { color: var(--purple); }
  .nb-code-body .str { color: var(--success); }
  .nb-code-body .cmt { color: var(--text-faint); font-style: italic; }
  .nb-code-body .num { color: var(--orange); }

  .nb-output { border-top: 1px solid var(--border); background: var(--bg); padding: 10px 16px; font-size: 12px; line-height: 1.5; max-height: 200px; overflow-y: auto; }
  .nb-output:empty { display: none; }
  .nb-output-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-faint); margin-bottom: 4px; }
  .nb-output-text { color: var(--text-dim); white-space: pre-wrap; word-break: break-word; }
  .nb-output-error { color: var(--error); white-space: pre-wrap; word-break: break-word; }
  .nb-output-result { color: var(--accent); margin-top: 4px; }

  /* ── REPL ───────────────────────────── */
  .repl-container { border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }

  .repl-toggle {
    padding: 5px 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .repl-toggle:hover { color: var(--text); }
  .repl-toggle .chevron { font-size: 8px; transition: transform 0.15s; }
  .repl-toggle.open .chevron { transform: rotate(180deg); }

  .repl-body { display: none; }
  .repl-body.open { display: flex; flex-direction: column; }

  .repl-history { max-height: 180px; overflow-y: auto; padding: 6px 16px; font-size: 12px; }
  .repl-entry { margin-bottom: 6px; }
  .repl-entry-input { color: var(--accent); }
  .repl-entry-input::before { content: '> '; color: var(--text-faint); }
  .repl-entry-output { color: var(--text-dim); white-space: pre-wrap; padding-left: 16px; }
  .repl-entry-error { color: var(--error); white-space: pre-wrap; padding-left: 16px; }

  .repl-input-row { display: flex; gap: 8px; padding: 6px 16px 10px; border-top: 1px solid var(--border); }

  .repl-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
  }

  .repl-input:focus { border-color: var(--accent); }
  .repl-input::placeholder { color: var(--text-faint); }

  .repl-send {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
  }

  .repl-send:hover { background: var(--accent-glow); }

  /* ── Editor Panel ───────────────────── */
  .editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #monaco-container { flex: 1; }

  /* ── Queue / Run Output Panel ───────── */
  .queue-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .queue-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .queue-header h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; }

  .queue-scroll {
    flex: 1;
    overflow: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: row;
    gap: 12px;
    align-items: stretch;
  }

  .queue-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    width: 100%;
  }

  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: slideUp 0.15s ease-out;
    flex: 1 1 0;
    min-width: 280px;
    display: flex;
    flex-direction: column;
  }

  .queue-item.running { border-color: var(--success); }
  .queue-item.complete { border-color: var(--border-light); }
  .queue-item.error { border-color: var(--error); }

  .queue-item-header {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }

  .queue-item-header:hover { background: var(--surface-3); }

  .queue-item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .queue-item-dot.queued { background: var(--warning); }
  .queue-item-dot.running { background: var(--success); animation: pulse 1s ease-in-out infinite; }
  .queue-item-dot.complete { background: var(--success); }
  .queue-item-dot.error { background: var(--error); }

  .queue-item-title { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-item-agent { font-size: 10px; color: var(--text-dim); }
  .queue-item-status { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .queue-item-chevron { display: none; }

  .queue-item-body { border-top: 1px solid var(--border); flex: 1; overflow-y: auto; }

  .queue-item-actions {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .qi-action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    transition: all 0.15s;
  }

  .qi-action-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .qi-action-btn.edit { color: var(--orange); border-color: var(--orange); }
  .qi-action-btn.edit:hover { background: var(--orange-dim); }
  .qi-action-btn.rerun { color: var(--accent); border-color: var(--accent); }
  .qi-action-btn.rerun:hover { background: var(--accent-dim); }

  .queue-item-output {
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .queue-item-output h1 { font-size: 18px; color: var(--accent); margin: 12px 0 6px; }
  .queue-item-output h2 { font-size: 15px; color: var(--accent); margin: 16px 0 6px; }
  .queue-item-output h3 { font-size: 13px; color: var(--purple); margin: 12px 0 4px; }
  .queue-item-output p { margin-bottom: 6px; }
  .queue-item-output ul, .queue-item-output ol { padding-left: 20px; margin: 6px 0; }
  .queue-item-output li { margin-bottom: 3px; }
  .queue-item-output strong { color: var(--text); }
  .queue-item-output em { color: var(--text-dim); }
  .queue-item-output a { color: var(--accent); }
  .queue-item-output blockquote { border-left: 3px solid var(--border-light); padding-left: 12px; color: var(--text-dim); margin: 6px 0; }
  .queue-item-output pre { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin: 6px 0; overflow-x: auto; font-size: 12px; line-height: 1.5; }
  .queue-item-output code { background: var(--surface-3); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--purple); }
  .queue-item-output pre code { background: none; padding: 0; color: var(--text); }

  .queue-item-remove {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  .queue-item-remove:hover { color: var(--error); }

  /* ── Modal ──────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,20,30,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 380px;
    max-width: 90vw;
  }

  .modal h2 { font-size: 14px; color: var(--accent); margin-bottom: 16px; font-weight: 700; }

  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 4px; }
  .modal-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; outline: none; }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ── Empty state ────────────────────── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); text-align: center; padding: 40px; }
  .empty-state p { font-size: 13px; max-width: 360px; line-height: 1.6; }

  /* ── Animations ─────────────────────── */
  @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>
<body>

<div class="header">
  <h1>Prompt Studio</h1>
  <div class="divider"></div>
  <span id="prompt-title" style="font-size:12px;color:var(--text-dim)">Select a prompt</span>
  <span class="save-indicator" id="save-indicator"></span>
  <div class="spacer"></div>
  <div class="header-actions">
    <select class="meta-select" id="agent-select" title="Agent">
      <option value="claude">claude</option>
    </select>
    <button class="btn btn-purple" id="queue-btn" disabled>+ Queue</button>
    <button class="btn btn-success" id="run-queue-btn" disabled>Run Queue</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>Prompts</h3>
      <button class="btn" id="new-prompt-btn" style="font-size:10px;padding:3px 7px;">+ New</button>
    </div>
    <ul class="sidebar-list" id="prompt-list"></ul>
  </aside>

  <!-- Main Area -->
  <div class="main-area">
    <!-- Inputs Bar -->
    <div class="inputs-bar" id="inputs-bar">
      <span class="inputs-bar-label">Inputs</span>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab active" data-tab="notebook">Notebook</div>
      <div class="tab" data-tab="editor">Source</div>
      <div class="tab" data-tab="queue">Queue <span class="badge-count" id="queue-badge" style="display:none">0</span></div>
    </div>

    <!-- Notebook Panel -->
    <div class="panel active" id="panel-notebook">
      <div class="notebook-scroll" id="notebook-scroll">
        <div class="empty-state"><p>Select a prompt from the sidebar or create a new one.</p></div>
      </div>

<div class="modal-overlay" id="queue-inputs-modal">

<!-- Monaco Editor Loader -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script type="module">
  const API = window.location.origin

  // ── Load Luca browser container (default export is the singleton) ──
  const { default: container } = await import('https://esm.sh/@soederpop/luca@0.0.28/src/browser.ts')

  // Get Feature base class from the registry
  const Feature = Object.getPrototypeOf(container.feature('vm').constructor)

  // ── PromptStudio Feature (real Luca Feature — registered, stateful, observable) ──
  class PromptStudio extends Feature {
    static shortcut = 'features.promptStudio'
    static { Feature.register(this, 'promptStudio') }

    _idCounter = 0
    _prompts = []
    _queue = []
    _currentPrompt = null
    _currentRawContent = ''

    async afterInitialize() {
      this.state.set('ready', false)
      await this.loadPrompts()
      await this.loadAssistants()
      this.state.set('ready', true)
      this.emit('ready')
    }

    get prompts() { return this._prompts }
    get queue() { return this._queue }
    get currentPrompt() { return this._currentPrompt }
    get currentRawContent() { return this._currentRawContent }

    async loadPrompts() {
      const res = await fetch(`${API}/api/prompts`)
      const data = await res.json()
      this._prompts = data.prompts || []
      this.state.set('promptCount', this._prompts.length)
      this.emit('prompts:loaded', this._prompts)
      return this._prompts
    }

    async loadAssistants() {
      try {
        const res = await fetch(`${API}/api/assistants`)
        const data = await res.json()
        const assistants = data.assistants || []
        this.state.set('assistants', assistants)
        this.emit('assistants:loaded', assistants)
        return assistants
      } catch (_e) { return [] }
    }

    async selectPrompt(slug) {
      const res = await fetch(`${API}/api/prompt/${slug}`)
      const data = await res.json()
      if (data.error) return null
      this._currentPrompt = data
      this._currentRawContent = data.rawContent
      this.state.set('currentSlug', slug)
      this.emit('prompt:selected', data)
      return data
    }

    async savePrompt(slug, content) {
      this.emit('prompt:saving', slug)
      await fetch(`${API}/api/prompt/${slug}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      })
      if (this._currentPrompt?.slug === slug) {
        this._currentRawContent = content
        const fresh = await fetch(`${API}/api/prompt/${slug}`)
        const freshData = await fresh.json()
        if (!freshData.error) this._currentPrompt = freshData
      }
      this.emit('prompt:saved', slug)
    }

    async createPrompt(title, slug) {
      const res = await fetch(`${API}/api/prompts/create`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, slug }),
      })
      const data = await res.json()
      if (!data.error) { await this.loadPrompts(); this.emit('prompt:created', data) }
      return data
    }

    getInputsDef(slug) {
      const p = this._prompts.find(pr => pr.slug === slug)
      return p?.inputs || {}
    }

    addToQueue(slug, title, inputs = {}, agent = null, options = {}) {
      const id = ++this._idCounter
      const item = { id, slug, title, agent: agent || this.state.get('selectedAgent') || 'claude', inputs, options, status: 'queued', output: '', controller: null }
      this._queue.push(item)
      this.state.set('queueLength', this._queue.length)
      this.emit('queue:added', item)
      this.emit('queue:changed')
      return item
    }

    updateQueueItem(id, updates) {
      const item = this._queue.find(q => q.id === id)
      if (!item) return null
      Object.assign(item, updates)
      this.emit('queue:updated', item)
      this.emit('queue:changed')
      return item
    }

    removeQueueItem(id) {
      const item = this._queue.find(q => q.id === id)
      if (item?.controller) item.controller.abort()
      this._queue = this._queue.filter(q => q.id !== id)
      this.state.set('queueLength', this._queue.length)
      this.emit('queue:changed')
    }

    clearDone() {
      this._queue = this._queue.filter(q => q.status === 'running' || q.status === 'queued')
      this.state.set('queueLength', this._queue.length)
      this.emit('queue:changed')
    }

    rerunQueueItem(id) {
      const item = this._queue.find(q => q.id === id)
      if (!item || item.status === 'running') return
      item.status = 'queued'
      item.output = ''
      item.controller = null
      this.emit('queue:changed')
      this._startItem(item)
    }

    runAll() {
      const toRun = this._queue.filter(q => q.status === 'queued')
      if (toRun.length === 0) return
      this.emit('queue:runAll', toRun)
      toRun.forEach(item => this._startItem(item))
    }

    async _startItem(item) {
      item.status = 'running'
      item.output = ''
      this.emit('queue:itemStarted', item)
      this.emit('queue:changed')

      const controller = new AbortController()
      item.controller = controller

      try {
        const res = await fetch(`${API}/api/run-prompt/${item.slug}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent: item.agent, inputs: item.inputs, options: item.options || {} }),
          signal: controller.signal,
        })

        if (!res.ok || !res.body) {
          item.status = 'error'
          item.output = res.body ? `HTTP ${res.status}: ${await res.text()}` : 'No response stream'
          this.emit('queue:itemError', item)
          this.emit('queue:changed')
          return
        }

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break
          buffer += decoder.decode(value, { stream: true })
          const lines = buffer.split('\n')
          buffer = lines.pop() || ''
          let evt = ''
          for (const line of lines) {
            if (line.startsWith('event: ')) evt = line.slice(7)
            else if (line.startsWith('data: ')) {
              try { this._handleSSE(item, evt, JSON.parse(line.slice(6))) } catch (_e) {}
            }
          }
        }

        if (item.status === 'running') {
          item.status = 'complete'
          this.emit('queue:itemComplete', item)
          this.emit('queue:changed')
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          item.status = 'error'
          item.output += `\n\nError: ${err.message}`
          this.emit('queue:itemError', item)
          this.emit('queue:changed')
        }
      }
    }

    _handleSSE(item, event, data) {
      if (event === 'chunk' || event === 'stderr') {
        item.output += data.text
        this.emit('queue:itemOutput', item)
      } else if (event === 'complete') {
        item.status = 'complete'
        this.emit('queue:itemComplete', item)
        this.emit('queue:changed')
      } else if (event === 'error') {
        item.status = 'error'
        item.output += `\n\n--- Error: ${data.message} ---`
        this.emit('queue:itemError', item)
        this.emit('queue:changed')
      }
    }

    async evalCode(code) {
      const res = await fetch(`${API}/api/workflows/prompt-studio/eval`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      })
      return res.json()
    }
  }

  // Create the feature via container (don't call afterInitialize yet — bind events first)
  const studio = container.feature('promptStudio')
  window.studio = studio
  window.luca = container

  // ── UI Helpers ─────────────────────────
  let monacoEditor = null, saveTimeout = null
  const el = id => document.getElementById(id)
  const promptList = el('prompt-list'), promptTitle = el('prompt-title'), saveIndicator = el('save-indicator')
  const agentSelect = el('agent-select'), queueBtn = el('queue-btn'), runQueueBtn = el('run-queue-btn')
  const notebookScroll = el('notebook-scroll'), queueScroll = el('queue-scroll'), queueBadge = el('queue-badge')
  const inputsBar = el('inputs-bar'), replToggle = el('repl-toggle'), replBody = el('repl-body')
  const replInput = el('repl-input'), replHistory = el('repl-history')
  const queueInputsModal = el('queue-inputs-modal'), queueInputsFields = el('queue-inputs-fields')
  const queueInputsTitle = el('queue-inputs-title'), queueInputsAddBtn = el('queue-inputs-add')

  function esc(str) { const d = document.createElement('div'); d.textContent = String(str || ''); return d.innerHTML }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
    document.querySelector(`[data-tab="${name}"]`)?.classList.add('active')
    el(`panel-${name}`)?.classList.add('active')
    if (name === 'editor' && monacoEditor) monacoEditor.layout()
  }
  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)))

  // ── Monaco ─────────────────────────────
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } })
  require(['vs/editor/editor.main'], () => {
    monaco.editor.defineTheme('prompt-dark', {
      base: 'vs-dark', inherit: true,
      rules: [
        { token: 'comment', foreground: '3a3a50', fontStyle: 'italic' },
        { token: 'keyword', foreground: 'c084fc' },
        { token: 'string', foreground: '39ff14' },
        { token: 'number', foreground: 'fb923c' },
        { token: 'type', foreground: '00fff7' },
      ],
      colors: {
        'editor.background': '#151520', 'editor.foreground': '#e0e0e8',
        'editor.lineHighlightBackground': '#1c1c28', 'editor.selectionBackground': '#3a3a52',
        'editorCursor.foreground': '#00fff7', 'editorLineNumber.foreground': '#56566e',
        'editorLineNumber.activeForeground': '#8a8aa2', 'editor.inactiveSelectionBackground': '#2e2e42',
      },
    })
    monacoEditor = monaco.editor.create(el('monaco-container'), {
      value: '', language: 'markdown', theme: 'prompt-dark',
      fontFamily: "'SF Mono', 'Fira Code', 'JetBrains Mono', monospace",
      fontSize: 13, lineHeight: 22, minimap: { enabled: false },
      scrollBeyondLastLine: false, wordWrap: 'on', tabSize: 2, automaticLayout: true, padding: { top: 12 },
    })
    monacoEditor.onDidChangeModelContent(() => {
      if (!studio.currentPrompt) return
      clearTimeout(saveTimeout)
      saveIndicator.textContent = 'unsaved'; saveIndicator.className = 'save-indicator'
      saveTimeout = setTimeout(async () => {
        saveIndicator.textContent = 'saving...'; saveIndicator.className = 'save-indicator saving'
        try {
          await studio.savePrompt(studio.currentPrompt.slug, monacoEditor.getValue())
          saveIndicator.textContent = 'saved'; saveIndicator.className = 'save-indicator saved'
          renderNotebook(studio.currentRawContent)
          renderInputsBar(studio.currentPrompt?.inputs || {})
          setTimeout(() => { saveIndicator.textContent = ''; saveIndicator.className = 'save-indicator' }, 2000)
        } catch (_) { saveIndicator.textContent = 'save failed'; saveIndicator.style.color = 'var(--error)' }
      }, 800)
    })
    if (studio.currentPrompt) monacoEditor.setValue(studio.currentRawContent)
  })

  // ── Feature Event Bindings ─────────────
  studio.on('prompts:loaded', renderPromptList)
  studio.on('prompt:selected', (data) => {
    promptTitle.textContent = data.title; queueBtn.disabled = false; window.location.hash = data.slug
    document.querySelectorAll('.prompt-item').forEach(li => li.classList.toggle('active', li.dataset.slug === data.slug))
    if (monacoEditor) monacoEditor.setValue(data.rawContent)
    renderNotebook(data.rawContent)
    renderInputsBar(data.inputs || {})
  })
  studio.on('assistants:loaded', (assistants) => {
    agentSelect.innerHTML = '<option value="claude">claude</option>'
    for (const a of assistants) {
      if (a.name === 'claude') continue
      const opt = document.createElement('option'); opt.value = a.name; opt.textContent = a.name; agentSelect.appendChild(opt)
    }
  })
  agentSelect.addEventListener('change', () => studio.state.set('selectedAgent', agentSelect.value))
  studio.on('ready', () => {
    const hash = window.location.hash.slice(1)
    const target = studio.prompts.find(p => p.slug === hash) || studio.prompts[0]
    if (target) studio.selectPrompt(target.slug)
  })

  // ── Prompt List ────────────────────────
  function renderPromptList() {
    promptList.innerHTML = ''
    if (studio.prompts.length === 0) { promptList.innerHTML = '<li style="padding:16px;color:var(--text-dim);font-size:12px;text-align:center;">No prompts yet</li>'; return }
    for (const p of studio.prompts) {
      const li = document.createElement('li')
      li.className = `prompt-item${studio.currentPrompt?.slug === p.slug ? ' active' : ''}`; li.dataset.slug = p.slug
      const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ')
      const ik = p.inputs ? Object.keys(p.inputs) : []
      const ib = ik.length > 0 ? `<span style="color:var(--orange)">${ik.length} input${ik.length > 1 ? 's' : ''}</span>` : ''
      li.innerHTML = `<div class="prompt-item-row"><span class="prompt-item-title">${esc(p.title)}</span><button class="prompt-item-queue-btn" data-queue-slug="${esc(p.slug)}" title="Add to queue">+Q</button></div><div class="prompt-item-meta">${tags} ${ib}</div>`
      li.addEventListener('click', (e) => { if (!e.target.classList.contains('prompt-item-queue-btn')) studio.selectPrompt(p.slug) })
      promptList.appendChild(li)
    }
    promptList.querySelectorAll('.prompt-item-queue-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); showInputsModal(btn.dataset.queueSlug) })
    })
  }

  // ── Inputs Bar ─────────────────────────
  function renderInputsBar(inputs) {
    const keys = Object.keys(inputs || {}); inputsBar.innerHTML = '<span class="inputs-bar-label">Inputs</span>'
    if (keys.length === 0) { inputsBar.classList.remove('has-inputs'); return }
    inputsBar.classList.add('has-inputs')
    for (const key of keys) {
      const spec = inputs[key], field = document.createElement('div'); field.className = 'input-field'
      field.innerHTML = `<label>${esc(key)}</label><input type="text" data-input-key="${esc(key)}" placeholder="${esc(spec.question || spec.description || key)}" />`
      inputsBar.appendChild(field)
    }
  }

  // ── Inputs Modal (add + edit queue items) ──
  let modalMode = 'add', modalSlug = null, modalTitle = null, modalEditId = null

  // Options toggle
  const optionsToggle = el('queue-options-toggle')
  const optionsFields = el('queue-options-fields')
  const optionsChevron = el('options-chevron')
  let optionsOpen = false
  optionsToggle.addEventListener('click', () => {
    optionsOpen = !optionsOpen
    optionsFields.style.display = optionsOpen ? 'block' : 'none'
    optionsChevron.style.transform = optionsOpen ? 'rotate(90deg)' : ''
  })

  function getModalOptions() {
    const opts = {}
    const model = el('qo-model').value.trim(); if (model) opts.model = model
    const pm = el('qo-permission-mode').value; if (pm !== 'bypassPermissions') opts.permissionMode = pm
    const inf = el('qo-in-folder').value.trim(); if (inf) opts.inFolder = inf
    const outf = el('qo-out-file').value.trim(); if (outf) opts.outFile = outf
    const exc = el('qo-exclude-sections').value.trim(); if (exc) opts.excludeSections = exc
    if (!el('qo-skip-eval').checked) opts.skipEval = false
    if (el('qo-chrome').checked) opts.chrome = true
    if (el('qo-include-output').checked) opts.includeOutput = true
    if (el('qo-dry-run').checked) opts.dryRun = true
    if (el('qo-local').checked) opts.local = true
    return opts
  }

  function setModalOptions(opts = {}) {
    el('qo-model').value = opts.model || ''
    el('qo-permission-mode').value = opts.permissionMode || 'bypassPermissions'
    el('qo-in-folder').value = opts.inFolder || ''
    el('qo-out-file').value = opts.outFile || ''
    el('qo-exclude-sections').value = opts.excludeSections || ''
    el('qo-skip-eval').checked = opts.skipEval !== false
    el('qo-chrome').checked = !!opts.chrome
    el('qo-include-output').checked = !!opts.includeOutput
    el('qo-dry-run').checked = !!opts.dryRun
    el('qo-local').checked = !!opts.local
  }

  function showInputsModal(slug, existingInputs = null, editId = null, existingOptions = null) {
    const p = studio.prompts.find(pr => pr.slug === slug)
    if (!p) return
    const inputsDef = p.inputs || {}; modalSlug = slug; modalTitle = p.title
    if (editId !== null) {
      modalMode = 'edit'; modalEditId = editId
      queueInputsTitle.textContent = `Edit: ${p.title}`; queueInputsAddBtn.textContent = 'Save'
    } else {
      modalMode = 'add'; modalEditId = null
      queueInputsTitle.textContent = `Queue: ${p.title}`; queueInputsAddBtn.textContent = 'Add to Queue'
    }
    setModalOptions(existingOptions || {})
    queueInputsFields.innerHTML = ''
    const keys = Object.keys(inputsDef)
    if (keys.length === 0 && modalMode === 'add' && !optionsOpen) { studio.addToQueue(slug, p.title, {}, agentSelect.value, {}); return }
    for (const key of keys) {
      const spec = inputsDef[key], val = existingInputs?.[key] || '', field = document.createElement('div'); field.className = 'modal-field'
      field.innerHTML = `<label>${esc(key)}</label><input type="text" data-qi-key="${esc(key)}" placeholder="${esc(spec.description || spec.question || key)}" value="${esc(val)}" />`
      queueInputsFields.appendChild(field)
    }
    queueInputsModal.classList.add('open')
    const first = queueInputsFields.querySelector('input'); if (first) first.focus()
  }

  el('queue-inputs-cancel').addEventListener('click', () => queueInputsModal.classList.remove('open'))
  queueInputsModal.addEventListener('click', (e) => { if (e.target === queueInputsModal) queueInputsModal.classList.remove('open') })
  queueInputsFields.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); queueInputsAddBtn.click() } })

  queueInputsAddBtn.addEventListener('click', () => {
    const inputs = {}
    queueInputsFields.querySelectorAll('input[data-qi-key]').forEach(i => { if (i.value.trim()) inputs[i.dataset.qiKey] = i.value.trim() })
    const options = getModalOptions()
    if (modalMode === 'edit' && modalEditId !== null) studio.updateQueueItem(modalEditId, { inputs, options })
    else studio.addToQueue(modalSlug, modalTitle, inputs, agentSelect.value, options)
    queueInputsModal.classList.remove('open')
  })

  // ── Header Buttons ─────────────────────
  queueBtn.addEventListener('click', () => { if (studio.currentPrompt) showInputsModal(studio.currentPrompt.slug) })
  runQueueBtn.addEventListener('click', () => { switchTab('queue'); studio.runAll() })
  el('clear-queue-btn').addEventListener('click', () => studio.clearDone())

  // ── Queue UI (fully event-driven) ──────
  function renderQueueUI() {
    const queue = studio.queue
    const qc = queue.filter(q => q.status === 'queued').length, rc = queue.filter(q => q.status === 'running').length
    queueBadge.style.display = (qc + rc) > 0 ? '' : 'none'; queueBadge.textContent = qc + rc
    runQueueBtn.disabled = qc === 0
    if (queue.length === 0) { queueScroll.innerHTML = '<div class="queue-empty">Queue is empty. Select a prompt and click "+ Queue" to add it.</div>'; return }
    queueScroll.innerHTML = ''
    for (const item of queue) {
      const div = document.createElement('div'); div.className = `queue-item ${item.status}`; div.dataset.queueId = item.id
      const isum = Object.entries(item.inputs || {}).map(([k,v]) => `${k}=${v}`).join(', ')
      const ilbl = isum ? ` (${isum})` : ''
      const isQueued = item.status === 'queued', isDone = item.status === 'complete' || item.status === 'error'
      div.innerHTML = `
        <div class="queue-item-header">
          <span class="queue-item-dot ${item.status}"></span>
          <span class="queue-item-title">${esc(item.title)}${esc(ilbl)}</span>
          <span class="queue-item-agent">${esc(item.agent)}</span>
          <span class="queue-item-status">${item.status}</span>
          <div class="queue-item-actions">
            ${isQueued ? `<button class="qi-action-btn edit" data-edit-id="${item.id}" data-edit-slug="${item.slug}">Edit</button>` : ''}
            ${isDone ? `<button class="qi-action-btn rerun" data-rerun-id="${item.id}">Rerun</button>` : ''}
            ${isDone ? `<button class="qi-action-btn edit" data-edit-id="${item.id}" data-edit-slug="${item.slug}">Edit & Rerun</button>` : ''}
            ${item.status !== 'running' ? `<button class="queue-item-remove" data-remove-id="${item.id}">&times;</button>` : ''}
          </div>
        </div>
        <div class="queue-item-body">
          <div class="queue-item-output" id="queue-output-${item.id}">${item.output ? renderMarkdownRich(item.output) : '<span style="color:var(--text-faint);font-size:12px;">Waiting for output...</span>'}</div>
        </div>`
      queueScroll.appendChild(div)
    }
    queueScroll.querySelectorAll('.queue-item-remove').forEach(b => b.addEventListener('click', () => studio.removeQueueItem(parseInt(b.dataset.removeId))))
    queueScroll.querySelectorAll('[data-rerun-id]').forEach(b => b.addEventListener('click', () => studio.rerunQueueItem(parseInt(b.dataset.rerunId))))
    queueScroll.querySelectorAll('[data-edit-id]').forEach(b => {
      b.addEventListener('click', () => {
        const id = parseInt(b.dataset.editId), item = studio.queue.find(q => q.id === id)
        if (!item) return
        const isRerun = b.textContent.includes('Rerun')
        showInputsModal(item.slug, item.inputs, id, item.options)
        if (isRerun) {
          // After modal closes via submit, also trigger rerun
          const orig = queueInputsAddBtn.onclick
          const handler = () => { setTimeout(() => studio.rerunQueueItem(id), 50); queueInputsAddBtn.removeEventListener('click', handler) }
          queueInputsAddBtn.addEventListener('click', handler)
        }
      })
    })
  }

  studio.on('queue:changed', renderQueueUI)
  studio.on('queue:itemOutput', (item) => {
    const out = el(`queue-output-${item.id}`)
    if (out) { out.innerHTML = renderMarkdownRich(item.output); const body = out.closest('.queue-item-body'); if (body) body.scrollTop = body.scrollHeight }
    const dot = document.querySelector(`[data-queue-id="${item.id}"] .queue-item-dot`)
    if (dot) dot.className = `queue-item-dot ${item.status}`
  })

  // ── Notebook ───────────────────────────
  function parseMarkdownBlocks(text) {
    let content = text
    if (content.startsWith('---')) { const end = content.indexOf('---', 3); if (end !== -1) content = content.slice(end + 3).trim() }
    const blocks = [], lines = content.split('\n'); let i = 0
    while (i < lines.length) {
      const m = lines[i].match(/^```(\w*)(.*)$/); if (m) {
        const lang = m[1] || '', meta = m[2]?.trim() || '', cl = []; i++
        while (i < lines.length && !lines[i].match(/^```\s*$/)) { cl.push(lines[i]); i++ }; i++
        blocks.push({ type: 'code', lang, meta, code: cl.join('\n') })
      } else { const pl = [lines[i]]; i++; while (i < lines.length && !lines[i].match(/^```/)) { pl.push(lines[i]); i++ }
        const prose = pl.join('\n').trim(); if (prose) blocks.push({ type: 'prose', text: prose }) }
    }; return blocks
  }

  function renderNotebook(raw) {
    const blocks = parseMarkdownBlocks(raw); notebookScroll.innerHTML = ''
    if (blocks.length === 0) { notebookScroll.innerHTML = '<div class="empty-state"><p>Empty prompt. Switch to Source to start writing.</p></div>'; return }
    blocks.forEach((block, idx) => {
      const d = document.createElement('div'); d.className = 'nb-block'
      if (block.type === 'prose') { d.innerHTML = `<div class="nb-prose">${renderMarkdown(block.text)}</div>` }
      else {
        const run = ['ts','typescript','js','javascript'].includes(block.lang)
        d.innerHTML = `<div class="nb-code-block"><div class="nb-code-header"><span class="nb-code-lang">${esc(block.lang||'text')}</span>${block.meta?`<span style="font-size:10px;color:var(--text-faint)">${esc(block.meta)}</span>`:''}<div class="nb-code-spacer"></div>${run?`<button class="nb-run-btn" data-idx="${idx}">Run</button>`:''}</div><div class="nb-code-body">${highlightCode(block.code)}</div><div class="nb-output" id="nb-output-${idx}"></div></div>`
      }; notebookScroll.appendChild(d)
    })
    notebookScroll.querySelectorAll('.nb-run-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const block = blocks[parseInt(btn.dataset.idx)]; if (!block) return
        btn.classList.add('running'); btn.textContent = '...'
        const out = el(`nb-output-${btn.dataset.idx}`); out.innerHTML = '<div class="nb-output-label">Running...</div>'
        try {
          const data = await studio.evalCode(block.code); let h = ''
          if (data.output) h += `<div class="nb-output-label">Output</div><div class="nb-output-text">${esc(data.output)}</div>`
          if (data.error) h += `<div class="nb-output-label">Error</div><div class="nb-output-error">${esc(data.error)}</div>`
          if (data.result !== undefined && data.result !== 'undefined') h += `<div class="nb-output-result">${esc(data.result)}</div>`
          out.innerHTML = h || '<div class="nb-output-label" style="color:var(--success)">OK</div>'
        } catch (e) { out.innerHTML = `<div class="nb-output-error">${esc(e.message)}</div>` }
        btn.classList.remove('running'); btn.textContent = 'Run'
      })
    })
    el('panel-notebook').appendChild(document.querySelector('.repl-container'))
  }

  // ── REPL ───────────────────────────────
  let replOpen = false
  replToggle.addEventListener('click', () => { replOpen = !replOpen; replToggle.classList.toggle('open', replOpen); replBody.classList.toggle('open', replOpen); if (replOpen) replInput.focus() })
  async function evalRepl() {
    const code = replInput.value.trim(); if (!code) return; replInput.value = ''
    const entry = document.createElement('div'); entry.className = 'repl-entry'
    entry.innerHTML = `<div class="repl-entry-input">${esc(code)}</div>`; replHistory.appendChild(entry)
    try {
      const data = await studio.evalCode(code); let h = ''
      if (data.output) h += `<div class="repl-entry-output">${esc(data.output)}</div>`
      if (data.error) h += `<div class="repl-entry-error">${esc(data.error)}</div>`
      if (data.result !== undefined && data.result !== 'undefined') h += `<div class="repl-entry-output" style="color:var(--accent)">${esc(data.result)}</div>`
      if (h) entry.innerHTML += h
    } catch (e) { entry.innerHTML += `<div class="repl-entry-error">${esc(e.message)}</div>` }
    replHistory.scrollTop = replHistory.scrollHeight
  }
  el('repl-send').addEventListener('click', evalRepl)
  replInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); evalRepl() } })

  // ── New Prompt Modal ───────────────────
  const newModal = el('new-modal'), newTitleEl = el('new-title'), newSlugEl = el('new-slug')
  el('new-prompt-btn').addEventListener('click', () => { newTitleEl.value = ''; newSlugEl.value = ''; newModal.classList.add('open'); newTitleEl.focus() })
  newTitleEl.addEventListener('input', () => { newSlugEl.value = newTitleEl.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') })
  el('new-cancel').addEventListener('click', () => newModal.classList.remove('open'))
  newModal.addEventListener('click', (e) => { if (e.target === newModal) newModal.classList.remove('open') })
  el('new-create').addEventListener('click', async () => {
    const t = newTitleEl.value.trim(), s = newSlugEl.value.trim(); if (!t || !s) return
    const data = await studio.createPrompt(t, s)
    if (data.error) { alert(data.error); return }
    newModal.classList.remove('open'); studio.selectPrompt(data.slug)
  })

  // ── Markdown & Highlighting ────────────
  function renderMarkdown(text) {
    if (!text) return ''; let h = esc(text)
    h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>').replace(/^- (.+)$/gm, '<li>$1</li>')
    h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>').replace(/\n\n/g, '</p><p>')
    h = '<p>' + h + '</p>'; h = h.replace(/<p><\/p>/g, '')
    h = h.replace(/<p>(<(?:h[123]|[uo]l|blockquote)>)/g, '$1').replace(/(<\/(?:h[123]|[uo]l|blockquote)>)<\/p>/g, '$1')
    return h
  }
  function renderMarkdownRich(text) {
    if (!text) return ''; let h = esc(text)
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.trim()}</code></pre>`)
    h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^# (.+)$/gm, '<h1>$1</h1>')
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>').replace(/^- (.+)$/gm, '<li>$1</li>')
    h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    h = h.replace(/^\d+\.\s+(.+)$/gm, '<oli>$1</oli>')
    h = h.replace(/((?:<oli>.*<\/oli>\n?)+)/g, m => '<ol>' + m.replace(/<\/?oli>/g, t => t.replace('oli', 'li')) + '</ol>')
    h = h.replace(/\n\n/g, '</p><p>'); h = '<p>' + h + '</p>'; h = h.replace(/<p><\/p>/g, '')
    h = h.replace(/<p>(<(?:h[123]|pre|[uo]l|blockquote)>)/g, '$1').replace(/(<\/(?:h[123]|pre|[uo]l|blockquote)>)<\/p>/g, '$1')
    return h
  }
  function highlightCode(code) {
    let h = esc(code)
    h = h.replace(/\b(const|let|var|function|async|await|return|import|export|from|if|else|for|while|new|class|this|try|catch|throw|typeof|instanceof|in|of)\b/g, '<span class="kw">$1</span>')
    h = h.replace(/(&#39;[^&#]*?&#39;|&quot;[^&]*?&quot;|`[^`]*?`)/g, '<span class="str">$1</span>')
    h = h.replace(/(\/\/.*$)/gm, '<span class="cmt">$1</span>')
    h = h.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>')
    return h
  }

  // ── Boot (after all event bindings) ────
  await studio.afterInitialize()
</script>
</body>
