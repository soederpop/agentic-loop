<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luca Voice Trainer</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <div>
        <h1>Luca Voice Trainer</h1>
        <p class="subtitle">Type a command and watch deterministic handler routing in real time.</p>
      </div>
      <div class="controls">
        <button id="refresh-handlers">Refresh Handlers</button>
      </div>
    </header>

    <section class="panel simulator-panel">
      <div class="panel-title-row">
        <h2>Route Simulator</h2>
      </div>

      <div class="sim-input-row">
        <input id="phrase-input" type="text" placeholder="Try: open telegram and message jon" />
        <button id="run-test">Simulate</button>
      </div>

      <div class="result-strip">
        <div class="result-card">
          <div class="label">First Match</div>
          <div id="first-match" class="value">None</div>
        </div>
        <div class="result-card">
          <div class="label">Dictionary Subject</div>
          <div id="dictionary-subject" class="value">None</div>
        </div>
        <div class="result-card">
          <div class="label">Text Dictionary Hits</div>
          <div id="dictionary-count" class="value">0</div>
        </div>
      </div>

      <div id="routing-lane" class="routing-lane"></div>

      <div class="trace-panel">
        <div class="trace-title">NLP + Raw Trace</div>
        <pre id="test-output" class="output"></pre>
      </div>
    </section>

    <section class="panel sidebar-panel">
      <div class="panel-title-row">
        <h2>Handlers</h2>
      </div>
      <div id="handlers-list" class="handlers-list"></div>
    </section>

    <section id="editor-panel" class="panel editor-panel collapsed">
      <div class="panel-title-row">
        <h2 id="editor-title">Code Inspector</h2>
        <div class="controls">
          <button id="toggle-editor">Open Inspector</button>
          <button id="save-handler" disabled>Save</button>
        </div>
      </div>
      <div id="editor" class="editor"></div>
    </section>
  </main>

  <script>
    window.MONACO_BASE = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min'
  </script>
  <script src="/app.js" type="module"></script>
</body>
</html>
